rootManager:
  # -- Enable the root `manager` ApplicationSet that discovers every instance
  # under `argo-cd/instances/*` and renders one per-instance Application
  # pointing at the `instance-manager` chart.
  enabled: true
  repoURL:
    # -- Repo holding the `argo-cd/` tree (charts + instances + values).
    sources: "https://github.com/this-is-tobi/homelab.git"
    # -- Repo holding the values tree. Defaults to `sources`.
    values: ""
  # -- Default git revision (branch, tag, commit) used to read the instance
  # folders and the `instance-manager` chart.
  targetRevision: "main"

projects:
  # AppProjects are split per scope to mirror real platform/tenant boundaries.
  # Adjust whitelists per scope to enforce stricter RBAC on tenant apps.
  core:
    # -- Render the `core` AppProject.
    enabled: true
    # -- Project name (referenced by `argo-cd/instances/<inst>/instance.yaml.projects.core`).
    name: "admin-core"
    description: "Homelab platform/core tier (infra, identity, observability, security)"
    sourceRepos:
    - 'https://github.com/this-is-tobi/homelab.git'
    destinations:
    - namespace: '*'
      server: 'https://kubernetes.default.svc'
    clusterResourceWhitelist:
    - group: ''
      kind: 'Namespace'
    - group: 'rbac.authorization.k8s.io'
      kind: 'ClusterRole'
    - group: 'rbac.authorization.k8s.io'
      kind: 'ClusterRoleBinding'
    - group: 'apiextensions.k8s.io'
      kind: 'CustomResourceDefinition'
    - group: 'admissionregistration.k8s.io'
      kind: 'MutatingWebhookConfiguration'
    - group: 'admissionregistration.k8s.io'
      kind: 'ValidatingWebhookConfiguration'
    - group: 'scheduling.k8s.io'
      kind: 'PriorityClass'
    - group: 'storage.k8s.io'
      kind: 'StorageClass'
    - group: 'storage.k8s.io'
      kind: 'CSIDriver'
    - group: 'networking.k8s.io'
      kind: 'IngressClass'
    - group: 'apiregistration.k8s.io'
      kind: 'APIService'
    - group: 'cert-manager.io'
      kind: '*'
    - group: 'kyverno.io'
      kind: '*'
    - group: 'policies.kyverno.io'
      kind: '*'
    - group: 'policy'
      kind: 'PodSecurityPolicy'
    - group: 'gateway.networking.k8s.io'
      kind: '*'
    - group: 'cilium.io'
      kind: '*'
    clusterResourceBlacklist: []
    namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
    namespaceResourceBlacklist: []
    roles:
    - name: admin
      description: Admin keycloak group
      groups:
      - admin
      policies:
      - p, proj:admin-core:admin, applications, *, admin-core/*, allow
    sourceNamespaces: []
  tenant:
    # -- Render the `tenant` AppProject.
    enabled: true
    # -- Project name (referenced by `argo-cd/instances/<inst>/instance.yaml.projects.tenant`).
    name: "admin-tenant"
    description: "Homelab tenant/apps tier (user-facing services)"
    sourceRepos:
    - 'https://github.com/this-is-tobi/homelab.git'
    destinations:
    - namespace: '*'
      server: 'https://kubernetes.default.svc'
    clusterResourceWhitelist:
    - group: ''
      kind: 'Namespace'
    - group: 'networking.k8s.io'
      kind: 'Ingress'
    - group: 'networking.k8s.io'
      kind: 'IngressClass'
    - group: 'rbac.authorization.k8s.io'
      kind: 'ClusterRole'
    - group: 'rbac.authorization.k8s.io'
      kind: 'ClusterRoleBinding'
    - group: 'cert-manager.io'
      kind: '*'
    - group: 'apiextensions.k8s.io'
      kind: 'CustomResourceDefinition'
    - group: 'gateway.networking.k8s.io'
      kind: '*'
    clusterResourceBlacklist: []
    namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
    namespaceResourceBlacklist: []
    roles:
    - name: admin
      description: Admin keycloak group
      groups:
      - admin
      policies:
      - p, proj:admin-tenant:admin, applications, *, admin-tenant/*, allow
    sourceNamespaces: []

initSecrets:
  # -- Enable Vault init secrets job.
  enabled: true
  # -- Vault role used for authentication.
  vaultRole: "vault-init-secrets"
  # -- Whether to skip TLS verification when connecting to Vault.
  skipTLSVerify: false
  # -- Backoff limit for the init job.
  backoffLimit: 3
  # -- TTL in seconds after which the job will be cleaned up.
  ttlSecondsAfterFinished: 86400
  # -- Init job container image.
  image: "ghcr.io/this-is-tobi/tools/homelab-utils:latest"
  resources:
    requests:
      # -- CPU requests for the init job container.
      cpu: "50m"
      # -- Memory requests for the init job container.
      memory: "64Mi"
    limits:
      # -- CPU limits for the init job container.
      cpu: "200m"
      # -- Memory limits for the init job container.
      memory: "128Mi"
  # -- List of secrets to initialize in Vault.
  # Secrets to initialize using template syntax:
  # - <random:N> generates random alphanumeric string of length N
  # - <uuid> generates UUID v4
  # - <age:secret> generates age secret key
  # - <age:public> generates age public key (pair with secret key)
  # - Static values remain as-is
  # Supports nested JSON structure for organizing related secrets
  secrets:
  - path: "homelab/platforms/production/cert-manager"
    data:
      email: "this-is-tobi@proton.me"
      scaleway:
        accessKey: ""
        secretKey: ""
        projectId: ""
        domain: "ohmlab.fr"
  - path: "homelab/platforms/production/argo-cd"
    data:
      admin:
        username: "admin"
        password: "<random:24>"
      keycloak:
        endpoint: "https://sso.ohmlab.fr"
        realm: "homelab"
        clientId: "argo-cd"
        clientSecret: "<random:32>"
  - path: "homelab/platforms/production/gitea"
    data:
      admin:
        username: "admin"
        password: "<random:24>"
      postgres:
        admin:
          username: "postgres"
          password: "<random:24>"
        app:
          username: "gitea"
          password: "<random:24>"
        database: "gitea"
        host: "gitea-pg-cluster-rw"
        port: "5432"
        s3:
          accessKey: ""
          bucketName: "ohmlab-backups"
          bucketPrefix: "cnpg"
          endpoint: "https://s3.fr-par.scw.cloud"
          region: "fr-par"
          secretKey: ""
      keycloak:
        endpoint: "https://sso.ohmlab.fr"
        realm: "homelab"
        clientId: "gitea"
        clientSecret: "<random:32>"
  - path: "homelab/platforms/production/mattermost"
    data:
      admin:
        username: "admin"
        password: "<random:24>"
      postgres:
        admin:
          username: "postgres"
          password: "<random:24>"
        app:
          username: "mattermost"
          password: "<random:24>"
        database: "mattermost"
        host: "mattermost-pg-cluster-rw"
        port: "5432"
        s3:
          accessKey: ""
          bucketName: "ohmlab-backups"
          bucketPrefix: "cnpg"
          endpoint: "https://s3.fr-par.scw.cloud"
          region: "fr-par"
          secretKey: ""
      s3:
        accessKey: ""
        bucketName: "ohmlab-backups"
        bucketPrefix: "cnpg"
        endpoint: "https://s3.fr-par.scw.cloud"
        region: "fr-par"
        secretKey: ""
      keycloak:
        endpoint: "https://sso.ohmlab.fr"
        realm: "homelab"
        clientId: "mattermost"
        clientSecret: "<random:32>"
  - path: "homelab/platforms/production/rustfs"
    data:
      admin:
        accessKey: "<random:16>"
        secretKey: "<random:32>"
  - path: "homelab/platforms/production/prometheus-stack"
    data:
      admin:
        username: "admin"
        password: "<random:24>"
      keycloak:
        endpoint: "https://sso.ohmlab.fr"
        realm: "homelab"
        clientId: "grafana"
        clientSecret: "<random:32>"
  - path: "homelab/platforms/production/keycloak"
    data:
      admin:
        username: "admin"
        password: "<random:24>"
      extras:
        realm: "homelab"
        rootDomain: "ohmlab.fr"
      postgres:
        admin:
          username: "postgres"
          password: "<random:24>"
        app:
          username: "keycloak"
          password: "<random:24>"
        database: "keycloak"
        host: "keycloak-pg-cluster-rw"
        port: "5432"
        s3:
          accessKey: ""
          bucketName: "ohmlab-backups"
          bucketPrefix: "cnpg"
          endpoint: "https://s3.fr-par.scw.cloud"
          region: "fr-par"
          secretKey: ""
  - path: "homelab/platforms/production/sops-test"
    data:
      extras:
        secret: "<age:secret>"
        public: "<age:public>"
