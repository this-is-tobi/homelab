gateway:
  enabled: false
  gatewayName: ""
  gatewayNamespace: ""
  routes: []

argo-cd:
  # -- Enable ArgoCD core deployment
  enabled: true
  # fullnameOverride: argo-cd-system-argocd
  crds:
    install: true
    keep: true
  configs:
    secret:
      argocdServerAdminPassword: "" # Add your bcrypt hashed password here
    params:
      server.insecure: true
    rbac:
      policy.csv: |
        p, role:none, *, *, */*, deny
        p, role:admin, *, *, */*, allow
        g, admin, role:admin
    policy.default: role:none
    scopes: "[groups]"
    cm:
      url: "" # Add your ArgoCD URL here
      resource.customizations: |
        networking.k8s.io/Ingress:
          health.lua: |
            hs = {}
            hs.status = "Healthy"
            return hs
  redis-ha:
    enabled: true
  redis:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  notifications:
    replicas: 1
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  controller:
    replicas: 2
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  server:
    replicas: 2
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 75
      targetMemoryUtilizationPercentage: 75
    ingress:
      enabled: true
      hostname: "" # Add your ArgoCD server hostname here
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-http-prod
      tls: false
      extraTls:
      - hosts:
        - "" # Add your ArgoCD server hostname here
        secretName: "" # Add your ArgoCD server TLS secret name here
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  applicationSet:
    enabled: true
    replicas: 2
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  dex:
    enabled: false
  repoServer:
    replicas: 2
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 75
      targetMemoryUtilizationPercentage: 75
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    initContainers: []
