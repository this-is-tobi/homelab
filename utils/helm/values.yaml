gateway:
  enabled: false
  gatewayName: ""
  gatewayNamespace: ""
  routes: []

argo-cd:
  # -- Enable ArgoCD core deployment
  enabled: true
  fullnameOverride: argocd
  crds:
    install: true
    keep: true
  configs:
    secret:
      argocdServerAdminPassword: "" # Add your bcrypt hashed password here
    params:
      # TLS end-to-end: argocd-server serves TLS itself (self-signed at bootstrap,
      # then the cert-manager issued `argocd-server-tls` secret once the ingress
      # is enabled). Instance ingress must set the APISIX upstream-scheme
      # annotation — see instances/homelab/values/core/ohmlab.yaml.
      server.insecure: false
    rbac:
      policy.csv: |
        p, role:none, *, *, */*, deny
        p, role:admin, *, *, */*, allow
        g, /admin, role:admin
    policy.default: role:none
    scopes: "[groups]"
    cm:
      url: "" # Add your ArgoCD URL here
      resource.customizations: |
        networking.k8s.io/Ingress:
          health.lua: |
            hs = {}
            hs.status = "Healthy"
            return hs
  redis-ha:
    enabled: true
    fullnameOverride: argocd-redis-ha
    redis:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
    sentinel:
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 200m
          memory: 128Mi
    haproxy:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
      init:
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
    init:
      resources:
        limits:
          cpu: 100m
          memory: 64Mi
    splitBrainDetection:
      resources:
        limits:
          cpu: 100m
          memory: 64Mi
  redis:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  notifications:
    replicas: 1
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  controller:
    replicas: 2
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  server:
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 75
      targetMemoryUtilizationPercentage: 75
    ingress:
      enabled: false
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  applicationSet:
    enabled: true
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  dex:
    enabled: false
  repoServer:
    replicas: 2
    # Also applied to the copyutil init container (chart default fallback).
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 75
      targetMemoryUtilizationPercentage: 75
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

# VSO (Vault Secrets Operator) integration for the core ArgoCD in argocd-system.
# Disabled by default so bootstrap (run.sh) can run before vault-operator / VSO
# are deployed. Enabled in ohmlab.yaml once the full stack is running.
vso:
  # -- Enable VSO integration. Set to true in instance values AFTER vault-operator
  # is deployed so VaultStaticSecret CRDs are available.
  enabled: false
  extraObjects: []
  vaultAuth:
    default:
      method: kubernetes
      mount: kubernetes
      kubernetes:
        role: ""
        serviceAccount: vso
  vaultConnection:
    default:
      address: "https://vault.vault-operator-system.svc.cluster.local:8200"
      skipTLSVerify: false
      caCertSecretRef: vault-ca
  vaultStaticSecrets: {}

rootManager:
  # -- Enable the root `manager` ApplicationSet that discovers every instance
  # under `argo-cd/instances/*` and renders one per-instance Application
  # pointing at the `instance-manager` chart.
  enabled: true
  repoURL:
    # -- Repo holding the `argo-cd/` tree (charts + instances + values).
    sources: "https://github.com/this-is-tobi/homelab.git"
    # -- Repo holding the values tree. Defaults to `sources`.
    values: ""
  # -- Default git revision (branch, tag, commit) used to read the instance
  # folders and the `instance-manager` chart.
  targetRevision: main

projects:
  # AppProjects are split per scope to mirror real platform/tenant boundaries.
  # Adjust whitelists per scope to enforce stricter RBAC on tenant apps.
  core:
    # -- Render the `core` AppProject.
    enabled: true
    # -- Project name (referenced by `argo-cd/instances/<inst>/instance.yaml.projects.core`).
    name: admin-core
    description: "Homelab platform/core tier (infra, identity, observability, security)"
    sourceRepos:
    - "https://github.com/this-is-tobi/homelab.git"
    destinations:
    - namespace: "*"
      server: "https://kubernetes.default.svc"
    clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: scheduling.k8s.io
      kind: PriorityClass
    - group: storage.k8s.io
      kind: StorageClass
    - group: storage.k8s.io
      kind: CSIDriver
    - group: networking.k8s.io
      kind: IngressClass
    - group: apiregistration.k8s.io
      kind: APIService
    - group: cert-manager.io
      kind: "*"
    - group: kyverno.io
      kind: "*"
    - group: policies.kyverno.io
      kind: "*"
    - group: policy
      kind: PodSecurityPolicy
    - group: gateway.networking.k8s.io
      kind: "*"
    - group: cilium.io
      kind: "*"
    clusterResourceBlacklist: []
    namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
    namespaceResourceBlacklist: []
    roles:
    - name: admin
      description: Admin keycloak group
      groups:
      - admin
      policies:
      - p, proj:admin-core:admin, applications, *, admin-core/*, allow
    sourceNamespaces: []
  tenant:
    # -- Render the `tenant` AppProject.
    enabled: true
    # -- Project name (referenced by `argo-cd/instances/<inst>/instance.yaml.projects.tenant`).
    name: admin-tenant
    description: Homelab tenant/apps tier (user-facing services)
    sourceRepos:
    - "https://github.com/this-is-tobi/homelab.git"
    destinations:
    - namespace: "*"
      server: "https://kubernetes.default.svc"
    clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: networking.k8s.io
      kind: Ingress
    - group: networking.k8s.io
      kind: IngressClass
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: cert-manager.io
      kind: "*"
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: gateway.networking.k8s.io
      kind: "*"
    clusterResourceBlacklist: []
    namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
    namespaceResourceBlacklist: []
    roles:
    - name: admin
      description: Admin keycloak group
      groups:
      - admin
      policies:
      - p, proj:admin-tenant:admin, applications, *, admin-tenant/*, allow
    sourceNamespaces: []
