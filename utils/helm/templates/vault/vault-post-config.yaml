{{- if and (.Values.vault).enabled ((.Values.ohmlab.vault).enabled) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-post-config
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-weight: "-5"
    argocd.argoproj.io/sync-wave: "-1"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-post-config
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-weight: "-5"
    argocd.argoproj.io/sync-wave: "-1"
rules:
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  resourceNames: ["vault-post-config"]
  verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-post-config
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-weight: "-5"
    argocd.argoproj.io/sync-wave: "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-post-config
subjects:
- kind: ServiceAccount
  name: vault-post-config
  namespace: {{ .Release.Namespace }}

---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-post-config-{{ .Release.Revision | default "1" }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-weight: "10"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app.kubernetes.io/name: vault-post-config
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  backoffLimit: {{ .Values.ohmlab.vault.config.backoffLimit | default 3 }}
  ttlSecondsAfterFinished: {{ .Values.ohmlab.vault.config.ttlSecondsAfterFinished | default 86400 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault-post-config
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: vault-post-config
      restartPolicy: Never
      {{- if .Values.ohmlab.vault.config.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.ohmlab.vault.config.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.ohmlab.vault.config.tolerations }}
      tolerations:
        {{- toYaml .Values.ohmlab.vault.config.tolerations | nindent 8 }}
      {{- end }}
      initContainers:
      - name: wait-for-vault
        image: {{ .Values.ohmlab.vault.config.image | default "docker.io/curlimages/curl:8.5.0" }}
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Waiting for Vault to be ready..."
          max_attempts=60
          attempt=0

          while [ $attempt -lt $max_attempts ]; do
            if curl -k -s {{ .Values.vault.vaultAddr | default (printf "https://%s.%s.svc.cluster.local:8200" .Values.vault.name .Release.Namespace) }}/v1/sys/health | grep -q "initialized"; then
              echo "Vault is ready!"
              exit 0
            fi
            echo "Waiting for Vault... (attempt $((attempt+1))/$max_attempts)"
            sleep 5
            attempt=$((attempt+1))
          done

          echo "Timeout waiting for Vault to become ready"
          exit 1
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 32Mi
      containers:
      - name: init-secrets
        image: {{ .Values.ohmlab.vault.config.image | default "ghcr.io/this-is-tobi/homelab/utils:latest" }}
        command:
        - /bin/sh
        - -c
        - |
          set -e

          # Write secrets config from Helm values into a temp file
          cat <<'SECRETS_CONFIG_EOF' > /tmp/secrets-config.json
          [
          {{- range $idx, $secret := .Values.ohmlab.vault.secrets }}
          {{- if $idx }},{{ end }}
          {
            "path": {{ $secret.path | quote }},
            "data": {{ $secret.data | toJson }}
          }
          {{- end }}
          ]
          SECRETS_CONFIG_EOF

          # Run the Go binary
          ohmlab vault init \
            --vault-addr={{ .Values.vault.vaultAddr | default (printf "https://%s.%s.svc.cluster.local:8200" .Values.vault.name .Release.Namespace) | quote }} \
            {{- if .Values.ohmlab.vault.config.skipTLSVerify }}
            --skip-tls-verify \
            {{- else }}
            --ca-cert=/vault-ca/ca.crt \
            {{- end }}
            --auth-method={{ .Values.ohmlab.vault.config.authMethod | default "kubernetes" }} \
            --auth-mount={{ .Values.ohmlab.vault.config.authMount | default "kubernetes" }} \
            --role={{ .Values.ohmlab.vault.config.vaultRole | default "vault-post-config" | quote }} \
            --config=/tmp/secrets-config.json
        resources:
          {{- toYaml .Values.ohmlab.vault.config.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
{{- end }}
