---
# FINAL-FLIP cleanup: flannel → Cilium (rolling migration, step 6)
# Runbook of record: .local/cilium-migration-plan.md (F8).
#
# In the ROLLING flow this runs only at the END, per node (serial: 1), AFTER
# all 9 nodes are already Cilium-managed via the CiliumNodeConfig/label
# mechanism — it removes the now-dead flannel/kube-router state so K3s can
# restart with:  --flannel-backend=none --disable-network-policy
# Do NOT pass --disable-kube-proxy: phase 1 keeps kube-proxy so Cilium never
# attaches BPF to the physical uplink (the May 2026 SSH-lockout root cause).
#
# Run with: --tags cilium-migrate  (after updating group_vars/k3s.yml flags)
# This play STOPS K3s and leaves it stopped — follow with the deploy plays to
# re-template the systemd units with the new flags and start K3s again:
#   ansible-playbook install.yml --tags cilium-migrate,k3s-masters --limit <master>
#   ansible-playbook install.yml --tags cilium-migrate,k3s-workers --limit <worker>
# Arm the watchdog fleet-wide BEFORE the first canary (does not touch k3s):
#   --tags cilium-watchdog

- name: Arm the cilium-watchdog dead-man switch
  ansible.builtin.include_tasks: cilium-watchdog.yml

- name: Stop K3s service
  ansible.builtin.systemd:
    name: k3s
    state: stopped
  ignore_errors: true

- name: Detach stale BPF programs from the uplink
  # Full binary paths on purpose — bare `tc` silently failed on some nodes
  # during the previous attempt (not in PATH for non-login contexts).
  ansible.builtin.shell: |
    IP=/usr/sbin/ip; [ -x "$IP" ] || IP=/sbin/ip
    TC=/usr/sbin/tc; [ -x "$TC" ] || TC=/sbin/tc
    $IP link set dev {{ cilium_watchdog_iface | default('eth0') }} xdp off 2>/dev/null || true
    $TC qdisc del dev {{ cilium_watchdog_iface | default('eth0') }} clsact 2>/dev/null || true
  changed_when: false

- name: Clean up flannel interfaces and state
  # NOTE (rolling flow): cilium_* interfaces and the k3s-dir 05-cilium.conflist
  # belong to the LIVE cilium install at this point — they are recreated by the
  # agent after the K3s restart; deleting them here still yields a clean start.
  ansible.builtin.shell: |
    ip link delete flannel.1 2>/dev/null || true
    ip link delete cni0 2>/dev/null || true
    ip link delete cilium_host 2>/dev/null || true
    ip link delete cilium_net 2>/dev/null || true
    ip link delete cilium_vxlan 2>/dev/null || true
    rm -rf /run/flannel 2>/dev/null || true
    rm -rf /var/lib/cni/ 2>/dev/null || true
    rm -f /var/lib/rancher/k3s/agent/etc/cni/net.d/10-flannel.conflist 2>/dev/null || true
    rm -f /var/lib/rancher/k3s/agent/etc/cni/net.d/05-cilium.conflist 2>/dev/null || true
    rm -f /var/lib/rancher/k3s/agent/etc/cni/net.d/*.cilium_bak 2>/dev/null || true
    # May 2026 residue: written to paths k3s containerd never reads (plan F3)
    rm -f /etc/cni/net.d/05-cilium.conflist 2>/dev/null || true
    rm -f /opt/cni/bin/cilium-cni 2>/dev/null || true
  changed_when: false
  ignore_errors: true

- name: Flush iptables rules left by kube-proxy and flannel
  ansible.builtin.shell: |
    # Use K3s bundled iptables-nft if available, fall back to system
    IPT="{{ k3sDataDir | default('/var/lib/rancher/k3s') }}/data/current/bin/aux/iptables"
    [ -x "$IPT" ] || IPT="iptables"
    $IPT -F 2>/dev/null || true
    $IPT -t nat -F 2>/dev/null || true
    $IPT -t mangle -F 2>/dev/null || true
    $IPT -X 2>/dev/null || true
    $IPT -t nat -X 2>/dev/null || true
    $IPT -t mangle -X 2>/dev/null || true
  changed_when: false
  ignore_errors: true

- name: Clean BPF filesystem
  ansible.builtin.shell: |
    # Remove Cilium BPF state from previous runs
    rm -rf /sys/fs/bpf/tc 2>/dev/null || true
    rm -rf /sys/fs/bpf/cilium 2>/dev/null || true
  changed_when: false
  ignore_errors: true

- name: Verify the uplink carries no BPF programs (phase-1 acceptance gate)
  ansible.builtin.shell: |
    TC=/usr/sbin/tc; [ -x "$TC" ] || TC=/sbin/tc
    $TC filter show dev {{ cilium_watchdog_iface | default('eth0') }} ingress 2>/dev/null
    $TC filter show dev {{ cilium_watchdog_iface | default('eth0') }} egress 2>/dev/null
  register: uplink_bpf_check
  changed_when: false

- name: Report uplink BPF state (must be empty)
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }} uplink BPF filters: {{ uplink_bpf_check.stdout | default('') | trim | ternary(uplink_bpf_check.stdout_lines, 'CLEAN') }}"
