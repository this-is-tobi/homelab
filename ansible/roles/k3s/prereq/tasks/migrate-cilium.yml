---
# FINAL-FLIP cleanup: retire flannel + kube-router on a node where Cilium is
# ALREADY the live CNI (rolling migration step 6 — .local/cilium-migration-plan.md).
#
# ⚠ Cilium is RUNNING on the node when this executes: the agent pod survives
# k3s restarts and does NOT recreate its interfaces/conf/BPF state on its
# own. This task therefore only removes flannel/kube-router/May-2026 residue
# and MUST NOT touch: cilium_* interfaces, the k3s-dir 05-cilium.conflist,
# /var/lib/cni (live libcni result cache), or /sys/fs/bpf (live BPF state).
# The iptables cleanup is KUBE-ROUTER-targeted — a full flush would wipe
# Cilium's masquerade chains and kube-proxy's service rules.
#
# Run per node together with the deploy play (re-templates the unit with the
# new flags — flannel-backend=none is a CRITICAL flag, flip pi3 first):
#   ansible-playbook install.yml --tags k3s-masters,cilium-migrate --limit pi3
#   ansible-playbook install.yml --tags k3s-workers,cilium-migrate --limit pi8
# Play order runs the deploy play (unit + restart) BEFORE this cleanup; this
# task stops K3s, cleans, and starts it again itself.
# Watchdog-only arming (safe anytime): --tags cilium-watchdog

- name: Arm the cilium-watchdog dead-man switch
  ansible.builtin.include_tasks: cilium-watchdog.yml

- name: Ensure containerd drop-in directory exists
  ansible.builtin.file:
    path: "{{ k3sDataDir | default('/var/lib/rancher/k3s') }}/agent/etc/containerd/config-v3.toml.d"
    state: directory
    mode: "0755"

- name: Pin containerd CNI dirs — k3s omits them with flannel-backend=none (F19)
  # With --flannel-backend=none k3s no longer templates the CNI section into
  # containerd's config.toml, so containerd 2.x falls back to its built-in
  # defaults /etc/cni/net.d + /opt/cni/bin (empty here) → kubelet NotReady
  # with "cni plugin not initialized". This drop-in is picked up by the
  # default imports glob in config.toml and survives every k3s regeneration.
  # Values are identical to what flannel-mode k3s writes, so it is inert on
  # nodes that have not flipped yet.
  ansible.builtin.copy:
    dest: "{{ k3sDataDir | default('/var/lib/rancher/k3s') }}/agent/etc/containerd/config-v3.toml.d/10-cni.toml"
    content: |
      [plugins.'io.containerd.cri.v1.runtime'.cni]
        bin_dirs = ["{{ k3sDataDir | default('/var/lib/rancher/k3s') }}/data/cni"]
        conf_dir = "{{ k3sDataDir | default('/var/lib/rancher/k3s') }}/agent/etc/cni/net.d"
    mode: "0644"

- name: Stop K3s service
  ansible.builtin.systemd:
    name: k3s
    state: stopped
  ignore_errors: true

- name: Remove flannel interfaces and residue (Cilium assets untouched)
  ansible.builtin.shell: |
    ip link delete flannel.1 2>/dev/null || true
    ip link delete cni0 2>/dev/null || true
    rm -rf /run/flannel 2>/dev/null || true
    rm -f /var/lib/rancher/k3s/agent/etc/cni/net.d/10-flannel.conflist 2>/dev/null || true
    rm -f /var/lib/rancher/k3s/agent/etc/cni/net.d/*.cilium_bak 2>/dev/null || true
    # May 2026 residue: written to paths k3s containerd never reads (plan F3)
    rm -f /etc/cni/net.d/05-cilium.conflist 2>/dev/null || true
    rm -f /opt/cni/bin/cilium-cni 2>/dev/null || true
  changed_when: false
  ignore_errors: true

- name: Remove kube-router netpol chains (targeted, never a full flush)
  # k3s docs method — preserves Cilium masquerade + kube-proxy service rules.
  ansible.builtin.shell: |
    IPT="{{ k3sDataDir | default('/var/lib/rancher/k3s') }}/data/current/bin/aux/iptables-save"
    IPTR="{{ k3sDataDir | default('/var/lib/rancher/k3s') }}/data/current/bin/aux/iptables-restore"
    [ -x "$IPT" ] || { IPT=iptables-save; IPTR=iptables-restore; }
    $IPT 2>/dev/null | grep -v KUBE-ROUTER | $IPTR 2>/dev/null || true
    ip6tables-save 2>/dev/null | grep -v KUBE-ROUTER | ip6tables-restore 2>/dev/null || true
  changed_when: false
  ignore_errors: true

- name: Start K3s service
  ansible.builtin.systemd:
    name: k3s
    state: started

- name: Acceptance gate — uplink clean, flannel gone, kube-router gone, CRI net ready
  ansible.builtin.shell: |
    TC=/usr/sbin/tc; [ -x "$TC" ] || TC=/sbin/tc
    echo "tc-ingress:$($TC filter show dev {{ cilium_watchdog_iface | default('eth0') }} ingress 2>/dev/null | wc -l)"
    echo "tc-egress:$($TC filter show dev {{ cilium_watchdog_iface | default('eth0') }} egress 2>/dev/null | wc -l)"
    echo "flannel-ifaces:$(ip link show 2>/dev/null | grep -cE 'flannel\.1|cni0')"
    echo "kube-router-rules:$(iptables-save 2>/dev/null | grep -c KUBE-ROUTER)"
    # F19 regression guard: containerd must report NetworkReady, otherwise
    # kubelet goes NotReady with "cni plugin not initialized" (60s grace for
    # containerd to come up and rescan the conf dir after k3s start).
    # crictl prints it inside a conditions array:
    #   {"type": "NetworkReady", "status": true, ...}
    NR=unknown
    for i in $(seq 1 12); do
      if k3s crictl info 2>/dev/null | tr -d ' \n\t' | grep -Eqi '"type":"NetworkReady","status":true|"networkready":true'; then
        NR=true
        break
      fi
      sleep 5
    done
    [ "$NR" = "true" ] || echo "crictl-diag:$(k3s crictl info 2>&1 | head -c 200 | tr '\n' ' ')"
    echo "cri-networkReady:${NR}"
  register: flip_gate
  changed_when: false
  failed_when: "'cri-networkReady:true' not in flip_gate.stdout"

- name: Report acceptance gate (want tc 0/0, flannel 0, kube-router 0, networkReady true)
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }}: {{ flip_gate.stdout_lines | join(' | ') }}"
