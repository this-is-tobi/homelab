---
- name: Get current Debian codename
  ansible.builtin.command: lsb_release -cs
  register: common_dist_upgrade_current_result
  changed_when: false

- name: Set codename facts
  ansible.builtin.set_fact:
    common_dist_upgrade_current: "{{ common_dist_upgrade_current_result.stdout }}"
    common_dist_upgrade_target: "{{ common_dist_upgrade_target_release }}"

- name: Skip if already on target release
  ansible.builtin.meta: end_host
  when: common_dist_upgrade_current == common_dist_upgrade_target

- name: Display upgrade plan
  ansible.builtin.debug:
    msg: >-
      Upgrading {{ inventory_hostname }} from
      {{ common_dist_upgrade_current }} to {{ common_dist_upgrade_target }}

# --- Pre-flight checks ---
- name: Check available disk space
  ansible.builtin.shell: |
    set -o pipefail
    df --output=avail / | tail -1
  args:
    executable: /bin/bash
  register: common_dist_upgrade_disk_space
  changed_when: false

- name: Fail if less than 1 GB free
  ansible.builtin.fail:
    msg: >-
      Only {{ (common_dist_upgrade_disk_space.stdout | int / 1024) | int }}
      MB free on /. At least 1 GB required for dist-upgrade.
  when: (common_dist_upgrade_disk_space.stdout | int) < 1048576

- name: Ensure dpkg is in a clean state
  ansible.builtin.command: dpkg --audit
  register: common_dist_upgrade_dpkg_audit
  changed_when: false
  failed_when: common_dist_upgrade_dpkg_audit.stdout | length > 0

# --- K3s drain (only for cluster nodes) ---
- name: Drain K3s node before upgrade
  delegate_to: localhost
  become: false
  ansible.builtin.command: >-
    kubectl drain {{ inventory_hostname }}
    --ignore-daemonsets
    --delete-emptydir-data
    --disable-eviction
    --timeout={{ common_dist_upgrade_drain_timeout }}s
  register: common_dist_upgrade_drain_result
  changed_when: "'evicting pod' in common_dist_upgrade_drain_result.stdout"
  when: inventory_hostname in groups.get('k3s', [])

# --- Converge Raspberry Pi kernel packaging ---
- name: Fix legacy raspi repo URL (.org -> .com)
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/raspi.list
    regexp: 'archive\.raspberrypi\.org'
    replace: 'archive.raspberrypi.com'
  register: common_dist_upgrade_raspi_url

- name: Fix raspi repo codename to match current release
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/raspi.list
    regexp: '\bbullseye\b'
    replace: "{{ common_dist_upgrade_current }}"
  register: common_dist_upgrade_raspi_codename

- name: Update apt cache after raspi repo fix
  ansible.builtin.apt:
    update_cache: true
  when: >-
    common_dist_upgrade_raspi_url is changed or
    common_dist_upgrade_raspi_codename is changed

- name: Check if legacy raspberrypi-kernel is installed
  ansible.builtin.command: dpkg-query -W -f='${Status}' raspberrypi-kernel
  register: common_dist_upgrade_legacy_kernel
  changed_when: false
  failed_when: false

- name: Migrate from raspberrypi-kernel to linux-image-rpi-v8
  when: >-
    common_dist_upgrade_legacy_kernel.stdout is defined and
    'install ok installed' in common_dist_upgrade_legacy_kernel.stdout
  block:
    - name: Install modern kernel meta-package
      ansible.builtin.apt:
        name: linux-image-rpi-v8
        state: present
        update_cache: true

    - name: Remove legacy kernel package
      ansible.builtin.apt:
        name: raspberrypi-kernel
        state: absent
        purge: true

- name: Check if running kernel matches installed
  ansible.builtin.shell: |
    set -o pipefail
    RUNNING=$(uname -r)
    INSTALLED=$(dpkg -l | grep '^ii.*linux-image-[0-9]' \
      | awk '{print $2}' | sed 's/linux-image-//' | sort -V | tail -1)
    if [ "$RUNNING" != "$INSTALLED" ]; then
      echo "MISMATCH: running=$RUNNING installed=$INSTALLED"
      exit 1
    fi
  args:
    executable: /bin/bash
  register: common_dist_upgrade_kernel_check
  changed_when: false
  failed_when: false

- name: Reboot to load latest installed kernel
  ansible.builtin.reboot:
    msg: "Rebooting to converge kernel before dist-upgrade"
    reboot_timeout: 300
  when: common_dist_upgrade_kernel_check.rc != 0

# --- Replace apt sources ---
- name: Check if /etc/apt/sources.list exists
  ansible.builtin.stat:
    path: /etc/apt/sources.list
  register: common_dist_upgrade_sources_list

- name: Replace codename in /etc/apt/sources.list
  ansible.builtin.replace:
    path: /etc/apt/sources.list
    regexp: "{{ common_dist_upgrade_current }}"
    replace: "{{ common_dist_upgrade_target }}"
  when: common_dist_upgrade_sources_list.stat.exists

- name: Find all source files in sources.list.d
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns: "*.list,*.sources"
  register: common_dist_upgrade_source_files

- name: Replace codename in sources.list.d files
  ansible.builtin.replace:
    path: "{{ item.path }}"
    regexp: "{{ common_dist_upgrade_current }}"
    replace: "{{ common_dist_upgrade_target }}"
  loop: "{{ common_dist_upgrade_source_files.files }}"
  loop_control:
    label: "{{ item.path }}"

# --- Upgrade ---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Full dist-upgrade
  ansible.builtin.apt:
    upgrade: dist
    dpkg_options: "force-confold,force-confdef"
  environment:
    DEBIAN_FRONTEND: noninteractive
    NEEDRESTART_MODE: a

- name: Remove unused packages
  ansible.builtin.apt:
    autoremove: true
    purge: true

# --- Reboot ---
- name: Reboot into new release
  ansible.builtin.reboot:
    msg: "Rebooting after dist-upgrade to {{ common_dist_upgrade_target }}"
    reboot_timeout: 600

# --- K3s uncordon and validate ---
- name: Wait for K3s node to be Ready
  delegate_to: localhost
  become: false
  ansible.builtin.command: >-
    kubectl wait --for=condition=Ready
    node/{{ inventory_hostname }}
    --timeout={{ common_dist_upgrade_drain_timeout }}s
  changed_when: false
  when: inventory_hostname in groups.get('k3s', [])

- name: Uncordon K3s node after upgrade
  delegate_to: localhost
  become: false
  ansible.builtin.command: >-
    kubectl uncordon {{ inventory_hostname }}
  register: common_dist_upgrade_uncordon_result
  changed_when: "'uncordoned' in common_dist_upgrade_uncordon_result.stdout"
  when: inventory_hostname in groups.get('k3s', [])

# --- Verify ---
- name: Verify new release
  ansible.builtin.command: lsb_release -a
  register: common_dist_upgrade_new_release
  changed_when: false

- name: Display new release info
  ansible.builtin.debug:
    var: common_dist_upgrade_new_release.stdout_lines
