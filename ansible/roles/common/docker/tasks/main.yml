---
- name: Remove stale Docker apt sources (pre-keyrings)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/download_docker_com_linux_debian.list

- name: Install required system packages
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
    update_cache: true
  loop:
    - ca-certificates
    - curl
    - gnupg
    - lsb-release
    # deb822_repository (below) shells out to python3-debian on the target
    # host to parse/write the sources file — not installed by default.
    - python3-debian

- name: Ensure keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key (as .asc)
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: true

- name: Map architectures
  ansible.builtin.set_fact:
    common_docker_arch_map:
      x86_64: amd64
      armv7l: armhf
      armhf: armhf
      aarch64: arm64
      arm64: arm64

- name: Set docker_arch
  ansible.builtin.set_fact:
    common_docker_arch: "{{ common_docker_arch_map.get(ansible_facts['architecture'], ansible_facts['architecture']) }}"

- name: Remove legacy Docker repository list
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/docker.list
    state: absent

- name: Add Docker repository
  ansible.builtin.deb822_repository:
    name: docker
    types: deb
    uris: https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: stable
    architectures: "{{ common_docker_arch }}"
    signed_by: /etc/apt/keyrings/docker.asc
    state: present

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Install Docker
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
    update_cache: true
  loop:
    - docker-ce
    - docker-ce-cli
    - containerd.io
    - docker-buildx-plugin
    - docker-compose-plugin

- name: Add user to the docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    state: present
    append: true
  no_log: true
  notify: reboot

- name: Enable and check docker service
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
