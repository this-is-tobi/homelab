---
- name: Disable unnecessary services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
  loop: "{{ common_hardening_disable_services }}"
  ignore_errors: true

- name: Remove unnecessary packages
  ansible.builtin.apt:
    name: "{{ common_hardening_remove_packages }}"
    state: absent
    purge: true
  register: common_hardening_pkg_result
  ignore_errors: true

- name: Autoremove unused dependencies
  ansible.builtin.apt:
    autoremove: true
    purge: true
  when: common_hardening_autoremove and common_hardening_pkg_result is succeeded

- name: Deploy kernel hardening sysctl
  ansible.builtin.template:
    src: sysctl-hardening.conf.j2
    dest: /etc/sysctl.d/99-hardening.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload sysctl

- name: Populate /etc/hosts with cluster nodes
  ansible.builtin.template:
    src: hosts.j2
    dest: /etc/hosts
    owner: root
    group: root
    mode: "0644"

# rsyslog restores /var/log/auth.log (bookworm is journald-only by default),
# which the in-cluster CrowdSec agents tail for SSH attack detection.
- name: Install unattended-upgrades and rsyslog
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - rsyslog
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable periodic unattended security upgrades
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: /etc/apt/apt.conf.d/{{ item }}
    owner: root
    group: root
    mode: "0644"
  loop:
    - 20auto-upgrades
    - 52unattended-upgrades-security

- name: Enable rsyslog
  ansible.builtin.systemd:
    name: rsyslog
    state: started
    enabled: true

# Cap the persistent journal: unbounded journals grind SD cards and the
# nodes also ship logs to rsyslog/CrowdSec now.
- name: Create journald drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Cap persistent journal size (SD-card wear)
  ansible.builtin.copy:
    content: |
      [Journal]
      SystemMaxUse=100M
      MaxRetentionSec=1month
    dest: /etc/systemd/journald.conf.d/90-size-cap.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart journald

# Headless servers: drop audio/camera firmware features (frees RAM, takes
# effect at next reboot — no forced reboot here).
- name: Disable unused Pi firmware features (headless)
  ansible.builtin.lineinfile:
    path: /boot/firmware/config.txt
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - { regexp: '^dtparam=audio=', line: 'dtparam=audio=off' }
    - { regexp: '^camera_auto_detect=', line: 'camera_auto_detect=0' }
  when: ansible_facts["architecture"] == "aarch64"
