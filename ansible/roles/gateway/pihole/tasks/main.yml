---
- name: Remove pihole when disabled
  when: not pihole.enabled
  block:
    - name: Stop pihole if running
      community.docker.docker_compose_v2:
        state: absent
        project_src: /services/pihole
        files:
          - docker-compose.yml
      ignore_errors: true

    - name: Remove pihole service dir
      ansible.builtin.file:
        path: /services/pihole
        state: absent

- name: Deploy pihole when enabled
  when: pihole.enabled
  block:
    - name: Set pihole password
      ansible.builtin.set_fact:
        gateway_pihole_password: "{{ lookup('ansible.builtin.password', '/dev/null', length=24, chars=['ascii_letters', 'digits']) }}"

    - name: Fetch pihole password
      delegate_to: localhost
      become: false
      ansible.builtin.copy:
        content: "{{ gateway_pihole_password }}"
        dest: "{{ playbook_dir }}/inventory/group_vars/.pihole_password"
        mode: "0600"
      when: pihole.password == ''

    - name: Create pihole service dir
      ansible.builtin.file:
        path: /services/pihole
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: Copy pihole env file
      ansible.builtin.template:
        src: pihole.env.j2
        dest: /services/pihole/.env.pihole
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: Copy docker-compose file
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: /services/pihole/docker-compose.yml
        owner: root
        group: root
        mode: "0640"

    - name: Launch pihole
      community.docker.docker_compose_v2:
        state: present
        project_src: /services/pihole
        files:
          - docker-compose.yml
