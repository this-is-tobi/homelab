---
gatewayIp: "{{ hostvars[groups['gateway'][0]]['ansible_host'] }}"
haproxy:
  version: alpine3.22
  extraKubeAllowedIps: ""
  allowedIps: 192.168.27.64/27
  statsPassword: "{{ vault_haproxy_stats_password | default('') }}"
  # --- APISIX→Traefik migration routing (.local/traefik-migration.md (local notes)) ---
  # Round 1 (2026-07-17): verified hostnames on the traefik path (node:8443).
  # git.ohmlab.fr and s3.ohmlab.fr were already dead on apisix (etcd down) —
  # traefik serving them is a strict improvement.
  # Held back: sso.core + teleport (round 2, highest stakes), vault.core
  # (needs HTTPS-upstream BackendTLSPolicy), monitoring (sync pending),
  # gitops UIs (ServersTransport cutover).
  ingressDefault: apisix         # port 80 + unmatched SNIs stay on apisix
  traefikHttpPort: 8080
  traefikHttpsPort: 8443
  traefikHosts:
  - ohmlab.fr
  - git.ohmlab.fr
  - mattermost.ohmlab.fr
  - console.s3.ohmlab.fr
  - s3.ohmlab.fr
  traefikHostSuffixes: []
pihole:
  enabled: true
  version: 2026.04.1
  domain: pihole.{{ localRootDomain }}
  password: "{{ vault_pihole_password }}"
wireguard:
  enabled: false
  version: "15"
  domain: "vpn.{{ rootDomain }}"
  password: "{{ vault_wireguard_password }}"
  ipRange: 192.168.27.x
  # allowedIps: ""
crowdsec:
  enabled: true
  version: v1.7.7
  gid: "1000"
  console_key: "{{ vault_crowdsec_console_key | default('') }}"
  console_name: pi-gw
  console_tags: gateway haproxy
  # collections: []        # override gateway_crowdsec_default_collections
  # acquis_files: []       # override gateway_crowdsec_default_acquis_files
  # acquis_docker: []      # override gateway_crowdsec_default_acquis_docker
  # whitelists: []         # override gateway_crowdsec_default_whitelists
  # memory_limit: "256M"   # override gateway_crowdsec_default_memory_limit
