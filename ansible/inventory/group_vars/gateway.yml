---
gatewayIp: "{{ hostvars[groups['gateway'][0]]['ansible_host'] }}"
haproxy:
  version: alpine3.22
  extraKubeAllowedIps: ""
  allowedIps: 192.168.27.64/27
  statsPassword: "{{ vault_haproxy_stats_password | default('') }}"
  # --- APISIX→Traefik migration routing (.local/traefik-migration.md (local notes)) ---
  # 2026-07-18: every hostname below is verified on the traefik path
  # (node:8443). APISIX's frozen data plane no longer sees pod restarts:
  # git/s3 (dead), sso.core (502 since keycloak restarted), gitops.ohmlab.fr
  # (502 since its pods restarted Jul 8) — traefik is the working path.
  # Still on apisix: monitoring.ohmlab.fr only (route dual-attach syncing).
  ingressDefault: apisix         # port 80 + unmatched SNIs stay on apisix
  traefikHttpPort: 8080
  traefikHttpsPort: 8443
  traefikHosts:
    - ohmlab.fr
    - git.ohmlab.fr
    - mattermost.ohmlab.fr
    - console.s3.ohmlab.fr
    - s3.ohmlab.fr
    # vault: BackendTLSPolicy-verified upstream, 307 on the traefik path.
    - vault.core.ohmlab.fr
    # sso: 302 via traefik; 502 via apisix (stale keycloak endpoint).
    - sso.core.ohmlab.fr
    # gitops UIs: BackendTLSPolicy-verified TLS upstream (LE cert, System
    # CAs); the tenant UI was 502 via apisix.
    - gitops.ohmlab.fr
    - appset.gitops.ohmlab.fr
    - gitops.core.ohmlab.fr
    - gitops-appset.core.ohmlab.fr
    # teleport TLS passthrough (apex + wildcard below): teleport's own cert
    # verified end-to-end via traefik.
    - teleport.core.ohmlab.fr
  traefikHostSuffixes:
    - .teleport.core.ohmlab.fr
pihole:
  enabled: true
  version: 2026.04.1
  domain: pihole.{{ localRootDomain }}
  password: "{{ vault_pihole_password }}"
wireguard:
  enabled: false
  version: "15"
  domain: "vpn.{{ rootDomain }}"
  password: "{{ vault_wireguard_password }}"
  ipRange: 192.168.27.x
  # allowedIps: ""
crowdsec:
  enabled: true
  version: v1.7.7
  gid: "1000"
  console_key: "{{ vault_crowdsec_console_key | default('') }}"
  console_name: pi-gw
  console_tags: gateway haproxy
  # collections: []        # override gateway_crowdsec_default_collections
  # acquis_files: []       # override gateway_crowdsec_default_acquis_files
  # acquis_docker: []      # override gateway_crowdsec_default_acquis_docker
  # whitelists: []         # override gateway_crowdsec_default_whitelists
  # memory_limit: "256M"   # override gateway_crowdsec_default_memory_limit
