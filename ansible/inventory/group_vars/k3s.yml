---
k3sVersion: "v1.35.3+k3s1"
k3sToken: "{{ vault_k3s_token }}"
k3sCaData: "{{ vault_k3s_ca_data }}"
k3sSystemdDir: /etc/systemd/system
k3sDataDir: /var/lib/rancher/k3s
k3sApiServerEndpoint: "{{ hostvars[groups['gateway'][0]]['ansible_host'] }}"
k3sMasterIP: "{{ hostvars[groups['masters'][0]]['ansible_host'] }}"
k3sNodeIP: "{{ ansible_facts['eth0']['ipv4']['address'] }}"
# --- CNI: Cilium (final flip 2026-07-20, runbook .local/cilium-migration-plan.md) ---
# --flannel-backend=none  : flannel retired — Cilium is the sole CNI.
# --disable-network-policy: retires the embedded kube-router netpol
#   controller — Cilium enforces the same NetworkPolicy objects.
# Do NOT pass --disable-kube-proxy — phase 1 keeps kube-proxy so Cilium never
# attaches BPF to eth0 (the May 2026 SSH-lockout root cause).
# ⚠ flannel-backend is a k3s CRITICAL flag: servers must match. Flip order:
#   pi3 FIRST (cluster-init — updates the stored reference config), then
#   pi0, pi4, then workers. Per node:
#   ansible-playbook install.yml --tags k3s-masters,cilium-migrate --limit pi3
#   ansible-playbook install.yml --tags k3s-workers,cilium-migrate --limit pi8
k3sExtraArgs: >-
  --node-name {{ inventory_hostname }}
  --node-ip={{ k3sNodeIP }}
k3sExtraServerArgs: >-
  {{ k3sExtraArgs }}
  --flannel-backend=none
  --disable-network-policy
  --tls-san {{ hostvars[groups['gateway'][0]]['ansible_host'] }}
  --disable local-storage
  --disable traefik
  --write-kubeconfig-mode 600
  --node-label node-type=master
# --etcd-arg heartbeat-interval=250  --etcd-arg election-timeout=2500
k3sExtraAgentArgs: >-
  {{ k3sExtraArgs }}
  --node-label node-type=worker
