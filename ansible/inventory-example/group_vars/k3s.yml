---
k3sVersion: "v1.35.3+k3s1"
k3sToken: "{{ vault_k3s_token }}"
k3sCaData: "{{ vault_k3s_ca_data }}"
k3sSystemdDir: /etc/systemd/system
k3sDataDir: /var/lib/rancher/k3s
k3sFlanneliface: eth0
k3sApiServerEndpoint: "{{ hostvars[groups['gateway'][0]]['ansible_host'] }}"
k3sMasterIP: "{{ hostvars[groups['masters'][0]]['ansible_host'] }}"
k3sNodeIP: "{{ ansible_facts['eth0']['ipv4']['address'] }}"
# --- CNI selection ---
# flannel (default): keep `--flannel-iface` below.
# Cilium phase 1 (SSH-safe): replace the flannel flag with
#   --flannel-backend=none --disable-network-policy
# (keep kube-proxy — do NOT pass --disable-kube-proxy; see
# argo-cd/apps/cilium/values.yaml for the full rationale).
k3sExtraArgs: >-
  --node-name {{ inventory_hostname }}  --node-ip={{ k3sNodeIP }}  --flannel-iface {{ k3sFlanneliface }}
k3sExtraServerArgs: >-
  {{ k3sExtraArgs }}  --tls-san {{ hostvars[groups['gateway'][0]]['ansible_host'] }}  --disable local-storage  --disable traefik  --write-kubeconfig-mode 600  --node-label
  node-type=master
k3sExtraAgentArgs: >-
  {{ k3sExtraArgs }}  --node-label node-type=worker

# Private registry (optional — set to true and define harbor.* vars to enable)
# k3s_registry_enabled: true
# harbor:
#   domain: "registry.example.com"
#   username: "{{ vault_harbor_username }}"
#   password: "{{ vault_harbor_password }}"
