# Secrets file — encrypt with: ansible-vault encrypt inventory/group_vars/vault.yml
#
# This file holds all sensitive values referenced by the other group_vars files
# via "{{ vault_<name> }}" lookups. Keep it encrypted at rest.
#
# Decrypt for editing:  ansible-vault decrypt inventory/group_vars/vault.yml
# Re-encrypt after:     ansible-vault encrypt inventory/group_vars/vault.yml

# all.yml secrets
vault_ansible_password: ""

# gateway.yml secrets (auto-generated on first run if left empty)
vault_pihole_password: ""
vault_wireguard_password: ""

# k3s.yml secrets (populated automatically during cluster bootstrap)
vault_k3s_token: ""
vault_k3s_ca_data: ""
