---
# All
- name: OS Upgrade
  hosts: all
  become: true
  vars_files:
    - ./inventory/group_vars/vault.yml
    - ./inventory/group_vars/all.yml
  serial: 1
  roles:
    - role: common/upgrade
  tags:
    - os-upgrade
    - never

# All
- name: Debian Dist-Upgrade
  hosts: all
  become: true
  vars_files:
    - ./inventory/group_vars/vault.yml
    - ./inventory/group_vars/all.yml
  serial: 1
  roles:
    - role: common/dist-upgrade
  tags:
    - dist-upgrade
    - never

# Gateway
- name: Setup Gateway
  hosts: gateway
  become: true
  vars_files:
    - ./inventory/group_vars/vault.yml
    - ./inventory/group_vars/all.yml
    - ./inventory/group_vars/gateway.yml
  pre_tasks:
    - name: Gather facts
      ansible.builtin.setup:
      tags: always
  roles:
    - role: common/hostname
      tags: [gateway, hostname]
    - role: common/locales
      tags: [gateway, locales]
    - role: common/ssh
      tags: [gateway, ssh]
    - role: common/hardening
      tags: [gateway, hardening]
    - role: common/docker
      tags: [gateway, docker]
    - role: gateway/haproxy
      tags: [gateway, haproxy]
    - role: gateway/wireguard
      tags: [gateway, wireguard]
    - role: gateway/pihole
      tags: [gateway, pihole]
    - role: gateway/crowdsec
      tags: [gateway, crowdsec]
  tags:
    - gateway

# K3S - Deploy
- name: Setup K3S Prerequisites
  hosts: k3s
  become: true
  vars_files:
    - ./inventory/group_vars/vault.yml
    - ./inventory/group_vars/all.yml
    - ./inventory/group_vars/k3s.yml
  roles:
    - role: common/hostname
      tags: [hostname]
    - role: common/locales
      tags: [locales]
    - role: common/ssh
      tags: [ssh]
    - role: common/hardening
      tags: [hardening]
    - role: k3s/prereq
      tags: [k3s-prereq]
    - role: k3s/download
      tags: [k3s-download]
    - role: k3s/storage
      tags: [k3s-storage]
  tags:
    - k3s
    - k3s-deploy
    - k3s-init

- name: Deploy K3S Masters
  hosts: masters
  become: true
  serial: 1
  vars_files:
    - ./inventory/group_vars/vault.yml
    - ./inventory/group_vars/all.yml
    - ./inventory/group_vars/k3s.yml
  roles:
    - role: k3s/deploy/masters
  tags:
    - k3s
    - k3s-deploy
    - k3s-masters

- name: Deploy K3S Workers
  hosts: workers
  become: true
  serial: 1
  vars_files:
    - ./inventory/group_vars/vault.yml
    - ./inventory/group_vars/all.yml
    - ./inventory/group_vars/k3s.yml
  roles:
    - role: k3s/deploy/workers
  tags:
    - k3s
    - k3s-deploy
    - k3s-workers

- name: Setup K3S Users
  hosts: localhost
  become: false
  environment:
    K8S_AUTH_KUBECONFIG: "{{ K8S_AUTH_KUBECONFIG }}"
  vars_files:
    - ./inventory/group_vars/vault.yml
    - ./inventory/group_vars/all.yml
  roles:
    - role: k3s/users
  tags:
    - k3s
    - k3s-deploy
    - k3s-users

# K3S - Destroy
- name: Destroy K3S Cluster
  hosts: k3s
  become: true
  vars_files:
    - ./inventory/group_vars/vault.yml
    - ./inventory/group_vars/all.yml
    - ./inventory/group_vars/k3s.yml
  roles:
    - role: k3s/destroy
  tags:
    - k3s-destroy

# K3S - Cilium Migration (run AFTER Cilium is deployed and healthy)
- name: Migrate K3S from Flannel to Cilium
  hosts: k3s
  become: true
  serial: 1
  vars_files:
    - ./inventory/group_vars/vault.yml
    - ./inventory/group_vars/all.yml
    - ./inventory/group_vars/k3s.yml
  tasks:
    - name: Include Cilium migration tasks
      ansible.builtin.include_tasks: roles/k3s/prereq/tasks/migrate-cilium.yml
  tags:
    - cilium-migrate
    - never

# K3S - Kernel Upgrade (Debian arm64 with 52-bit VA for Cilium envoy/tcmalloc)
# Uses RPi tryboot mechanism — power cycle reverts to original kernel on failure.
# Run one node at a time: ansible-playbook install.yml --tags kernel-upgrade --limit pi8
- name: Upgrade kernel to Debian arm64 (52-bit VA)
  hosts: k3s
  become: true
  serial: 1
  vars_files:
    - ./inventory/group_vars/vault.yml
    - ./inventory/group_vars/all.yml
  roles:
    - role: common/kernel-upgrade
  tags:
    - kernel-upgrade
    - never
