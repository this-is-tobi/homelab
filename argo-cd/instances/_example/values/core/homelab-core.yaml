manager:
  enabled: true
  instance: example
  env: production
  provider: self-hosted
  region: fr-par
  project: admin
  destination:
    server: https://kubernetes.default.svc
  repoURL:
    sources: https://github.com/this-is-tobi/homelab.git
    values: ""
  targetRevision: main

project:
  enabled: true
  description: Example admin project
  sourceRepos:
  - '*'
  destinations:
  - namespace: '*'
    server: https://kubernetes.default.svc
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'

argo-cd:
  enabled: true
  configs:
    cm:
      url: ""  # Add your ArgoCD URL here
  crds:
    install: true
    keep: true
