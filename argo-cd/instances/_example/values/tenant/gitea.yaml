gitea:
  ingress:
    hosts:
    - host: gitea.example.com
      paths:
      - path: /
        pathType: Prefix
    tls:
    - secretName: gitea.example.com-tls
      hosts:
      - gitea.example.com
  gitea:
    admin:
      username: admin
      email: admin@example.com
      existingSecret: gitea-admin
    oauth:
    - name: Keycloak
      provider: openidConnect
      key: gitea
      secret: ""
      autoDiscoverUrl: "https://keycloak.example.com/realms/homelab/.well-known/openid-configuration"
      scopes: openid profile email roles groups
      adminGroup: admin
      groupClaimName: groups
      # groupTeamMap: ""
      # groupTeamMapRemoval: true
    config:
      database:
        HOST: gitea-pg-cluster-rw
        NAME: gitea
        USER: gitea
      server:
        DOMAIN: gitea.example.com
        ROOT_URL: "https://gitea.example.com"
      openid:
        WHITELISTED_URIS: keycloak.example.com
    additionalConfigSources: []
    # - secret:
    #     secretName: "gitea-app-ini-oauth"
    # - configMap:
    #     name: "gitea-app-ini-plaintext"
    # ⚠ This list REPLACES (not merges with) the catalog default in
    # argo-cd/apps/gitea/values.yaml — keep the valkey entries below or the
    # cache/session/queue config silently falls back to 127.0.0.1:6379.
    additionalConfigFromEnvs:
    - name: GITEA__CACHE__HOST
      valueFrom:
        secretKeyRef:
          name: gitea-valkey-auth
          key: cache-host
    - name: GITEA__SESSION__PROVIDER_CONFIG
      valueFrom:
        secretKeyRef:
          name: gitea-valkey-auth
          key: session-config
    - name: GITEA__QUEUE__CONN_STR
      valueFrom:
        secretKeyRef:
          name: gitea-valkey-auth
          key: queue-conn
    - name: GITEA__database__PASSWD
      valueFrom:
        secretKeyRef:
          name: gitea-pg-cluster-app
          key: password

cnpg:
  mode: primary
  credentials:
    existingSecrets:
      enabled: true
      postgres:
        secretName: gitea-pg-cluster-admin
      app:
        secretName: gitea-pg-cluster-app
  backup:
    enabled: true
    endpointURL: "https://s3.example.com"
    destinationPath: "s3://backups/cnpg"
    s3Credentials:
      create: false
      secretName: gitea-pg-cluster-backup
      accessKeyId:
        key: S3_ACCESS_KEY
      secretAccessKey:
        key: S3_SECRET_KEY
      region:
        key: S3_REGION

  vaultStaticSecrets:
    giteaValkeyAuth:
      mount: example
      path: platforms/production/tenant/gitea
    giteaAdmin:
      mount: example
      path: platforms/production/tenant/gitea
    giteaDbInfos:
      mount: example
      path: platforms/production/tenant/gitea
    giteaDbAdmin:
      mount: example
      path: platforms/production/tenant/gitea
    giteaDbApp:
      mount: example
      path: platforms/production/tenant/gitea
    giteaPgBackup:
      mount: example
      path: platforms/production/tenant/gitea
    giteaSso:
      mount: example
      path: platforms/production/tenant/gitea
