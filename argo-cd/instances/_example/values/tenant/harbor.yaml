harbor:
  harborAdminPassword: ""
  externalURL: "https://harbor.example.com"
  expose:
    tls:
      secret:
        secretName: ""
    ingress:
      hosts:
        core: harbor.example.com
  database:
    external:
      host: harbor-pg-cluster-rw
      port: 5432
      coreDatabase: harbor
      username: harbor
      password: ""

cnpg:
  mode: primary
  credentials:
    password: ""
    postgresPassword: ""
    # existingSecrets:
    #   enabled: true
    #   postgres:
    #     secretName: "harbor-pg-cluster-admin"
    #   app:
    #     secretName: "harbor-pg-cluster-app"
  backup:
    enabled: false
    endpointURL: "https://s3.example.com"
    destinationPath: "s3://backups/cnpg"
    s3Credentials:
      # create: false
      secretName: harbor-pg-cluster-backup
      accessKeyId:
        value: ""
      secretAccessKey:
        value: ""
      region:
        value: fr-par

vso:
  vaultStaticSecrets:
    harborAdmin:
      mount: example
      path: platforms/production/tenant/harbor
    harborSecretkey:
      mount: example
      path: platforms/production/tenant/harbor
    harborS3:
      mount: example
      path: platforms/production/tenant/harbor
    harborDbInfos:
      mount: example
      path: platforms/production/tenant/harbor
    harborDbAdmin:
      mount: example
      path: platforms/production/tenant/harbor
    harborDbApp:
      mount: example
      path: platforms/production/tenant/harbor
    harborPgBackup:
      mount: example
      path: platforms/production/tenant/harbor
    harborSso:
      mount: example
      path: platforms/production/tenant/harbor
