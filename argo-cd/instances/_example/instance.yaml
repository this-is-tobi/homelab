# =============================================================================
# `_example` — documented TEMPLATE folder (NOT a deployable instance)
# =============================================================================
# This folder is the canonical reference for setting up a new instance.
# It lists every app the catalog supports (in core.yaml + tenant.yaml) with
# documentation comments, and ships starter values files under ./values/.
#
# Why the leading underscore?
#   The root `manager` ApplicationSet excludes any folder under
#   `argo-cd/instances/_*`, so `_example` is NEVER picked up as a real
#   instance — even if some apps are accidentally flipped to `enabled: "true"`
#   here. This guarantees the template folder is purely informational.
#
# To bootstrap a new instance:
#   1. Copy this folder:  cp -r argo-cd/instances/_example argo-cd/instances/<name>
#      (drop the leading underscore so the manager picks it up)
#   2. Rename `instance.name` below and adjust the destination, repos, etc.
#   3. Flip the relevant `enabled` flags in core.yaml / tenant.yaml.
#   4. Tweak per-app values under ./values/{core,tenant}/<app>.yaml.
#   5. (First instance on a brand-new admin cluster only)  ./run.sh -b <name>
#      Subsequent instances are picked up automatically by the existing root
#      manager — just commit & push.
#
# All apps are disabled by default in this template; treat that as a safety
# net rather than a contract — the `_` prefix is what really gates rendering.

instance:
  # Instance identifier. Must match the parent folder name.
  name: example
  env: production
  provider: self-hosted
  region: fr-par

# Default cluster destination for every Application generated by the child
# AppSets. Apps may override per-entry via `destination.server` in core.yaml /
# tenant.yaml — useful for SaaS / dedicated-core topologies.
destination:
  server: https://kubernetes.default.svc

# Git source for the chart catalog (argo-cd/apps/) AND the metadata files
# (instance.yaml + core.yaml + tenant.yaml). By default values also live in
# this repo, alongside this file under ./values/{core,tenant}/.
repoURL: https://github.com/this-is-tobi/homelab.git

# Optional: separate git repository holding only the values tree. When set,
# the child AppSets attach a second `$values` source pointing at this repo.
# The values repo must mirror the same path layout:
#   argo-cd/instances/<name>/values/{core,tenant}/<app>.yaml
# Leave empty to keep values colocated in `repoURL`.
valuesRepoURL: ""

targetRevision: main

# AppProject bindings for the two child AppSets. Both projects are created by
# the `ohmlab` chart at bootstrap time.
projects:
  core: admin-core
  tenant: admin-tenant
