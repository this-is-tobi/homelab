# Tenant (apps) tier app catalog for the `homelab` instance.
# Slim list — only what is actually deployed.
# Schema reference: ../_example/core.yaml

apps:
- app: argo-cd
  enabled: "true"
  namespace: argo-cd
  syncWave: 100
  ignoreDifferences:
  # argocd-secret contains a randomly-generated server.secretkey at first install
  # plus admin.password set at runtime — must not be overwritten on re-sync.
  - group: ""
    kind: Secret
    name: argocd-secret
    jqPathExpressions:
    - .data
- app: actions-runner-controller
  enabled: "false" # Disabled during Cilium migration — crash-looping
  syncWave: 110
- app: gitea
  enabled: "true"
  syncWave: 110
- app: mattermost
  enabled: "true"
  syncWave: 110
  ignoreDifferences:
  # The mattermost chart always creates mattermost-mattermost-dbsecret with
  # externalDriverType://externalConnectionString = "postgres://" (empty).
  # VSO manages this secret's data from Vault. Tell ArgoCD to ignore the data
  # field so it doesn't overwrite VSO's correct value on every sync.
  - group: ""
    kind: Secret
    name: mattermost-mattermost-dbsecret
    jqPathExpressions:
    - .data
- app: rustfs
  enabled: "true"
  syncWave: 110
- app: homepage
  enabled: "true"
  syncWave: 200
