# Cilium's OWN GatewayClass/Gateway stays OFF permanently — Traefik owns
# the Gateway API on this cluster (.local/ingress-controller-analysis.md;
# plan doc F5/F6/F7). Not to be confused with `gateway` below.
ciliumGateway:
  enabled: false

# Hubble UI HTTPRoute, attached to the traefik gateway. oauth2-proxy is
# the real gate now (2026-07-21) — the lan-only ipAllowList Middleware was
# found bypassed (verified reachable from a genuinely external IP, HTTP
# 200, no auth at all) and stays attached only as defense-in-depth until
# that's root-caused; do not rely on it alone.
gateway:
  enabled: true
  gatewayName: homelab-gateway-traefik
  gatewayNamespace: kube-system
  routes:
  - name: hubble-ui
    listener: https-wildcard-int
    hostnames:
    - "hubble.int.ohmlab.fr"
    rules:
    - backendService: hubble-oauth2-proxy
      backendPort: 80
      filters:
      - type: ExtensionRef
        extensionRef:
          group: traefik.io
          kind: Middleware
          name: lan-only

# Turn on the Hubble UI backend for the oauth2-proxy upstream below (off by
# default in the chart — nothing rendered it before this).
cilium:
  hubble:
    ui:
      enabled: true
  # NetworkPolicy zero-trust prereq (.local/post-migration-hardening.md §2):
  # let CIDR selectors match node-originated traffic, so an `ipBlock
  # 192.168.1.0/24` rule matches the k3s apiserver/kubelet host + remote-node
  # identities (needed for webhook/probe allow rules under default-deny).
  # cilium-config key `policy-cidr-match-mode`; START-TIME only → requires a
  # cilium agent rollout to take effect (no-op until netpols use CIDR selectors).
  policyCIDRMatchMode:
  - nodes

vso:
  vaultStaticSecrets:
    hubbleSso:
      mount: homelab
      path: platforms/production/core/hubble

sso:
  config:
    configFile: |-
      provider = "keycloak-oidc"
      provider_display_name = "Keycloak"
      email_domains = [ "*" ]
      upstreams = [ "http://hubble-ui.kube-system.svc.cluster.local:80/" ]
      redirect_url = "https://hubble.int.ohmlab.fr/oauth2/callback"
      oidc_issuer_url = "https://sso.core.ohmlab.fr/realms/homelab"
      reverse_proxy = true
      cookie_secure = true
      cookie_domains = [ "hubble.int.ohmlab.fr" ]

# Migration overlay removed 2026-07-20 (rolling flannel→cilium migration
# complete: all 9 nodes flipped, flannel + kube-router retired). Catalog
# defaults now apply: customConf=false, exclusive=true, policy enforcement
# default, unmanagedPodWatcher.restart=true, migration.enabled=false.
# History: .local/cilium-migration-plan.md
