gateway:
  enabled: true
  gatewayName: homelab-gateway-traefik
  gatewayNamespace: kube-system
  # Vault serves TLS on 8200 — traefik validates it via BackendTLSPolicy
  # against the kyverno-generated vault-ca ConfigMap.
  backendTLS: true
  routes:
  - name: vault
    hostnames:
    - vault.core.ohmlab.fr
    rules:
    - backendService: vault
      backendPort: 8200

vault:
  externalConfig:
    # Re-enabled 2026-07-19. Was disabled 2026-07-05 - 2026-07-19: reaching
    # Keycloak's public hostname from inside the cluster (the NAT hairpin)
    # was hard-failing discovery, which was blocking every newly-added Vault
    # policy (vault-configurer applies auth methods before policies in one
    # pass). Verified live from vault-0 itself before re-enabling (curl/wget/
    # nslookup all resolve sso.core.ohmlab.fr and complete the discovery
    # fetch with a matching issuer) - whatever caused the original failure
    # (ISP/router NAT hairpin support, most likely) no longer reproduces.
    # If policy application starts silently failing again, this is the
    # first thing to flip back to false.
    oidcEnabled: true
    oidcDiscoveryUrl: "https://sso.core.ohmlab.fr/realms/homelab"
    oidcRedirectUris:
    - "https://vault.core.ohmlab.fr/ui/vault/auth/oidc/oidc/callback"
    - "https://vault.core.ohmlab.fr/oidc/callback"
  extraEnvsConfig:
  - name: VAULT_OIDC_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: vault-oidc-credentials
        key: VAULT_OIDC_CLIENT_SECRET
        optional: true

# Ohmlab hierarchical configuration — secrets AND identity for the ohmlab CLI.
# IMPORTANT: this must stay a single `ohmlab:` block. YAML duplicate keys are
# silently resolved last-wins by Helm, so a second `ohmlab:` block later in the
# file would drop everything defined here.
ohmlab:
  vault:
    # Identity configuration for ohmlab vault identity command
    identity:
      groups:
      - name: homelab-admins
        type: external
        policies:
        - admin
      groupAliases:
      - name: "/admin"
        group: homelab-admins
        mountAccessor: ""  # Auto-discovered if empty (finds first 'oidc' mount)
    # Declarative secrets configuration for ohmlab vault secrets command
    secrets:
    - path: homelab/platforms/production/core/cert-manager
      data:
        email: this-is-tobi@proton.me
        scaleway:
          accessKey: ""
          secretKey: ""
          projectId: ""
          domain: ohmlab.fr
    # Keycloak MUST come before apps that use <ref:...> to its clients
    - path: homelab/platforms/production/core/keycloak
      data:
        admin:
          username: admin
          password: "<random:24>"
        # Admin user in the homelab realm (for OIDC login into apps).
        # This is distinct from the Keycloak service-admin (above).
        # Password is injected by VSO into keycloak-config secret → used by
        # keycloak-config-cli to create the user on first deploy.
        adminUser:
          username: admin@ohmlab.fr
          password: "<random:24>"
        domain: sso.core.ohmlab.fr
        realm: homelab
        rootDomain: ohmlab.fr
        # Centralized OIDC client credentials — each app references these via
        # <ref:homelab/platforms/production/core/keycloak#clients.<app>.clientSecret>
        # so keycloak policy only needs access to its own path.
        clients:
          # Core services — must use distinct clientIds to avoid collision with
          # tenant apps that share the same 'homelab' realm.
          argo-cd-core:
            clientId: argo-cd-core
            clientSecret: "<random:32>"
          vault-core:
            clientId: vault-core
            clientSecret: "<random:32>"
          grafana-core:
            clientId: grafana-core
            clientSecret: "<random:32>"
          longhorn-core:
            clientId: longhorn-core
            clientSecret: "<random:32>"
          # Tenant services
          argo-cd:
            clientId: argo-cd
            clientSecret: "<random:32>"
          gitea:
            clientId: gitea
            clientSecret: "<random:32>"
          mattermost:
            clientId: mattermost
            clientSecret: "<random:32>"
          rustfs:
            clientId: rustfs
            clientSecret: "<random:32>"
        postgres:
          admin:
            username: postgres
            password: "<random:24>"
          app:
            username: keycloak
            password: "<random:24>"
          database: keycloak
          host: keycloak-pg-cluster-rw
          port: "5432"
          s3:
            accessKey: ""
            bucketName: ohmlab-backups
            bucketPrefix: cnpg
            endpoint: "https://s3.fr-par.scw.cloud"
            region: fr-par
            secretKey: ""
    - path: homelab/platforms/production/core/argo-cd
      # Core ArgoCD (bootstrapped via run.sh into argocd-system).
      # Password is set at bootstrap time via $ARGOCD_ADMIN_PASSWORD; this entry
      # serves as the Vault source-of-truth for rotation and auditing.
      # OIDC is enabled after Keycloak is up — injected via VSO into argocd-system.
      data:
        admin:
          username: admin
          password: "<random:24>"
          passwordHashed: "<bcrypt:admin.password>"
        keycloak:
          clientId: argo-cd-core
          clientSecret: "<ref:homelab/platforms/production/core/keycloak#clients.argo-cd-core.clientSecret>"
    - path: homelab/platforms/production/tenant/argo-cd
      # Tenant ArgoCD instance (deployed as an ArgoCD app into argo-cd namespace).
      # Credentials are injected at runtime via VSO into the argo-cd namespace.
      data:
        admin:
          username: admin
          password: "<random:24>"
          passwordHashed: "<bcrypt:admin.password>"
        keycloak:
          clientId: argo-cd
          clientSecret: "<ref:homelab/platforms/production/core/keycloak#clients.argo-cd.clientSecret>"
    - path: homelab/platforms/production/tenant/gitea
      data:
        admin:
          username: admin
          password: "<random:24>"
        valkey:
          password: "<random:32>"
        postgres:
          admin:
            username: postgres
            password: "<random:24>"
          app:
            username: gitea
            password: "<random:24>"
          database: gitea
          host: gitea-pg-cluster-rw
          port: "5432"
          s3:
            accessKey: ""
            bucketName: ohmlab-backups
            bucketPrefix: cnpg
            endpoint: "https://s3.fr-par.scw.cloud"
            region: fr-par
            secretKey: ""
        keycloak:
          clientId: gitea
          clientSecret: "<ref:homelab/platforms/production/core/keycloak#clients.gitea.clientSecret>"
    - path: homelab/platforms/production/tenant/mattermost
      data:
        admin:
          username: admin
          password: "<random:24>"
        postgres:
          admin:
            username: postgres
            password: "<random:24>"
          app:
            username: mattermost
            password: "<random:24>"
          database: mattermost
          host: mattermost-pg-cluster-rw
          port: "5432"
          s3:
            accessKey: ""
            bucketName: ohmlab-backups
            bucketPrefix: cnpg
            endpoint: "https://s3.fr-par.scw.cloud"
            region: fr-par
            secretKey: ""
        s3:
          accessKey: ""
          bucketName: ohmlab-backups
          bucketPrefix: cnpg
          endpoint: "https://s3.fr-par.scw.cloud"
          region: fr-par
          secretKey: ""
        keycloak:
          clientId: mattermost
          clientSecret: "<ref:homelab/platforms/production/core/keycloak#clients.mattermost.clientSecret>"
    - path: homelab/platforms/production/tenant/rustfs
      data:
        admin:
          accessKey: "<random:16>"
          secretKey: "<random:32>"
        keycloak:
          clientId: rustfs
          clientSecret: "<ref:homelab/platforms/production/core/keycloak#clients.rustfs.clientSecret>"
    - path: homelab/platforms/production/core/longhorn
      data:
        keycloak:
          clientId: longhorn-core
          clientSecret: "<ref:homelab/platforms/production/core/keycloak#clients.longhorn-core.clientSecret>"
    - path: homelab/platforms/production/core/prometheus-stack
      data:
        admin:
          username: admin
          password: "<random:24>"
        keycloak:
          clientId: grafana-core
          clientSecret: "<ref:homelab/platforms/production/core/keycloak#clients.grafana-core.clientSecret>"
    - path: homelab/platforms/production/core/sops
      data:
        secret: "<age:secret>"
        public: "<age:public>"
    - path: homelab/platforms/production/core/apisix
      # APISIX admin API credentials — delivered by VSO into apisix/apisix-admin.
      # Rotation: change here is NOT enough — the apisix pods read the key via
      # env, so restart the apisix deployment after a rotate.
      data:
        admin:
          adminKey: "<random:32>"
          viewerKey: "<random:32>"
    - path: homelab/platforms/production/core/crowdsec
      data:
        console:
          enrollKey: "" # Set manually in Vault (from https://app.crowdsec.net/security-engines)
          instanceName: homelab-k8s
          tags: k8s homelab production
        postgres:
          admin:
            username: postgres
            password: "<random:24>"
          app:
            username: crowdsec
            password: "<random:24>"
          database: crowdsec
          host: crowdsec-pg-cluster-rw
          port: "5432"
          s3:
            accessKey: ""
            bucketName: ohmlab-backups
            bucketPrefix: cnpg
            endpoint: "https://s3.fr-par.scw.cloud"
            region: fr-par
            secretKey: ""
