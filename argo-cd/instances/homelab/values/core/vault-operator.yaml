vaultOidcCredentials:
  enabled: true
  mount: homelab
  path: platforms/production/core/keycloak

vso:
  enabled: true
  vaultConnection:
    default:
      address: "https://vault.vault-operator-system.svc.cluster.local:8200"
      skipTLSVerify: false
      caCertSecretRef: vault-ca
  vaultAuth:
    default:
      method: kubernetes
      mount: kubernetes
      kubernetes:
        role: vault-operator
        serviceAccount: vso
      vaultConnectionRef: default

backup-utils:
  enabled: false  # S3 keys not configured yet — re-enable when available
