gateway:
  enabled: true
  gatewayName: homelab-gateway
  gatewayNamespace: kube-system
  routes:
  - name: longhorn
    listener: https-wildcard
    hostnames:
    - longhorn.core.ohmlab.fr
    rules:
    - backendService: longhorn-frontend
      backendPort: 80

oidc:
  enabled: true
  hostname: longhorn.core.ohmlab.fr
  discoveryUrl: "https://sso.core.ohmlab.fr/realms/homelab/.well-known/openid-configuration"
  tlsSecret: longhorn.core.ohmlab.fr-tls

vso:
  vaultStaticSecrets:
    longhornSso:
      mount: homelab
      path: platforms/production/core/longhorn
      type: kv-v2
      vaultAuthRef: longhorn-system-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: longhorn-sso
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            OIDC_CLIENT_ID:
              text: '{{ get .Secrets "keycloak" | dig "clientId" "" }}'
            OIDC_CLIENT_SECRET:
              text: '{{ get .Secrets "keycloak" | dig "clientSecret" "" }}'
            client_id:
              text: '{{ get .Secrets "keycloak" | dig "clientId" "" }}'
            client_secret:
              text: '{{ get .Secrets "keycloak" | dig "clientSecret" "" }}'
  extraObjects:
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: vso
      namespace: longhorn-system

longhorn:
  ingress:
    enabled: false
    host: longhorn.core.ohmlab.fr
