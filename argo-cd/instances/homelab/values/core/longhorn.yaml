vso:
  vaultStaticSecrets:
    longhornSso:
      mount: homelab
      path: platforms/production/core/longhorn
      type: kv-v2
      vaultAuthRef: longhorn-system-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: longhorn-sso
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            OIDC_CLIENT_ID:
              text: '{{ get .Secrets "keycloak" | dig "clientId" "" }}'
            OIDC_CLIENT_SECRET:
              text: '{{ get .Secrets "keycloak" | dig "clientSecret" "" }}'
            client_id:
              text: '{{ get .Secrets "keycloak" | dig "clientId" "" }}'
            client_secret:
              text: '{{ get .Secrets "keycloak" | dig "clientSecret" "" }}'
  extraObjects:
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: vso
      namespace: longhorn-system

longhorn:
  ingress:
    enabled: true
    ingressClassName: apisix
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-dns-prod
    host: longhorn.core.ohmlab.fr
    tls: true
    tlsSecret: longhorn-tls
