gateway:
  enabled: true
  gatewayName: homelab-gateway-traefik
  gatewayNamespace: kube-system
  routes:
  - name: longhorn
    listener: https-wildcard-int
    hostnames:
    - longhorn.int.ohmlab.fr
    rules:
    - backendService: longhorn-oauth2-proxy
      backendPort: 80
      # LAN-only (post-migration-hardening.md L6), oauth2-proxy stays on
      # as a second factor — this narrows WHERE the login page is even
      # reachable from, it doesn't replace auth.
      filters:
      - type: ExtensionRef
        extensionRef:
          group: traefik.io
          kind: Middleware
          name: lan-only

vso:
  vaultStaticSecrets:
    longhornSso:
      mount: homelab
      path: platforms/production/core/longhorn
      type: kv-v2
      vaultAuthRef: longhorn-system-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: longhorn-oauth2-proxy-creds
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            client-id:
              text: '{{ get .Secrets "keycloak" | dig "clientId" "" }}'
            client-secret:
              text: '{{ get .Secrets "keycloak" | dig "clientSecret" "" }}'
            cookie-secret:
              text: '{{ get .Secrets "keycloak" | dig "cookieSecret" "" }}'
  extraObjects:
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: vso
      namespace: longhorn-system

sso:
  config:
    configFile: |-
      provider = "keycloak-oidc"
      provider_display_name = "Keycloak"
      email_domains = [ "*" ]
      upstreams = [ "http://longhorn-frontend.longhorn-system.svc.cluster.local:80/" ]
      redirect_url = "https://longhorn.int.ohmlab.fr/oauth2/callback"
      oidc_issuer_url = "https://sso.core.ohmlab.fr/realms/homelab"
      reverse_proxy = true
      cookie_secure = true
      cookie_domains = [ "longhorn.int.ohmlab.fr" ]

longhorn:
  ingress:
    enabled: false
