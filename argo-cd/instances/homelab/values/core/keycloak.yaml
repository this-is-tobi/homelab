gateway:
  enabled: true
  gatewayName: homelab-gateway
  gatewayNamespace: kube-system
  routes:
  - name: keycloak
    hostnames:
    - sso.core.ohmlab.fr
    rules:
    - backendService: keycloak
      backendPort: 8080

keycloak:
  keycloak:
    hostnameAdmin: "https://sso.core.ohmlab.fr"
    hostname: "https://sso.core.ohmlab.fr"
    existingSecret: keycloak-admin
    secretKeys:
      adminPasswordKey: password
  database:
    host: keycloak-pg-cluster-rw
    port: "5432"
    name: keycloak
    existingSecret: keycloak-pg-cluster-app
    secretKeys:
      usernameKey: username
      passwordKey: password
  ingress:
    hosts:
    - host: sso.core.ohmlab.fr
      paths:
      - path: /
        pathType: Prefix
    tls:
    - secretName: sso.core.ohmlab.fr-tls
      hosts:
      - sso.core.ohmlab.fr

cnpg:
  mode: primary
  credentials:
    existingSecrets:
      enabled: true
      postgres:
        secretName: keycloak-pg-cluster-admin
      app:
        secretName: keycloak-pg-cluster-app
  backup:
    enabled: true
    endpointURL: "https://s3.fr-par.scw.cloud"
    destinationPath: "s3://ohmlab-backups/cnpg"
    s3Credentials:
      create: false
      secretName: keycloak-pg-cluster-backup
      accessKeyId:
        key: S3_ACCESS_KEY
      secretAccessKey:
        key: S3_SECRET_KEY
      region:
        key: S3_REGION
