gateway:
  enabled: true
  gatewayName: homelab-gateway-traefik
  gatewayNamespace: kube-system
  routes:
  - name: keycloak
    hostnames:
    - sso.core.ohmlab.fr
    rules:
    - backendService: keycloak
      backendPort: 8080

keycloak:
  keycloak:
    hostnameAdmin: "https://sso.core.ohmlab.fr"
    hostname: "https://sso.core.ohmlab.fr"
    existingSecret: keycloak-admin
    secretKeys:
      adminPasswordKey: password
  database:
    host: keycloak-pg-cluster-rw
    port: "5432"
    name: keycloak
    existingSecret: keycloak-pg-cluster-app
    secretKeys:
      usernameKey: username
      passwordKey: password

cnpg:
  mode: primary
  credentials:
    existingSecrets:
      enabled: true
      postgres:
        secretName: keycloak-pg-cluster-admin
      app:
        secretName: keycloak-pg-cluster-app
  backup:
    enabled: false  # S3 keys not configured yet — re-enable when available
    endpointURL: "https://s3.fr-par.scw.cloud"
    destinationPath: "s3://ohmlab-backups/cnpg"
    s3Credentials:
      create: false
      secretName: keycloak-pg-cluster-backup
      accessKeyId:
        key: S3_ACCESS_KEY
      secretAccessKey:
        key: S3_SECRET_KEY
      region:
        key: S3_REGION

vso:
  vaultStaticSecrets:
    keycloakAdmin:
      mount: homelab
      path: platforms/production/core/keycloak
    keycloakConfig:
      mount: homelab
      path: platforms/production/core/keycloak
    keycloakDbInfos:
      mount: homelab
      path: platforms/production/core/keycloak
    keycloakDbAdmin:
      mount: homelab
      path: platforms/production/core/keycloak
    keycloakDbApp:
      mount: homelab
      path: platforms/production/core/keycloak
    keycloakPgBackup:
      mount: homelab
      path: platforms/production/core/keycloak
    clientGitea:
      mount: homelab
      path: platforms/production/core/keycloak
    clientGrafanaCore:
      mount: homelab
      path: platforms/production/core/keycloak
    clientArgoCd:
      mount: homelab
      path: platforms/production/core/keycloak
    clientArgoCdCore:
      mount: homelab
      path: platforms/production/core/keycloak
    clientVaultCore:
      mount: homelab
      path: platforms/production/core/keycloak
    clientLonghornCore:
      mount: homelab
      path: platforms/production/core/keycloak
    clientHubbleCore:
      mount: homelab
      path: platforms/production/core/keycloak
    clientRustfs:
      mount: homelab
      path: platforms/production/core/keycloak
