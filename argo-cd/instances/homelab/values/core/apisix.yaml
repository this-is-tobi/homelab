# APISIX instance overrides for `homelab`.
# Replacement for ingress-nginx — enable one at a time.

apisix:
  replicaCount: 2

  service:
    type: LoadBalancer
    externalTrafficPolicy: Local

  etcd:
    replicaCount: 3
    persistence:
      storageClass: longhorn
      size: 5Gi

  ingress-controller:
    enabled: true
    config:
      apisix:
        adminAPIVersion: v3

gateway:
  enabled: true
  name: homelab-gateway
  namespace: kube-system
  domain: ohmlab.fr
  clusterIssuer: letsencrypt-dns-prod
  dnsClusterIssuer: letsencrypt-dns-prod
  wildcardTlsSecret: gateway-wildcard-tls
  apexTlsSecret: gateway-wildcard-tls
  extraListeners: []
  tlsPassthroughListeners:
  - name: tls-teleport
    hostname: "*.teleport.core.ohmlab.fr"
  - name: tls-teleport-apex
    hostname: teleport.core.ohmlab.fr
