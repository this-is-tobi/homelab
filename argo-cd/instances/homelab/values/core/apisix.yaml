# APISIX instance overrides for `homelab`.
# Replacement for ingress-nginx — enable one at a time.

apisix:
  replicaCount: 2

  nginx:
    logs:
      # Standard nginx combined format so CrowdSec crowdsecurity/nginx-logs
      # parser can parse access logs without a custom GROK.
      # Extra APISIX fields (host, upstream info) are appended after the
      # standard fields so the nginx GROK still matches the prefix.
      accessLogFormat: '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" $http_host $request_time $upstream_addr $upstream_status $upstream_response_time'

  service:
    type: LoadBalancer
    externalTrafficPolicy: Local

  ingress-controller:
    enabled: true
    config:
      apisix:
        adminAPIVersion: v3

# Standalone etcd (cloudpirates chart) — replaces the bundled bitnami etcd.
etcd:
  replicaCount: 3
  persistence:
    storageClass: longhorn
    size: 5Gi

# Admin API credentials from Vault (generated by the vault-post-config job —
# see values/core/vault-operator.yaml, path core/apisix).
vso:
  vaultStaticSecrets:
    apisixAdmin:
      mount: homelab
      path: platforms/production/core/apisix

gateway:
  enabled: true
  name: homelab-gateway
  namespace: kube-system
  domain: ohmlab.fr
  clusterIssuer: letsencrypt-dns-prod
  dnsClusterIssuer: letsencrypt-dns-prod
  wildcardTlsSecret: gateway-wildcard-tls
  apexTlsSecret: gateway-wildcard-tls
  extraListeners:
  - name: https-wildcard-core
    protocol: HTTPS
    port: 443
    hostname: "*.core.ohmlab.fr"
    tls:
      mode: Terminate
      certificateRefs:
        - name: gateway-wildcard-tls
    allowedRoutes:
      namespaces:
        from: All
  - name: https-wildcard-s3
    protocol: HTTPS
    port: 443
    hostname: "*.s3.ohmlab.fr"
    tls:
      mode: Terminate
      certificateRefs:
        - name: gateway-wildcard-tls
    allowedRoutes:
      namespaces:
        from: All
  extraDnsNames:
  - "*.core.ohmlab.fr"
  - "*.s3.ohmlab.fr"
  tlsPassthroughListeners:
  - name: tls-teleport
    hostname: "*.teleport.core.ohmlab.fr"
  - name: tls-teleport-apex
    hostname: teleport.core.ohmlab.fr

dashboard:
  enabled: true
  host: apisix.core.ohmlab.fr
