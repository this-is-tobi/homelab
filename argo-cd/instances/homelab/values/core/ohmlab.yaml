# ohmlab wrapper values for the `homelab` instance.
#
# Owns:
# - The CORE ArgoCD installation (in argocd-system namespace)
# - The root `manager` ApplicationSet (discovers every instance under
#   `argo-cd/instances/*` and renders one per-instance Application)
# - The `admin-core` and `admin-tenant` AppProjects
#
# Bootstrap is intentionally bare: admin login only, no OIDC, no notifications.
# This avoids any chicken-and-egg with vault-operator / Vault / Keycloak.
#
# Once the full stack is up, enable OIDC by uncommenting the block below and
# providing the clientSecret either inline (replaced manually) or via a
# VaultStaticSecret applied out-of-band into argocd-system.

# UI + appset webhook are exposed via HTTPRoutes on the traefik gateway.
# argocd-server serves TLS on 443 (cert-manager LE cert, argocd-server-tls
# via the chart's certificate integration) — traefik validates it with the
# BackendTLSPolicy below.
gateway:
  enabled: true
  gatewayName: homelab-gateway-traefik
  gatewayNamespace: kube-system
  backendTLSPolicies:
  - name: argocd-server
    serviceName: argocd-server
    hostname: gitops.core.ohmlab.fr
  routes:
  - name: argocd-server
    listener: https-wildcard-core
    hostnames:
    - gitops.core.ohmlab.fr
    rules:
    - backendService: argocd-server
      backendPort: 443
  - name: argocd-appset-webhook
    listener: https-wildcard-core
    hostnames:
    - gitops-appset.core.ohmlab.fr
    rules:
    - backendService: argocd-applicationset-controller
      backendPort: 7000

rootManager:
  enabled: true
  repoURL:
    sources: https://github.com/this-is-tobi/homelab.git
    values: ""
  targetRevision: main

projects:
  core:
    enabled: true
    name: admin-core
  tenant:
    enabled: true
    name: admin-tenant

argo-cd:
  enabled: true
  configs:
    secret:
      # Set at bootstrap via:
      #   helm install ... --set 'argo-cd.configs.secret.argocdServerAdminPassword=<bcrypt>'
      # or by pre-creating the `argocd-secret` Secret in argocd-system.
      argocdServerAdminPassword: ""
    cm:
      url: "https://gitops.core.ohmlab.fr"
      # Enable apiKey once you need to issue tokens (e.g. for argocd-mcp).
      accounts.admin: apiKey,login
      # OIDC via Keycloak. Uses a dedicated 'argo-cd-core' client so it doesn't
      # collide with the tenant ArgoCD's 'argo-cd' client in the same realm.
      # clientSecret is injected by VSO into argocd-system as 'argocd-core-oidc'.
      # If Keycloak is down, ArgoCD falls back to local admin login — no disruption.
      oidc.config: |
        name: "Keycloak"
        issuer: "https://sso.core.ohmlab.fr/realms/homelab"
        clientID: "argo-cd-core"
        clientSecret: "$argocd-core-oidc:OIDC_CLIENT_SECRET"
        requestedScopes: ["openid", "profile", "email", "groups"]
      resource.customizations: |
        networking.k8s.io/Ingress:
          health.lua: |
            hs = {}
            hs.status = "Healthy"
            return hs
        Service:
          health.lua: |
            hs = {}
            if obj.spec.type ~= "LoadBalancer" then
              hs.status = "Healthy"
              return hs
            end
            if obj.status.loadBalancer ~= nil and obj.status.loadBalancer.ingress ~= nil and table.getn(obj.status.loadBalancer.ingress) > 0 then
              hs.status = "Healthy"
              return hs
            end
            -- klipper/ServiceLB was removed (F21/F24); nothing in this cluster
            -- ever writes status.loadBalancer.ingress anymore. Services are
            -- reached via static spec.externalIPs + kube-proxy DNAT instead,
            -- so treat that as the success condition rather than waiting
            -- forever on a status field with no writer.
            if obj.spec.externalIPs ~= nil and table.getn(obj.spec.externalIPs) > 0 then
              hs.status = "Healthy"
              hs.message = "Reachable via static externalIPs (no LB controller in this cluster)"
              return hs
            end
            hs.status = "Progressing"
            hs.message = "Waiting for load balancer to configure external IP"
            return hs
        gateway.networking.k8s.io/Gateway:
          health.lua: |
            hs = {}
            if obj.status ~= nil and obj.status.conditions ~= nil then
              for i, condition in ipairs(obj.status.conditions) do
                if condition.type == "Programmed" and condition.status == "True" then
                  hs.status = "Healthy"
                  hs.message = condition.message
                  return hs
                end
              end
              for i, condition in ipairs(obj.status.conditions) do
                if condition.type == "Programmed" and condition.status == "False" then
                  hs.status = "Degraded"
                  hs.message = condition.message
                  return hs
                end
              end
            end
            hs.status = "Progressing"
            hs.message = "Waiting for Gateway to be reconciled"
            return hs
  applicationSet:
    pdb:
      enabled: true
      maxUnavailable: 1
    # Webhook exposed via HTTPRoute (gateway wildcard TLS) — no Ingress.
    ingress:
      enabled: false
  server:
    pdb:
      enabled: true
      maxUnavailable: 1
    ingress:
      enabled: false
    certificate:
      enabled: true
      domain: gitops.core.ohmlab.fr
      issuer:
        group: cert-manager.io
        kind: ClusterIssuer
        name: letsencrypt-dns-prod
  crds:
    install: true
    keep: true
  controller:
    pdb:
      enabled: true
      maxUnavailable: 1
  repoServer:
    pdb:
      enabled: true
      maxUnavailable: 1
  redis-ha:
    haproxy:
      podDisruptionBudget:
        maxUnavailable: 1
    podDisruptionBudget:
      maxUnavailable: 1

# VSO integration — injects secrets from Vault into argocd-system after
# vault-operator is deployed. Disabled at bootstrap (run.sh passes --set vso.enabled=false);
# ArgoCD re-syncs this after VSO CRDs become available.
vso:
  enabled: true
  extraObjects:
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: vso
  vaultAuth:
    default:
      method: kubernetes
      mount: kubernetes
      kubernetes:
        role: argo-cd-core
        serviceAccount: vso
  vaultConnection:
    default:
      address: "https://vault.vault-operator-system.svc.cluster.local:8200"
      skipTLSVerify: false
      caCertSecretRef: vault-ca
  vaultStaticSecrets:
    argoCdCoreOidc:
      mount: homelab
      path: platforms/production/core/argo-cd
      type: kv-v2
      vaultAuthRef: ohmlab-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: argocd-core-oidc
        create: true
        type: Opaque
        labels:
          app.kubernetes.io/part-of: argocd
        transformation:
          excludes:
          - ".*"
          templates:
            OIDC_CLIENT_SECRET:
              text: '{{ get .Secrets "keycloak" | dig "clientSecret" "" }}'
