# Traefik instance overrides for `homelab`.
#
# MIGRATION MODE — coexisting with APISIX (.local/traefik-migration.md (local notes)):
# klipper-lb binds Service ports as host ports on every node, and APISIX
# still owns 80/443, so traefik exposes 8080/8443. The gateway HAProxy
# routes migrated SNIs to node:8443 (ansible: haproxy.traefikHosts).
# Final cutover flips exposedPort to 80/443 together with the HAProxy
# backend port swap, after the apisix app is disabled.

traefik:
  deployment:
    replicas: 2

gateway:
  enabled: true
  name: homelab-gateway-traefik
  namespace: kube-system
  domain: ohmlab.fr
  # Shared with the APISIX gateway — the Certificate stays owned by the
  # apisix app until decommission (then set manageCertificate: true).
  wildcardTlsSecret: gateway-wildcard-tls
  apexTlsSecret: gateway-wildcard-tls
  manageCertificate: false
  dnsClusterIssuer: letsencrypt-dns-prod
  extraDnsNames:
  - "*.core.ohmlab.fr"
  - "*.s3.ohmlab.fr"
  extraWildcardListeners:
  - name: https-wildcard-core
    hostname: "*.core.ohmlab.fr"
  - name: https-wildcard-s3
    hostname: "*.s3.ohmlab.fr"
  tlsPassthroughListeners:
  - name: tls-teleport
    hostname: "*.teleport.core.ohmlab.fr"
  - name: tls-teleport-apex
    hostname: teleport.core.ohmlab.fr
