# Traefik instance overrides for `homelab`.
#
# Traefik is THE ingress controller. klipper-lb binds the Service ports as
# host ports on every node; the gateway HAProxy forwards public 80/443 to
# them (ansible/inventory/group_vars/gateway.yml). Service ports are still
# 8080/8443 until the old ingress namespace releases host ports 80/443 —
# then flip exposedPort here together with the HAProxy port vars.

traefik:
  deployment:
    replicas: 2

gateway:
  enabled: true
  name: homelab-gateway-traefik
  namespace: kube-system
  domain: ohmlab.fr
  wildcardTlsSecret: gateway-wildcard-tls
  apexTlsSecret: gateway-wildcard-tls
  manageCertificate: true
  dnsClusterIssuer: letsencrypt-dns-prod
  extraDnsNames:
  - "*.core.ohmlab.fr"
  - "*.s3.ohmlab.fr"
  extraWildcardListeners:
  - name: https-wildcard-core
    hostname: "*.core.ohmlab.fr"
  - name: https-wildcard-s3
    hostname: "*.s3.ohmlab.fr"
  tlsPassthroughListeners:
  - name: tls-teleport
    hostname: "*.teleport.core.ohmlab.fr"
  - name: tls-teleport-apex
    hostname: teleport.core.ohmlab.fr
