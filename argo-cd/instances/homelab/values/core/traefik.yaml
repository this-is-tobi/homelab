# Traefik instance overrides for `homelab`.
#
# Traefik is THE ingress controller. klipper-lb binds the Service ports
# (80/443) as host ports on every node; the gateway HAProxy forwards
# public 80/443 to them (ansible/inventory/group_vars/gateway.yml).

traefik:
  deployment:
    replicas: 2
  service:
    spec:
      # Step 1 of klipper (ServiceLB) removal — .local/post-migration-
      # hardening.md R3 / .local/cilium-migration-plan.md S4. Additive:
      # kube-proxy already DNATs nodeIP:80/443 -> traefik identically for
      # klipper's dynamic LB-status IPs and for an explicit externalIPs list
      # (same 9 node IPs either way), so this changes nothing about the live
      # traffic path while klipper still runs alongside it. Once verified
      # (Gate A: no new wildcard LB frontend in `cilium-dbg bpf lb list`),
      # `--disable servicelb` removes klipper and traefik keeps serving via
      # this list instead of the (then-gone) LB status.
      externalIPs:
      - 192.168.1.100
      - 192.168.1.101
      - 192.168.1.102
      - 192.168.1.103
      - 192.168.1.104
      - 192.168.1.105
      - 192.168.1.106
      - 192.168.1.107
      - 192.168.1.108
  # Trust PROXY protocol v2 ONLY from the gateway (pi-gw, ansible inventory
  # hosts.yml) — HAProxy's `mode tcp` backends proxy (new TCP connection,
  # gateway's own source IP) rather than pass the original connection
  # through, so without this every request looks like it comes from the
  # gateway. Scoped to /32: trusting a wider range would let anyone on that
  # range spoof PROXY protocol headers and forge their source IP.
  ports:
    web:
      proxyProtocol:
        trustedIPs:
        - 192.168.1.99/32
    websecure:
      proxyProtocol:
        trustedIPs:
        - 192.168.1.99/32
  # Traefik dashboard UI is intentionally NOT exposed. It lives on the
  # internal `traefik` entrypoint (api@internal) with no clean Service path
  # for oauth2-proxy, and the lan-only ipAllowList can't gate it: with the
  # service on externalTrafficPolicy: Cluster the real client IP is SNAT'd
  # to a pod IP before Traefik sees it, so no source-based filter works.
  # Traefik health/traffic is observed via the "Traefik" Grafana dashboard
  # (prometheus-stack, Services folder) instead. Chart default stays off.
  ingressRoute:
    dashboard:
      enabled: false

gateway:
  enabled: true
  name: homelab-gateway-traefik
  namespace: kube-system
  domain: ohmlab.fr
  wildcardTlsSecret: gateway-wildcard-tls
  apexTlsSecret: gateway-wildcard-tls
  manageCertificate: true
  dnsClusterIssuer: letsencrypt-dns-prod
  extraDnsNames:
  - "*.core.ohmlab.fr"
  - "*.s3.ohmlab.fr"
  # TLS cert wildcards match a single label: appset.gitops.ohmlab.fr needs
  # its own SAN (*.ohmlab.fr does not cover it).
  - "*.gitops.ohmlab.fr"
  # LAN-only UIs (hubble, traefik dashboard, longhorn — see the lan-only
  # Middleware below). The Scaleway zone has a deep wildcard so these names
  # DO resolve publicly too; the ipAllowList middleware is the real gate,
  # not DNS. Real DNS-01 cert either way — no self-signed/mDNS involved.
  - "*.int.ohmlab.fr"
  extraWildcardListeners:
  - name: https-wildcard-core
    hostname: "*.core.ohmlab.fr"
  - name: https-wildcard-s3
    hostname: "*.s3.ohmlab.fr"
  - name: https-wildcard-gitops
    hostname: "*.gitops.ohmlab.fr"
  - name: https-wildcard-int
    hostname: "*.int.ohmlab.fr"
  tlsPassthroughListeners:
  - name: tls-teleport
    hostname: "*.teleport.core.ohmlab.fr"
  - name: tls-teleport-apex
    hostname: teleport.core.ohmlab.fr

vso:
  vaultStaticSecrets:
    traefikCrowdsecBouncerKey:
      mount: homelab
      path: platforms/production/core/traefik
