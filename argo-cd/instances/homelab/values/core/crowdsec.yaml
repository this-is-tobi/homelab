cnpg:
  mode: primary
  credentials:
    existingSecrets:
      enabled: true
      postgres:
        secretName: crowdsec-pg-cluster-admin
      app:
        secretName: crowdsec-pg-cluster-app
  backup:
    enabled: true
    endpointURL: "https://s3.fr-par.scw.cloud"
    destinationPath: "s3://ohmlab-backups/cnpg"
    s3Credentials:
      create: false
      secretName: crowdsec-pg-cluster-backup
      accessKeyId:
        key: S3_ACCESS_KEY
      secretAccessKey:
        key: S3_SECRET_KEY
      region:
        key: S3_REGION

vso:
  vaultStaticSecrets:
    crowdsecConsole:
      mount: homelab
      path: platforms/production/crowdsec
    crowdsecDbAdmin:
      mount: homelab
      path: platforms/production/crowdsec
    crowdsecDbApp:
      mount: homelab
      path: platforms/production/crowdsec
    crowdsecPgBackup:
      mount: homelab
      path: platforms/production/crowdsec
