gateway:
  enabled: true
  gatewayName: homelab-gateway-traefik
  gatewayNamespace: kube-system
  routes:
  - name: grafana
    hostnames:
    - monitoring.ohmlab.fr
    rules:
    - backendService: prometheus-stack-grafana
      backendPort: 80

kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      minReadySeconds: 1800
      maximumStartupDurationSeconds: 1800
      # Matches the 200Gi PVC below (app default is 90GB for 100Gi).
      retentionSize: 180GB
      storageSpec:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 200Gi
  grafana:
    admin:
      existingSecret: monitoring-admin
      userKey: username
      passwordKey: password
    envValueFrom:
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
        secretKeyRef:
          name: monitoring-sso
          key: OIDC_CLIENT_ID
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
        secretKeyRef:
          name: monitoring-sso
          key: OIDC_CLIENT_SECRET
    grafana.ini:
      server:
        root_url: "https://monitoring.ohmlab.fr"
      auth.generic_oauth:
        auth_url: "https://sso.core.ohmlab.fr/realms/homelab/protocol/openid-connect/auth"
        token_url: "https://sso.core.ohmlab.fr/realms/homelab/protocol/openid-connect/token"
        api_url: "https://sso.core.ohmlab.fr/realms/homelab/protocol/openid-connect/userinfo"

vso:
  vaultStaticSecrets:
    monitoringAdmin:
      mount: homelab
      path: platforms/production/core/prometheus-stack
    monitoringSso:
      mount: homelab
      path: platforms/production/core/prometheus-stack
    alertmanagerMattermost:
      mount: homelab
      path: platforms/production/core/prometheus-stack
