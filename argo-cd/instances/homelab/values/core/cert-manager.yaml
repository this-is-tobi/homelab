cert-manager:
  crds:
    enabled: true
    keep: true
  extraArgs:
    - --dns01-recursive-nameservers=ns0.dom.scw.cloud:53,ns1.dom.scw.cloud:53
    - --dns01-recursive-nameservers-only

scaleway-certmanager-webhook:
  secret:
    externalSecretName: scw-creds # SCW_ACCESS_KEY / SCW_SECRET_KEY

defaultWildcard:
  dnsZone: ohmlab.fr

clusterIssuers:
- name: letsencrypt-http-staging
  spec:
    acme:
      email: this-is-tobi@proton.me
      server: "https://acme-staging-v02.api.letsencrypt.org/directory"
      privateKeySecretRef:
        name: letsencrypt-http-staging-key
      solvers:
      - http01:
          ingress:
            serviceType: ClusterIP
            ingressClassName: apisix
- name: letsencrypt-http-prod
  spec:
    acme:
      email: this-is-tobi@proton.me
      server: "https://acme-v02.api.letsencrypt.org/directory"
      privateKeySecretRef:
        name: letsencrypt-http-prod-key
      solvers:
      - http01:
          ingress:
            serviceType: ClusterIP
            ingressClassName: apisix
- name: letsencrypt-dns-staging
  spec:
    acme:
      email: this-is-tobi@proton.me
      server: "https://acme-staging-v02.api.letsencrypt.org/directory"
      privateKeySecretRef:
        name: letsencrypt-dns-staging-key
      solvers:
      - dns01:
          webhook:
            groupName: acme.scaleway.com
            solverName: scaleway
- name: letsencrypt-dns-prod
  spec:
    acme:
      email: this-is-tobi@proton.me
      server: "https://acme-v02.api.letsencrypt.org/directory"
      privateKeySecretRef:
        name: letsencrypt-dns-prod-key
      solvers:
      - dns01:
          webhook:
            groupName: acme.scaleway.com
            solverName: scaleway
