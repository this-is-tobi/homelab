# Personal ArgoCD instance (in `argo-cd` namespace).
#
# Public-facing UI at gitops.ohmlab.fr. Not used by the `manager` AppSet.
# Provided as a sandbox for ad-hoc deployments via the ArgoCD UI.
# All credentials come from Vault via VSO (vso-utils subchart in this chart).

# UI and appset webhook are exposed via Ingress on the APISIX path.
# Traefik migration: HTTPRoutes attach to the traefik gateway ONLY
# (primary = homelab-gateway-traefik, no extraParentRefs) — argocd-server
# serves TLS on 443, which traefik validates via BackendTLSPolicy
# (argocd-server-tls is the cert-manager LE cert), while APISIX cannot do
# HTTPS upstreams over Gateway API and keeps using the annotated Ingress.
# HAProxy decides which controller receives gitops.ohmlab.fr traffic.
gateway:
  enabled: true
  gatewayName: homelab-gateway-traefik
  gatewayNamespace: kube-system
  backendTLSPolicies:
  - name: argocd-server
    serviceName: argo-cd-argocd-server
    hostname: gitops.ohmlab.fr
  routes:
  - name: argocd-server
    hostnames:
    - gitops.ohmlab.fr
    rules:
    - backendService: argo-cd-argocd-server
      backendPort: 443
  - name: argocd-appset-webhook
    hostnames:
    - appset.gitops.ohmlab.fr
    rules:
    - backendService: argo-cd-argocd-applicationset-controller
      backendPort: 7000

argo-cd:
  enabled: true
  configs:
    secret:
      argocdServerAdminPassword: "$argo-cd-config:PASSWORD_HASHED"
    cm:
      url: "https://gitops.ohmlab.fr"
      accounts.admin: apiKey,login
      oidc.config: |
        name: "Keycloak"
        issuer: "https://sso.core.ohmlab.fr/realms/homelab"
        clientID: "argo-cd"
        clientSecret: "$argo-cd-sso:OIDC_CLIENT_SECRET"
        requestedScopes: ["openid", "profile", "email", "groups"]
  notifications:
    enabled: false
    argocdUrl: "https://gitops.ohmlab.fr"
    context:
      provider: self-hosted
      cluster: homelab
      environment: production
    secret:
      create: false
      items:
        mattermost-token: ""
        email-username: ""
        email-password: ""
    notifiers:
      service.email: |
        username: $email-username
        password: $email-password
        host: "smtp.ohmlab.fr"
        port: 465
        from: "no-reply@ohmlab.fr"
      service.mattermost: |
        apiURL: "https://mattermost.ohmlab.fr"
        token: $mattermost-token
  applicationSet:
    ingress:
      hostname: appset.gitops.ohmlab.fr
  server:
    ingress:
      hostname: gitops.ohmlab.fr
  crds:
    install: false
    keep: true

vso:
  vaultStaticSecrets:
    argoCdAdmin:
      mount: homelab
      path: platforms/production/tenant/argo-cd
    argoCdConfig:
      mount: homelab
      path: platforms/production/tenant/argo-cd
    argoCdSso:
      mount: homelab
      path: platforms/production/tenant/argo-cd
