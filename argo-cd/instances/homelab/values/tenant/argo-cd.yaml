# Personal ArgoCD instance (in `argo-cd` namespace).
#
# Public-facing UI at gitops.ohmlab.fr. Not used by the `manager` AppSet.
# Provided as a sandbox for ad-hoc deployments via the ArgoCD UI.
# All credentials come from Vault via VSO (vso-utils subchart in this chart).

gateway:
  enabled: true
  gatewayName: homelab-gateway
  gatewayNamespace: kube-system
  routes:
    - name: argo-cd
      hostnames:
        - gitops.ohmlab.fr
      rules:
        - backendService: argo-cd-argocd-server
          backendPort: 80
    - name: argo-cd-appset
      hostnames:
        - appset.gitops.ohmlab.fr
      rules:
        - path: /api/webhook
          backendService: argo-cd-argocd-applicationset-controller
          backendPort: 7000

argo-cd:
  enabled: true
  configs:
    secret:
      argocdServerAdminPassword: "$argo-cd-config:PASSWORD_HASHED"
    cm:
      url: "https://gitops.ohmlab.fr"
      accounts.admin: apiKey,login
      oidc.config: |
        name: "Keycloak"
        issuer: "https://sso.ohmlab.fr/realms/homelab"
        clientID: "argo-cd"
        clientSecret: "$argo-cd-sso:OIDC_CLIENT_SECRET"
        requestedScopes: ["openid", "profile", "email", "groups"]
  notifications:
    enabled: false
    argocdUrl: "https://gitops.ohmlab.fr"
    context:
      provider: "self-hosted"
      cluster: "homelab"
      environment: "production"
    secret:
      create: false
      items:
        mattermost-token: ""
        email-username: ""
        email-password: ""
    notifiers:
      service.email: |
        username: $email-username
        password: $email-password
        host: "smtp.ohmlab.fr"
        port: 465
        from: "no-reply@ohmlab.fr"
      service.mattermost: |
        apiURL: "https://mattermost.ohmlab.fr"
        token: $mattermost-token
  applicationSet:
    ingress:
      hostname: "appset.gitops.ohmlab.fr"
  server:
    ingress:
      hostname: "gitops.ohmlab.fr"
  crds:
    install: false
    keep: true

vso:
  vaultStaticSecrets:
    argoCdAdmin:
      mount: "homelab"
      path: "platforms/production/argo-cd"
    argoCdConfig:
      mount: "homelab"
      path: "platforms/production/argo-cd"
    argoCdSso:
      mount: "homelab"
      path: "platforms/production/argo-cd"
