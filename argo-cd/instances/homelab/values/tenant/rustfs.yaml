gateway:
  enabled: true
  gatewayName: homelab-gateway
  gatewayNamespace: kube-system
  routes:
    - name: rustfs-api
      hostnames:
        - s3.ohmlab.fr
      rules:
        - backendService: rustfs
          backendPort: 9000
    - name: rustfs-console
      hostnames:
        - console.s3.ohmlab.fr
      rules:
        - backendService: rustfs-console
          backendPort: 9001

rustfs:
  ingress:
    hosts:
    - host: "s3.ohmlab.fr"
      paths:
      - path: /
        pathType: Prefix
    tls:
    - secretName: rustfs-tls
      hosts:
      - s3.ohmlab.fr
  consoleIngress:
    hosts:
    - host: "console.s3.ohmlab.fr"
      paths:
      - path: /
        pathType: Prefix
    tls:
    - secretName: rustfs-console-tls
      hosts:
      - console.s3.ohmlab.fr
  dataPersistence:
    size: 250Gi

vso:
  vaultStaticSecrets:
    rustfsAdmin:
      mount: "homelab"
      path: "platforms/production/rustfs"
