# Traefik migration: HTTPRoutes dual-attached to both gateways (the legacy
# apisix Ingresses below stay until decommission; both point at rustfs-svc).
gateway:
  enabled: true
  gatewayName: homelab-gateway
  gatewayNamespace: kube-system
  extraParentRefs:
  - name: homelab-gateway-traefik
  routes:
  - name: rustfs
    listener: https-wildcard-s3
    hostnames:
    - console.s3.ohmlab.fr
    rules:
    - backendService: rustfs-svc
      backendPort: 9001
  - name: rustfs-api
    hostnames:
    - s3.ohmlab.fr
    rules:
    - backendService: rustfs-svc
      backendPort: 9000

rustfs:
  ingress:
    enabled: true
    className: apisix
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-dns-prod
    hosts:
    - host: console.s3.ohmlab.fr
      paths:
      - path: /
        pathType: Prefix
    tls:
      enabled: true
      certManager:
        enabled: true

apiIngress:
  enabled: true
  className: apisix
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns-prod
  hosts:
  - host: s3.ohmlab.fr
    paths:
    - path: /
      pathType: Prefix
  tls:
    enabled: true
  gatewayApi:
    enabled: false
  storageclass:
    dataStorageSize: 500Gi
  config:
    rustfs:
      region: eu-west-1
  extraEnv:
  - name: RUSTFS_IDENTITY_OPENID_ENABLE
    value: "on"
  - name: RUSTFS_IDENTITY_OPENID_CONFIG_URL
    value: "https://sso.core.ohmlab.fr/realms/homelab/.well-known/openid-configuration"
  - name: RUSTFS_IDENTITY_OPENID_CLIENT_ID
    value: "rustfs"
  - name: RUSTFS_IDENTITY_OPENID_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: rustfs-oidc
        key: RUSTFS_IDENTITY_OPENID_CLIENT_SECRET
  - name: RUSTFS_IDENTITY_OPENID_SCOPES
    value: "openid,profile,email,groups"
  - name: RUSTFS_IDENTITY_OPENID_GROUPS_CLAIM
    value: "groups"
  - name: RUSTFS_IDENTITY_OPENID_USERNAME_CLAIM
    value: "preferred_username"
  - name: RUSTFS_IDENTITY_OPENID_ROLE_POLICY
    value: "consoleAdmin"
  - name: RUSTFS_IDENTITY_OPENID_DISPLAY_NAME
    value: "Keycloak"

vso:
  vaultStaticSecrets:
    rustfsAdmin:
      mount: homelab
      path: platforms/production/tenant/rustfs
    rustfsOidc:
      mount: homelab
      path: platforms/production/tenant/rustfs
