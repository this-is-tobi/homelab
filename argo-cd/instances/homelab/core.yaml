# Core (platform) tier app catalog for the `homelab` instance.
# Slim list — only what is actually deployed.
# Schema reference: ../_example/core.yaml

apps:
- app: ohmlab
  enabled: "true"
  namespace: argocd-system
  syncWave: -10
  releaseName: ohmlab
  chartPath: utils/helm
- app: longhorn
  enabled: "true"
  namespace: longhorn-system
  releaseName: longhorn-system
  syncWave: 0
- app: cilium
  enabled: "false" # Reverted to flannel — Cilium BPF lockout on RPi4 arm64
  namespace: kube-system
  syncWave: 5
- app: cert-manager
  enabled: "true"
  syncWave: 10
- app: ingress-nginx
  enabled: "false"
  syncWave: 10
# Standing ingress replacement for APISIX — runs alongside it during the
# per-hostname migration (.local/traefik-migration.md (local notes)). Serves no public
# traffic until the gateway HAProxy routes SNIs to node:8443.
- app: traefik
  enabled: "true"
  namespace: traefik
  syncWave: 11
- app: apisix
  # Decommissioned 2026-07-18 — traefik is the ingress controller. The
  # catalog app is kept as an escape hatch (like ingress-nginx): re-enabling
  # deploys a fresh stack, but klipper-lb port ownership (80/443 vs
  # traefik's) must be resolved first. Application deletion does not
  # cascade — the namespace was cleaned up manually.
  enabled: "false"
  namespace: apisix
  # After vault-operator (10): the admin credentials come from Vault via VSO.
  syncWave: 12
  ignoreDifferences:
  # etcd-jwt-token and webhook cert are auto-managed by the operator.
  # ValidatingWebhookConfiguration caBundle is injected at runtime.
  - group: ""
    kind: Secret
    name: apisix-etcd-jwt-token
    jqPathExpressions:
    - .data
  - group: ""
    kind: Secret
    name: apisix-ingress-controller-webhook-cert
    jqPathExpressions:
    - .data
  - group: admissionregistration.k8s.io
    kind: ValidatingWebhookConfiguration
    name: apisix-ingress-controller-webhook
    jqPathExpressions:
    - .webhooks[].clientConfig.caBundle
  # etcd StatefulSet: VCT status injected by Kubernetes; checksum annotation
  # derived from the operator-managed jwt-token secret (ignored above).
  - group: apps
    kind: StatefulSet
    name: apisix-etcd
    jqPathExpressions:
    - .spec.volumeClaimTemplates[].status
    - .spec.template.metadata.annotations["checksum/token-secret"]
- app: vault-operator
  enabled: "true"
  namespace: vault-operator-system
  syncWave: 10
- app: kyverno
  enabled: "true"
  namespace: kyverno
  syncWave: 15
- app: cloudnative-pg
  enabled: "true"
  syncWave: 20
- app: sops
  enabled: "true"
  syncWave: 20
- app: prometheus-stack
  enabled: "true"
  syncWave: 50
- app: keycloak
  enabled: "true"
  namespace: keycloak-system
  syncWave: 55
- app: teleport
  enabled: "true"
  namespace: teleport-system
  syncWave: 60
- app: system-upgrade
  enabled: "true"
  syncWave: 60
- app: crowdsec
  enabled: "true"
  namespace: crowdsec
  syncWave: 60
  ignoreDifferences:
  # lapi-secrets contains randomly-generated csLapiSecret and registrationToken
  # created at first install — must not be overwritten on re-sync.
  - group: ""
    kind: Secret
    name: crowdsec-lapi-secrets
    jqPathExpressions:
    - .data
  # The chart re-randomizes the secret on every render, so the deployment's
  # checksum/lapi-secret pod-template annotation never converges (permanent
  # OutOfSync noise even though every sync succeeds).
  - group: apps
    kind: Deployment
    name: crowdsec-lapi
    jqPathExpressions:
    - .spec.template.metadata.annotations["checksum/lapi-secret"]
