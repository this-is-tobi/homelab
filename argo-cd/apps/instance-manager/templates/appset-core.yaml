{{- if .Values.scopes.core.enabled }}
{{- $instance := required ".Values.instance.name is required" .Values.instance.name -}}
{{- $repo := required ".Values.repoURL is required" .Values.repoURL -}}
{{- $valuesRepo := include "instance-manager.valuesRepo" . | trim -}}
{{- $rev := .Values.targetRevision | default "main" -}}
{{- $defaultServer := .Values.destination.server | default "https://kubernetes.default.svc" -}}
{{- $project := .Values.projects.core | default "admin-core" -}}
{{- $prefix := .Values.namespacePrefix | default "" -}}
{{- $suffix := .Values.namespaceSuffix | default "" -}}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: core-{{ $instance }}
  namespace: argocd-system
  labels:
    {{- include "instance-manager.labels" . | nindent 4 }}
    ohmlab.fr/instance-scope: "core"
spec:
  goTemplate: true
  generators:
  - matrix:
      generators:
      - git:
          repoURL: {{ $repo | quote }}
          revision: {{ $rev | quote }}
          files:
          - path: 'argo-cd/instances/{{ $instance }}/core.yaml'
      - list:
          elementsYaml: "{{ `{{ .apps | toJson }}` }}"
        selector:
          matchExpressions:
          - key: enabled
            operator: In
            values:
            - "true"
  template:
    metadata:
      name: '{{ $instance }}-{{ `{{ .app }}` }}'
      annotations:
        argocd.argoproj.io/compare-options: ServerSideDiff=true
        argocd.argoproj.io/sync-wave: '{{ `{{ .syncWave }}` }}'
      labels:
        {{- include "instance-manager.labels" . | nindent 8 }}
        ohmlab.fr/instance-scope: "core"
        ohmlab.fr/app-name: '{{ `{{ .app }}` }}'
      # NO resources-finalizer here, deliberately: with it, deleting an
      # Application (UI click, kubectl, generator hiccup) cascades into
      # deleting the app's live resources — on 2026-07-04 this nearly took
      # down the production ingress (homelab-apisix stuck terminating,
      # auto-sync frozen for 19h). Disabling an app in core.yaml now orphans
      # its resources; clean them up explicitly if that is what you want.
    spec:
      project: {{ $project | quote }}
      revisionHistoryLimit: 3
      sources:
      - repoURL: {{ $repo | quote }}
        path: '{{ `{{ default (printf "argo-cd/apps/%s" (default .app .chart)) .chartPath }}` }}'
        targetRevision: '{{ printf "{{ default %q .targetRevision }}" $rev }}'
        helm:
          releaseName: '{{ `{{ default .app .releaseName }}` }}'
          valueFiles:
          - '$values/{{ printf "{{ default (printf \"argo-cd/instances/%s/values/core/%%s.yaml\" .app) .valuesPath }}" $instance }}'
      - repoURL: {{ $valuesRepo | quote }}
        ref: values
        targetRevision: {{ $rev | quote }}
      destination:
        server: '{{ printf "{{ default %q .destination.server }}" $defaultServer }}'
        namespace: '{{ printf "{{ default (printf \"%s%%s%s\" .app) .namespace }}" $prefix $suffix }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        # Label every managed namespace declaratively. The kyverno
        # sync-vault-ca generate policy keys on ohmlab.fr/vault-access to
        # distribute Vault's CA (secret vault-ca) for VSO VaultConnections —
        # without this label on the namespace the whole secret chain
        # silently breaks (manual labels do not survive re-creates).
        managedNamespaceMetadata:
          labels:
            ohmlab.fr/vault-access: "true"
            ohmlab.fr/managed-by: '{{ $instance }}'
        syncOptions:
        - CreateNamespace=true
        - ApplyOutOfSyncOnly=true
        - ServerSideApply=true
        - RespectIgnoreDifferences=true
        retry:
          limit: 3
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 3m
  templatePatch: |
    {{ "{{- if .ignoreDifferences }}" }}
    spec:
      ignoreDifferences: {{ "{{ .ignoreDifferences | toJson }}" }}
    {{ "{{- end }}" }}
  syncPolicy:
    preserveResourcesOnDeletion: true
{{- end }}
