# Default values for the per-instance manager chart.
#
# These are normally overridden by:
#   - $values mapped to argo-cd/instances/<instance>/instance.yaml
#   - inline `helm.parameters` set by the root `manager` AppSet (instance.name).

instance:
  name: ""
  env: ""
  provider: ""
  region: ""

destination:
  server: https://kubernetes.default.svc

repoURL: ""
valuesRepoURL: ""
targetRevision: main

projects:
  core: admin-core
  tenant: admin-tenant

scopes:
  core:
    enabled: true
  tenant:
    enabled: true

# Default namespace pattern for generated apps: "<prefix><app><suffix>".
namespacePrefix: ""
namespaceSuffix: ""
