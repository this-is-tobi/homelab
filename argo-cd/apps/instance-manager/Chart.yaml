apiVersion: v2
name: instance-manager
type: application
version: 0.1.0
appVersion: "0.1.0"
description: |
  Per-instance manager. Renders one ApplicationSet per scope (core + tenant)
  for the given instance. The root `manager` ApplicationSet (shipped by
  `homelab-core`) generates one Application per instance pointing at this chart.
