kyverno:
  # PolicyExceptions are only honoured from the kyverno namespace, so every
  # exception is GitOps-managed here — workloads cannot self-exempt.
  features:
    policyExceptions:
      enabled: true
      namespace: kyverno
  admissionController:
    replicas: 1
    rbac:
      clusterRole:
        extraResources:
        - apiGroups:
          - ""
          resources:
          - secrets
          verbs:
          - get
          - list
          - watch
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 384Mi
  backgroundController:
    replicas: 1
    rbac:
      clusterRole:
        extraResources:
        - apiGroups:
          - ""
          resources:
          - secrets
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - delete
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi
  cleanupController:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
  reportsController:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi

# Per-policy failureAction. Enforce blocks non-compliant admission; Audit only
# reports. baseline / non-root / latest-tag ship as Enforce (zero live
# violations as of 2026-07-05 — excluded namespaces are carved out in each
# policy template). resource-limits stays Audit: it is the most likely to
# reject pods created by upstream operators/hooks mid-incident, which is a
# worse failure mode than a report entry.
policies:
  podSecurityBaseline:
    failureAction: Enforce
  requireNonRoot:
    failureAction: Enforce
  disallowLatestTag:
    failureAction: Enforce
  requireResourceLimits:
    failureAction: Audit
