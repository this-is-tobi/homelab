apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: pod-security-baseline
  annotations:
    # Skip ReplicaSet autogen: Deployment rules already cover live pods, and
    # zero-replica RS history otherwise reports stale violations forever.
    pod-policies.kyverno.io/autogen-controllers: Deployment,StatefulSet,DaemonSet,Job,CronJob
    policies.kyverno.io/title: Enforce Pod Security Standards (Baseline)
    policies.kyverno.io/description: >-
      Enforces the Pod Security Standards baseline profile cluster-wide.
      failureAction comes from values (policies.podSecurityBaseline).
spec:
  background: true
  rules:
  - name: baseline
    match:
      any:
      - resources:
          kinds:
          - Pod
    exclude:
      any:
      - resources:
          namespaces:
          - kube-system
          - kyverno
          # System components that legitimately require privileged / hostNetwork
          - longhorn-system
          - prometheus-stack
          - system-upgrade
          - ingress-nginx
          # Log-processing agent needs hostPath (/var/log, container runtime)
          - crowdsec
          # bank-vaults operator unconditionally adds IPC_LOCK to the vault
          # container (vaultContainerSpec capabilities overrides don't stop
          # it — longstanding upstream behavior). The capability is inert on
          # the default Vault image (no cap_ipc_lock file capability) and we
          # already run disable_mlock: true, but baseline forbids any
          # non-default added capability regardless of whether it's used.
          - vault-operator-system
    validate:
      failureAction: {{ .Values.policies.podSecurityBaseline.failureAction | default "Audit" }}
      podSecurity:
        level: baseline
        version: latest
