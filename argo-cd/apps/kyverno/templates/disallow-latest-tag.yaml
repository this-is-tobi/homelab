apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    # Skip ReplicaSet autogen: Deployment rules already cover live pods, and
    # zero-replica RS history otherwise reports stale violations forever.
    pod-policies.kyverno.io/autogen-controllers: Deployment,StatefulSet,DaemonSet,Job,CronJob
    policies.kyverno.io/title: Disallow Latest Image Tag
    policies.kyverno.io/description: >-
      Container images should use a specific, immutable tag instead of 'latest'
      to ensure reproducible deployments and avoid unexpected updates.
      failureAction comes from values (policies.disallowLatestTag).
spec:
  background: true
  rules:
  - name: disallow-latest-tag
    match:
      any:
      - resources:
          kinds:
          - Pod
    exclude:
      any:
      - resources:
          namespaces:
          - kube-system
          - kyverno
          # Internal tooling images — always built as :latest by design
          - vault-operator-system
          # Upstream chart hardcodes a busybox:latest config-init container
          # with no values knob (candidate for an upstream PR).
          - homepage
    validate:
      failureAction: {{ .Values.policies.disallowLatestTag.failureAction | default "Audit" }}
      message: "Image tag 'latest' is not allowed. Use a specific tag or digest."
      pattern:
        spec:
          containers:
          - image: "!*:latest"
          =(initContainers):
          - image: "!*:latest"
          =(ephemeralContainers):
          - image: "!*:latest"
