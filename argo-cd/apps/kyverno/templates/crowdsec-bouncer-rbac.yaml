---
# Allow kyverno-background-controller to read the source Middleware (context
# apiCall) and manage its generated copies cluster-wide (generate rule with
# synchronize: true) — same pattern as kyverno:generate-vault-ca.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:generate-crowdsec-bouncer
rules:
# No resourceNames scoping (unlike kyverno:generate-vault-ca): confirmed
# live that both native RBAC's `list` AND Kyverno's own internal
# validate-policy pre-flight check for `get` silently fail against a
# resourceNames-scoped rule — `kubectl auth can-i get/list ... --as=...`
# passed fine with resourceNames in place, yet the admission webhook kept
# denying the ClusterPolicy regardless (and a kyverno-admission-controller
# restart, to rule out a stale internal cache, didn't change the outcome
# either). Kyverno's own check evidently doesn't account for resourceNames
# at all here. Scoped to one resource type (traefik.io Middlewares) only.
- apiGroups: ["traefik.io"]
  resources: ["middlewares"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno:generate-crowdsec-bouncer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno:generate-crowdsec-bouncer
subjects:
- kind: ServiceAccount
  name: kyverno-background-controller
  namespace: kyverno
- kind: ServiceAccount
  name: kyverno-admission-controller
  namespace: kyverno
  # The policy admission webhook (validate-policy.kyverno.svc) validates
  # generate rules against this SA's own RBAC at ClusterPolicy-apply time,
  # even though generateExisting routes actual execution through the
  # background controller — unlike core Secret/ConfigMap (kyverno's base
  # install grants those broadly by default), a CRD like Middleware has no
  # default grant for either controller.
