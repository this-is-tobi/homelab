---
# Allow kyverno-background-controller to read the source Middleware (context
# apiCall) and manage its generated copies cluster-wide (generate rule with
# synchronize: true) — same pattern as kyverno:generate-vault-ca.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:generate-crowdsec-bouncer
rules:
- apiGroups: ["traefik.io"]
  resources: ["middlewares"]
  resourceNames: ["crowdsec-bouncer"]
  verbs: ["get", "create", "update", "patch", "delete"]
- apiGroups: ["traefik.io"]
  resources: ["middlewares"]
  # list/watch can't be scoped by resourceNames (Kubernetes RBAC only
  # applies resourceNames to per-object verbs) — confirmed live via
  # `kubectl auth can-i list ... --as=...`: the rule above alone left
  # kyverno-admission-controller unable to list at all, failing its own
  # policy-validation webhook even though the named get/create/etc all
  # worked. Scoped to just this resource type, list-only.
  verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno:generate-crowdsec-bouncer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno:generate-crowdsec-bouncer
subjects:
- kind: ServiceAccount
  name: kyverno-background-controller
  namespace: kyverno
- kind: ServiceAccount
  name: kyverno-admission-controller
  namespace: kyverno
  # The policy admission webhook (validate-policy.kyverno.svc) validates
  # generate rules against this SA's own RBAC at ClusterPolicy-apply time,
  # even though generateExisting routes actual execution through the
  # background controller — unlike core Secret/ConfigMap (kyverno's base
  # install grants those broadly by default), a CRD like Middleware has no
  # default grant for either controller.
