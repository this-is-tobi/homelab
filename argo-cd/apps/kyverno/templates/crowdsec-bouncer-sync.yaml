apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: sync-crowdsec-bouncer
  annotations:
    policies.kyverno.io/title: Sync crowdsec-bouncer Middleware to every ingress namespace
    policies.kyverno.io/description: >-
      Mirrors the traefik/crowdsec-bouncer Middleware (spec, including the
      out-of-band lapiKey — see argo-cd/apps/traefik/values.yaml) into every
      namespace that owns an HTTPRoute. Traefik resolves an unqualified
      `name@kubernetescrd` middleware reference relative to each ROUTER's
      own namespace, not the traefik namespace the object was defined in —
      an entrypoint-wide reference without a local copy in every namespace
      is an unresolved-middleware 404 for that namespace's routes (this
      broke every app's ingress on 2026-07-19, see git history). Namespace
      list below must stay in sync with `kubectl get httproute -A` — a new
      app's namespace missing here means an unresolved reference and a 404
      for that app alone if the entrypoint-wide middleware is enabled, NOT
      a repeat of the full-cluster outage (that required an entrypoint-wide
      reference resolving with zero copies present anywhere).
    # Kyverno rejects patches to immutable generate-rule fields via its
    # admission webhook, so ArgoCD must replace (delete + create) the policy.
    argocd.argoproj.io/sync-options: Replace=true
spec:
  rules:
  - name: sync-crowdsec-bouncer
    match:
      any:
      - resources:
          kinds:
          - Namespace
          names:
          - argo-cd
          - argocd-system
          - gitea
          - homepage
          - keycloak-system
          - kube-system
          - longhorn-system
          - mattermost
          - prometheus-stack
          - rustfs
          - vault-operator-system
    context:
    - name: bouncerSpec
      apiCall:
        urlPath: /apis/traefik.io/v1alpha1/namespaces/traefik/middlewares/crowdsec-bouncer
        jmesPath: "spec"
    generate:
      generateExisting: true
      synchronize: true
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      name: crowdsec-bouncer
      namespace: "{{`{{request.object.metadata.name}}`}}"
      data:
        spec: "{{`{{bouncerSpec}}`}}"
