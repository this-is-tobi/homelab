---
# Allow kyverno-background-controller to manage vault-ca secrets cluster-wide
# Required for generate rule with synchronize: true
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:generate-vault-ca
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["vault-ca"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["vault-ca"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno:generate-vault-ca
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno:generate-vault-ca
subjects:
- kind: ServiceAccount
  name: kyverno-background-controller
  namespace: kyverno
