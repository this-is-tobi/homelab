apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    # Skip ReplicaSet autogen: Deployment rules already cover live pods, and
    # zero-replica RS history otherwise reports stale violations forever.
    pod-policies.kyverno.io/autogen-controllers: Deployment,StatefulSet,DaemonSet,Job,CronJob
    policies.kyverno.io/title: Require CPU and Memory Limits
    policies.kyverno.io/description: >-
      All containers must specify CPU and memory limits to prevent resource starvation.
      failureAction comes from values (policies.requireResourceLimits).
spec:
  background: true
  rules:
  - name: require-limits
    match:
      any:
      - resources:
          kinds:
          - Pod
    exclude:
      any:
      - resources:
          namespaces:
          - kube-system
          - kyverno
          # System components managed by upstream charts without configurable limits
          - longhorn-system
          - system-upgrade
    validate:
      failureAction: {{ .Values.policies.requireResourceLimits.failureAction | default "Audit" }}
      message: "CPU and memory limits are required for all containers."
      pattern:
        spec:
          containers:
          - resources:
              limits:
                memory: "?*"
                cpu: "?*"
          =(initContainers):
          - resources:
              limits:
                memory: "?*"
                cpu: "?*"
          =(ephemeralContainers):
          - resources:
              limits:
                memory: "?*"
                cpu: "?*"
