gateway:
  enabled: false
  gatewayName: ""
  gatewayNamespace: ""
  # Extra gateways to also attach routes to (e.g. during the APISIX→Traefik
  # migration): [{name, namespace?}] — sectionName is reused from the route.
  extraParentRefs: []
  routes: []
  # BackendTLSPolicy so Gateway-API controllers connect to vault over TLS
  # (see templates/backendtlspolicy.yaml). Requires Gateway API ≥v1.6 CRDs.
  backendTLS: false

# Bank Vaults Operator Configuration
vault-operator:
  replicaCount: 1
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # The operator is a plain Go binary — run it as nobody (matches the
  # webhook's upstream defaults).
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
      - ALL
  webhook:
    enabled: true
    replicas: 2
    pdb:
      create: true
      maxUnavailable: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

vault:
  enabled: true
  name: vault
  size: 3
  image:
    repository: hashicorp/vault
    tag: 2.0.3
  bankVaultsImage: "ghcr.io/bank-vaults/bank-vaults:v1.32.1"
  service:
    type: ClusterIP
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9102"
  storage:
    raft:
      enabled: true
      size: 10Gi
      storageClass: longhorn
  unseal:
    kubernetes:
      enabled: true
      secretName: vault-unseal-keys
  config:
    ui: true
    tls:
      enabled: true
    telemetry:
      unauthenticated: false
      retention: 10m
      disableHostname: true
  externalConfig:
    policies:
    - name: vault-post-config
      rules: |
        # KV secrets: '+' matches any single path segment:
        #   1st '+' = environment (production, staging, ...)
        #   2nd '+' = tier (core, tenant)
        #   '*'     = app name
        path "homelab/data/platforms/+/+/*" {
          capabilities = ["create", "update", "read"]
        }
        # Identity groups and aliases (OIDC group mapping)
        path "identity/group" {
          capabilities = ["create", "update", "read"]
        }
        path "identity/group/*" {
          capabilities = ["create", "update", "read"]
        }
        path "identity/group-alias" {
          capabilities = ["create", "update", "read"]
        }
        path "identity/group-alias/*" {
          capabilities = ["create", "update", "read"]
        }
        # Read auth mounts (for auto-discovery of mount accessors)
        path "sys/auth" {
          capabilities = ["read", "list"]
        }
    - name: admin
      rules: |
        # Superadmin policy — equivalent to root token access.
        # Assigned via Vault OIDC role bound to the 'admin' Keycloak group.
        path "*" {
          capabilities = ["create", "read", "update", "delete", "list", "sudo", "patch"]
        }
    - name: argo-cd
      rules: |
        path "homelab/data/platforms/+/+/argo-cd" {
          capabilities = ["read", "list"]
        }
    - name: argo-cd-core
      rules: |
        # Same as argo-cd but bound to argocd-system SA (core ArgoCD VSO)
        path "homelab/data/platforms/+/+/argo-cd" {
          capabilities = ["read", "list"]
        }
    - name: vault
      rules: |
        path "homelab/data/platforms/+/+/keycloak" {
          capabilities = ["read", "list"]
        }
    - name: cert-manager
      rules: |
        path "homelab/data/platforms/+/+/cert-manager" {
          capabilities = ["read", "list"]
        }
    - name: coder
      rules: |
        path "homelab/data/platforms/+/+/coder" {
          capabilities = ["read", "list"]
        }
    - name: gitea
      rules: |
        path "homelab/data/platforms/+/+/gitea" {
          capabilities = ["read", "list"]
        }
    - name: harbor
      rules: |
        path "homelab/data/platforms/+/+/harbor" {
          capabilities = ["read", "list"]
        }
    - name: keycloak
      rules: |
        # Keycloak reads its own secret only — client credentials are centralized
        # under keycloak's path at .clients.<app>.{clientId,clientSecret}
        path "homelab/data/platforms/+/+/keycloak" {
          capabilities = ["read", "list"]
        }
    - name: mattermost
      rules: |
        path "homelab/data/platforms/+/+/mattermost" {
          capabilities = ["read", "list"]
        }
    - name: rustfs
      rules: |
        path "homelab/data/platforms/+/+/rustfs" {
          capabilities = ["read", "list"]
        }
    - name: outline
      rules: |
        path "homelab/data/platforms/+/+/outline" {
          capabilities = ["read", "list"]
        }
    - name: prometheus-stack
      rules: |
        path "homelab/data/platforms/+/+/prometheus-stack" {
          capabilities = ["read", "list"]
        }
    - name: sonarqube
      rules: |
        path "homelab/data/platforms/+/+/sonarqube" {
          capabilities = ["read", "list"]
        }
    - name: sops
      rules: |
        path "homelab/data/platforms/+/+/sops" {
          capabilities = ["read", "list"]
        }
    - name: crowdsec
      rules: |
        path "homelab/data/platforms/+/+/crowdsec" {
          capabilities = ["read", "list"]
        }
    - name: longhorn
      rules: |
        path "homelab/data/platforms/+/+/longhorn" {
          capabilities = ["read", "list"]
        }
    - name: apisix
      rules: |
        path "homelab/data/platforms/+/+/apisix" {
          capabilities = ["read", "list"]
        }
    auth:
    - type: kubernetes
      roles:
      - name: vault-post-config
        bound_service_account_names: [vault-post-config]
        bound_service_account_namespaces: [vault-operator-system]
        policies: [vault-post-config]
        ttl: 10m
      - name: argo-cd
        bound_service_account_names: [vso]
        bound_service_account_namespaces: [argo-cd]
        policies: [argo-cd]
        ttl: 1h
      - name: argo-cd-core
        # VSO service account in argocd-system for the core ArgoCD OIDC secret
        bound_service_account_names: [vso]
        bound_service_account_namespaces: [argocd-system]
        policies: [argo-cd-core]
        ttl: 1h
      - name: cert-manager
        bound_service_account_names: [vso]
        bound_service_account_namespaces: [cert-manager]
        policies: [cert-manager]
        ttl: 1h
      - name: coder
        bound_service_account_names: [vso]
        bound_service_account_namespaces: [coder]
        policies: [coder]
        ttl: 1h
      - name: gitea
        bound_service_account_names: [vso]
        bound_service_account_namespaces: [gitea]
        policies: [gitea]
        ttl: 1h
      - name: harbor
        bound_service_account_names: [vso]
        bound_service_account_namespaces: [harbor]
        policies: [harbor]
        ttl: 1h
      - name: keycloak
        bound_service_account_names: [vso]
        bound_service_account_namespaces: [keycloak-system]
        policies: [keycloak]
        ttl: 1h
      - name: mattermost
        bound_service_account_names: [vso]
        bound_service_account_namespaces: [mattermost]
        policies: [mattermost]
        ttl: 1h
      - name: rustfs
        bound_service_account_names: [vso]
        bound_service_account_namespaces: [rustfs]
        policies: [rustfs]
        ttl: 1h
      - name: outline
        bound_service_account_names: [vso]
        bound_service_account_namespaces: [outline]
        policies: [outline]
        ttl: 1h
      - name: prometheus-stack
        bound_service_account_names: [vso]
        bound_service_account_namespaces: [prometheus-stack]
        policies: [prometheus-stack]
        ttl: 1h
      - name: sonarqube
        bound_service_account_names: [vso]
        bound_service_account_namespaces: [sonarqube]
        policies: [sonarqube]
        ttl: 1h
      - name: sops
        bound_service_account_names: [vso]
        # The sops app deploys to its own `sops` namespace (catalog default =
        # app name); this previously said kube-system, which 403'd every sync.
        bound_service_account_namespaces: [sops]
        policies: [sops]
        ttl: 1h
      - name: crowdsec
        bound_service_account_names: [vso]
        bound_service_account_namespaces: [crowdsec]
        policies: [crowdsec]
        ttl: 1h
      - name: longhorn
        bound_service_account_names: [vso]
        bound_service_account_namespaces: [longhorn-system]
        policies: [longhorn]
        ttl: 1h
      - name: apisix
        bound_service_account_names: [vso]
        bound_service_account_namespaces: [apisix]
        policies: [apisix]
        ttl: 1h
      # VSO service account in vault-operator-system for vault-oidc-credentials.
      # Uses the 'vault' policy (read homelab/data/platforms/+/+/keycloak).
      - name: vault-operator
        bound_service_account_names: [vso]
        bound_service_account_namespaces: [vault-operator-system]
        policies: [vault]
        ttl: 1h
    # Multi-cluster JWT auth — enable per remote cluster.
    # Each cluster gets its own mount (e.g., jwt-staging, jwt-prod-eu).
    # Uses K8s SA tokens validated via JWKS — no cross-cluster API dependency.
    # To enable: uncomment, set jwks_url to the remote cluster's OIDC discovery endpoint,
    # and set initSecrets.authMethod=jwt + authMount=jwt-<cluster> in the remote instance.
    # - type: jwt
    #   path: jwt-remote
    #   config:
    #     oidc_discovery_url: ""  # https://<k8s-api>/.well-known/openid-configuration
    #     # OR use jwks_url directly:
    #     # jwks_url: "https://<k8s-api>/openid/v1/jwks"
    #     bound_issuer: ""  # https://<k8s-api>
    #     default_role: ""
    #   roles:
    #   - name: vault-init-secrets
    #     bound_audiences: [vault]
    #     bound_subject: ""
    #     user_claim: sub
    #     role_type: jwt
    #     policies: [vault-init-secrets]
    #     ttl: 10m
    #
    # Vault UI OIDC auth via Keycloak.
    # Enabled per-instance via externalConfig.oidcEnabled: true.
    # vault-oidc-credentials K8s secret is created automatically by VSO
    # (vaultOidcCredentials.enabled: true + path in instance values).
    # Vault pod picks up VAULT_OIDC_CLIENT_SECRET via extraEnvsConfig (optional: true).
    # Role: 'admin' — only members of the Keycloak '/admin' group can log in.
    # Disabled by default — instances turn it on and provide discovery URL +
    # redirect URIs (see instances/homelab/values/core/vault-operator.yaml).
    oidcEnabled: false
    oidcDiscoveryUrl: ""
    oidcClientId: "vault-core"
    oidcDefaultRole: "admin"
    oidcRoleName: "admin"
    oidcBoundGroups:
    - "/admin"
    oidcRedirectUris: []
    secrets:
    - path: homelab
      type: kv
      description: Homelab secrets KV store
      options:
        version: 2
  startupSecrets: []
  resources:
    vault:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 512Mi
    bankVaults:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
  # Vault 2.0.0+ runs as vault user (UID 100, GID 1000) by default
  # runAsUser: 100 at pod level ensures the config-templating init container also writes
  # vault.json as UID 100, so the vault container can read it (fixes permission denied)
  securityContext:
    runAsUser: 100
    fsGroup: 1000
  serviceAccount: vault
  caNamespaces:
  - "*"
  # Exposed via Gateway API HTTPRoute + BackendTLSPolicy — no Ingress.
  ingress:
    enabled: false
  serviceMonitor:
    enabled: true
  statsd:
    enabled: true
    image: "prom/statsd-exporter:v0.29.0"
  # Additional env vars injected into the Vault pod (merged after the built-in
  # POD_NAME / VAULT_API_ADDR / SKIP_CHOWN / SKIP_SETCAP entries).
  # Set per-instance — empty by default.
  extraEnvsConfig: []
  # Env vars passed to ALL bank-vaults pods, including vault-configurer —
  # unlike extraEnvsConfig/vaultEnvsConfig above, which only reaches the
  # Vault server container. Anything referenced via ${ .Env.X } inside
  # externalConfig (e.g. oidc_client_secret) is templated by vault-configurer
  # itself when it pushes that config through Vault's API, so secrets needed
  # there MUST go here, not extraEnvsConfig.
  envsConfig: []
  agent:
    enabled: true

vaultOidcCredentials:
  # VaultStaticSecret in vault-operator-system that creates vault-oidc-credentials
  # from core/keycloak.clients.vault.clientSecret (generated by initSecrets).
  # The Vault pod picks up VAULT_OIDC_CLIENT_SECRET via extraEnvsConfig (optional: true).
  enabled: true
  mount: homelab
  path: platforms/production/core/keycloak

vso:
  enabled: true
  controller:
    replicas: 2
    manager:
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 512Mi
          cpu: 500m
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 65532
        capabilities:
          drop:
          - ALL
        seccompProfile:
          type: RuntimeDefault
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65532
      fsGroup: 65532
      seccompProfile:
        type: RuntimeDefault
    rbac:
      create: true
    serviceAccount:
      create: true
      name: vault-secrets-operator
  defaultVaultConnection:
    enabled: true
    address: "https://vault.vault-operator-system.svc.cluster.local:8200"
    skipTLSVerify: false
    caCertSecret: vault-tls
  defaultAuthMethod:
    enabled: false
    # Uncomment to enable global auth (not recommended for multi-tenant)
    # namespace: "vault-operator-system"
    # method: kubernetes
    # mount: kubernetes
    # allowedNamespaces: ["*"]
    # kubernetes:
    #   role: "default"  # Must exist in Vault
    #   serviceAccount: default
    #   tokenAudiences: ["vault"]
  metrics:
    service:
      enabled: true
      type: ClusterIP
      port: 8080
  # VSO resources: VaultConnection and VaultAuth for managing VSO secrets
  vaultConnection:
    default:
      address: "https://vault.vault-operator-system.svc.cluster.local:8200"
      skipTLSVerify: false
      caCertSecretRef: vault-ca
  vaultAuth:
    default:
      method: kubernetes
      mount: kubernetes
      kubernetes:
        role: vault-operator
        serviceAccount: vso
      vaultConnectionRef: default

backup-utils:
  fullnameOverride: backup
  enabled: false
  backups:
    vaultSnapshot:
      enabled: true
      type: vault
      job:
        schedule: "0 0 * * *"
        successfulJobsHistoryLimit: 3
      env:
        VAULT_ADDR: "https://vault.vault-operator-system.svc.cluster.local:8200"
        # VAULT_EXTRA_ARGS: ""
        VAULT_SKIP_VERIFY: "true"
        S3_PATH_STYLE: "true"
        RETENTION: 30d
      secrets: {}
      # VAULT_TOKEN: ""
      # S3_ENDPOINT: "https://s3.fr-par.scw.cloud"
      # S3_BUCKET_NAME: "ohmlab-backups"
      # S3_BUCKET_PREFIX: "vault"
      # S3_ACCESS_KEY: ""
      # S3_SECRET_KEY: ""
      envFrom:
      - secretRef:
          name: vault-backup

# Hierarchical configuration structure for ohmlab utilities
# Used to configure Vault and other services declaratively in Git
# Values are rendered into JSON configs consumed by ohmlab CLI tools
#
# Naming convention:
#   ohmlab.<service>.<config-type>
#
# Example:
#   ohmlab.vault.secrets  → ohmlab vault secrets --config <rendered-json>
#   ohmlab.vault.identity → ohmlab vault identity --config <rendered-json>
#   ohmlab.harbor.<type>  → ohmlab harbor <type> --config <rendered-json>
#
ohmlab:
  vault:
    # Job execution configuration for post-config tasks
    config:
      # Internal tooling image, built from utils/ in this repo — `:latest`
      # deliberately tracks main (the CLI version follows the same git history
      # as these charts). Kyverno's disallow-latest-tag excludes this namespace.
      image: "ghcr.io/this-is-tobi/homelab/utils:latest"
      vaultRole: vault-post-config
      authMethod: kubernetes
      authMount: kubernetes
      skipTLSVerify: false
      forceRotate: false
      backoffLimit: 3
      ttlSecondsAfterFinished: 86400
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      nodeSelector: {}
      tolerations: []
    # Secrets configuration for ohmlab vault secrets command
    # Rendered as JSON array of secret entries in post-config job
    secrets: []
    # Identity configuration for ohmlab vault identity command
    # Rendered as JSON object with groups and groupAliases in post-config job
    identity:
      groups: []
      groupAliases: []
