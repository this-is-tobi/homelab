{{- if and .Values.gateway.enabled .Values.gateway.backendTLS }}
---
# Gateway API HTTPS-upstream validation: vault serves TLS on 8200, so any
# Gateway-API controller (traefik) must connect with TLS and verify against
# vault's CA. The `vault-ca` ConfigMap is generated next to the Service by
# the kyverno sync-vault-ca-configmap rule (BackendTLSPolicy only accepts
# ConfigMap CA refs). APISIX ignores this resource — it reaches vault via
# the Ingress upstream-scheme annotation instead.
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: vault
spec:
  targetRefs:
  - group: ""
    kind: Service
    name: vault
  validation:
    caCertificateRefs:
    - group: ""
      kind: ConfigMap
      name: vault-ca
    # SNI sent to and validated against the backend certificate — must be in
    # the SAN list of the bank-vaults-issued cert (same name VSO validates).
    hostname: vault.vault-operator-system.svc.cluster.local
{{- end }}
