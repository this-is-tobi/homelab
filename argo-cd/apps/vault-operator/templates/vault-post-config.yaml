{{- if .Values.vault.enabled }}
---
# Unified post-install configuration job for Vault and other services.
# Runs ohmlab CLI commands to configure Vault with secrets, identity groups,
# and other declarative configurations defined in Helm values.
#
# Architecture:
# - Single job runs multiple sequential commands based on ohmlab.* config
# - Each command (vault secrets, vault identity, etc.) is idempotent
# - Reusable pattern for harbor, sonarqube, and other services
# - Hook weight ordering: 10=secrets, 11=identity, 12+=other services
#
# ServiceAccount and RBAC defined in vault-init-rbac.yaml.

apiVersion: batch/v1
kind: Job
metadata:
  name: vault-post-config-{{ .Release.Revision | default "1" }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-weight: "10"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app.kubernetes.io/name: vault-post-config
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  backoffLimit: {{ .Values.ohmlab.vault.config.backoffLimit | default 3 }}
  ttlSecondsAfterFinished: {{ .Values.ohmlab.vault.config.ttlSecondsAfterFinished | default 86400 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault-post-config
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: vault-post-config
      restartPolicy: Never
      {{- if .Values.ohmlab.vault.config.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.ohmlab.vault.config.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.ohmlab.vault.config.tolerations }}
      tolerations:
        {{- toYaml .Values.ohmlab.vault.config.tolerations | nindent 8 }}
      {{- end }}
      containers:
      - name: post-config
        image: {{ .Values.ohmlab.vault.config.image | default "ghcr.io/this-is-tobi/homelab/utils:latest" }}
        command:
        - /bin/sh
        - -c
        - |
          set -e
          
          # Start with generic service endpoint to discover leader
          SERVICE_ADDR={{ printf "https://%s.%s.svc.cluster.local:8200" .Values.vault.name .Release.Namespace | quote }}
          VAULT_AUTH_METHOD={{ .Values.ohmlab.vault.config.authMethod | default "kubernetes" }}
          VAULT_AUTH_MOUNT={{ .Values.ohmlab.vault.config.authMount | default "kubernetes" }}
          VAULT_ROLE={{ .Values.ohmlab.vault.config.vaultRole | default "vault-post-config" }}
          
          # Discover actual leader node using Go CLI (cleaner than shell parsing)
          VAULT_ADDR="$SERVICE_ADDR"
          LEADER_FLAGS="--vault-addr=$SERVICE_ADDR"
          {{- if .Values.ohmlab.vault.config.skipTLSVerify }}
          LEADER_FLAGS="$LEADER_FLAGS --skip-tls-verify"
          {{- else }}
          LEADER_FLAGS="$LEADER_FLAGS --ca-cert=/vault-ca/ca.crt"
          {{- end }}
          
          if LEADER_ADDR=$(ohmlab vault leader $LEADER_FLAGS 2>/dev/null); then
            [ -n "$LEADER_ADDR" ] && echo "Discovered leader: $LEADER_ADDR" && VAULT_ADDR="$LEADER_ADDR" || echo "Leader discovery failed, using service: $SERVICE_ADDR"
          else
            echo "Leader discovery failed, using service: $SERVICE_ADDR"
          fi
          
          # Common flags for all tasks (use discovered leader or fall back to service)
          COMMON_FLAGS="--vault-addr=$VAULT_ADDR --auth-method=$VAULT_AUTH_METHOD --auth-mount=$VAULT_AUTH_MOUNT --role=$VAULT_ROLE"
          {{- if .Values.ohmlab.vault.config.skipTLSVerify }}
          COMMON_FLAGS="$COMMON_FLAGS --skip-tls-verify"
          {{- else }}
          COMMON_FLAGS="$COMMON_FLAGS --ca-cert=/vault-ca/ca.crt"
          {{- end }}
          
          # Task 1: Configure Vault secrets
          {{- if .Values.ohmlab.vault.secrets }}
          echo "=== Configuring Vault secrets ==="
          cat > /tmp/secrets-config.json <<'EOF'
          {{ .Values.ohmlab.vault.secrets | toJson }}
          EOF
          
          ohmlab vault init $COMMON_FLAGS {{- if .Values.ohmlab.vault.config.forceRotate }} --force-rotate{{- end }} --config=/tmp/secrets-config.json
          {{- else }}
          echo "No secrets to configure"
          {{- end }}
          
          # Task 2: Configure Vault identity
          {{- if or .Values.ohmlab.vault.identity.groups .Values.ohmlab.vault.identity.groupAliases }}
          echo "=== Configuring Vault identity ==="
          cat > /tmp/identity-config.json <<'EOF'
          {{ .Values.ohmlab.vault.identity | toJson }}
          EOF
          
          ohmlab vault identity $COMMON_FLAGS --config=/tmp/identity-config.json
          {{- else }}
          echo "No identity to configure"
          {{- end }}
          
          echo "=== Post-config tasks completed ==="
        resources:
          {{- toYaml .Values.ohmlab.vault.config.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        {{- if not .Values.ohmlab.vault.config.skipTLSVerify }}
        - name: vault-ca
          mountPath: /vault-ca
          readOnly: true
        {{- end }}
      volumes:
      - name: tmp
        emptyDir: {}
      {{- if not .Values.ohmlab.vault.config.skipTLSVerify }}
      - name: vault-ca
        secret:
          secretName: vault-tls
          items:
          - key: ca.crt
            path: ca.crt
      {{- end }}
{{- end }}
