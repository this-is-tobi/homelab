{{- if .Values.vault.enabled }}
---
# ServiceAccount and RBAC for vault-post-config job.
# These are regular app resources (not hooks) so ArgoCD always maintains them.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-post-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: vault-post-config
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-post-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: vault-post-config
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
rules:
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  resourceNames: ["vault-post-config"]
  verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-post-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: vault-post-config
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-post-config
subjects:
- kind: ServiceAccount
  name: vault-post-config
  namespace: {{ .Release.Namespace }}
{{- end }}
