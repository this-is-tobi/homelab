{{- if .Values.vaultOidcCredentials.enabled }}
---
# ServiceAccount used by VSO to authenticate against Vault in vault-operator-system.
# The 'vault-operator' Kubernetes auth role is bound to this SA with the 'vault'
# policy (read homelab/data/platforms/+/+/keycloak).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vso
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
# VaultAuth using the namespace-default VaultConnection (created by the VSO
# operator via defaultVaultConnection). Role: vault-operator → policy: vault.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault-operator-vso-default
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: vault-operator
    serviceAccount: vso
    tokenExpirationSeconds: 600
---
# Reads core/keycloak from Vault (generated by initSecrets) and creates the
# vault-oidc-credentials K8s secret with VAULT_OIDC_CLIENT_SECRET.
# The Vault pod picks this up via extraEnvsConfig (optional: true) — OIDC auth
# becomes active on next pod restart once the env var is set.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: vault-oidc-credentials
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  type: kv-v2
  mount: {{ .Values.vaultOidcCredentials.mount | quote }}
  path: {{ .Values.vaultOidcCredentials.path | quote }}
  vaultAuthRef: vault-operator-vso-default
  refreshAfter: 1h
  hmacSecretData: true
  destination:
    name: vault-oidc-credentials
    create: true
    type: Opaque
    transformation:
      excludes:
        - ".*"
      templates:
        VAULT_OIDC_CLIENT_SECRET:
          text: >-
            {{`{{ get .Secrets "clients" | dig "vault" "clientSecret" "" }}`}}
{{- end }}
