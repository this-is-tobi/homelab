{{- if .Values.vault.enabled }}
---
apiVersion: vault.banzaicloud.com/v1alpha1
kind: Vault
metadata:
  name: {{ .Values.vault.name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  size: {{ .Values.vault.size }}
  image: {{ .Values.vault.image.repository }}:{{ .Values.vault.image.tag }}
  bankVaultsImage: {{ .Values.vault.bankVaultsImage }}
  {{- if or .Values.vault.service.annotations .Values.vault.agent.enabled }}
  vaultAnnotations:
    {{- if .Values.vault.service.annotations }}
    {{- toYaml .Values.vault.service.annotations | nindent 4 }}
    {{- end }}
    {{- if .Values.vault.agent.enabled }}
    vault.security.banzaicloud.io/vault-addr: "https://{{ .Values.vault.name }}:8200"
    vault.security.banzaicloud.io/vault-role: "default"
    vault.security.banzaicloud.io/vault-skip-verify: "{{ not .Values.vault.config.tls.enabled }}"
    {{- end }}
  {{- end }}
  serviceType: {{ .Values.vault.service.type }}
  {{- if .Values.vault.storage.raft.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: vault-raft
    spec:
      accessModes:
        - ReadWriteOnce
      {{- if .Values.vault.storage.raft.storageClass }}
      storageClassName: {{ .Values.vault.storage.raft.storageClass }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.vault.storage.raft.size }}
  {{- end }}
  unsealConfig:
    {{- if .Values.vault.unseal.kubernetes.enabled }}
    kubernetes:
      secretNamespace: {{ .Release.Namespace }}
      secretName: {{ .Values.vault.unseal.kubernetes.secretName }}
    {{- end }}
    {{- if .Values.vault.unseal.aws }}
    aws:
      {{- toYaml .Values.vault.unseal.aws | nindent 6 }}
    {{- end }}
    {{- if .Values.vault.unseal.gcp }}
    gcp:
      {{- toYaml .Values.vault.unseal.gcp | nindent 6 }}
    {{- end }}
    {{- if .Values.vault.unseal.azure }}
    azure:
      {{- toYaml .Values.vault.unseal.azure | nindent 6 }}
    {{- end }}
  # TLS configuration - let operator manage TLS certificate generation
  # When TLS is enabled, operator will automatically generate and manage certificates
  # with proper SANs including 127.0.0.1 for sidecar communication
  # {{- if .Values.vault.config.tls.enabled }}
  # existingTlsSecretName: vault-tls
  # {{- end }}
  vaultContainerSpec:
    name: vault
    securityContext:
      runAsNonRoot: true
      runAsUser: 100
      runAsGroup: 1000
    # vault-config (emptyDir) and vault-tls (Secret) are already mounted
    # automatically by the operator itself — see the TLS comment above.
    # Declaring them again here duplicates the operator's own auto-added
    # mounts (bank-vaults v1.24.0+) and makes the StatefulSet update fail
    # validation ("must be unique"), which silently blocks EVERY future
    # change to the Vault pod template. Only volumeClaimTemplate-backed
    # volumes (vault-raft) need an explicit mount — the operator has no way
    # to guess where those go.
    volumeMounts:
    - name: vault-raft
      mountPath: /vault/data
  config:
    ui: {{ .Values.vault.config.ui }}
    # disable_mlock: in Kubernetes, memory is managed by cgroups/resource limits
    # so mlock is unnecessary. Setting true allows running as non-root without
    # IPC_LOCK/SETFCAP capabilities, which is the more secure approach in containers.
    disable_mlock: true
    listener:
    - tcp:
        address: "0.0.0.0:8200"
        {{- if .Values.vault.config.tls.enabled }}
        tls_cert_file: /vault/tls/server.crt
        tls_key_file: /vault/tls/server.key
        {{- else }}
        tls_disable: true
        {{- end }}
        telemetry:
          unauthenticated_metrics_access: {{ .Values.vault.config.telemetry.unauthenticated }}
        cluster_address: "0.0.0.0:8201"
    storage:
      {{- if .Values.vault.storage.raft.enabled }}
      raft:
        path: /vault/data
        {{- if gt (.Values.vault.size | int) 1 }}
        retry_join:
          {{- range $i := until (.Values.vault.size | int) }}
          {{- if $.Values.vault.config.tls.enabled }}
          - leader_api_addr: https://{{ $.Values.vault.name }}-{{ $i }}.{{ $.Release.Namespace }}.svc.cluster.local:8200
            leader_ca_cert_file: /vault/tls/ca.crt
          {{- else }}
          - leader_api_addr: http://{{ $.Values.vault.name }}-{{ $i }}.{{ $.Release.Namespace }}.svc.cluster.local:8200
          {{- end }}
          {{- end }}
        {{- end }}
      {{- else if .Values.vault.storage.file }}
      file:
        path: /vault/file
      {{- end }}
    service_registration:
      kubernetes:
        namespace: {{ .Release.Namespace }}
    telemetry:
      prometheus_retention_time: {{ .Values.vault.config.telemetry.retention }}
      disable_hostname: {{ .Values.vault.config.telemetry.disableHostname }}
  externalConfig:
    {{- if .Values.vault.externalConfig.policies }}
    policies:
      {{- toYaml .Values.vault.externalConfig.policies | nindent 6 }}
    {{- end }}
    {{- if or .Values.vault.externalConfig.auth .Values.vault.externalConfig.oidcEnabled }}
    auth:
      {{- if .Values.vault.externalConfig.auth }}
      {{- toYaml .Values.vault.externalConfig.auth | nindent 6 }}
      {{- end }}
      {{- if .Values.vault.externalConfig.oidcEnabled }}
      - type: oidc
        path: oidc
        options:
          listing_visibility: "unauth"
        config:
          oidc_discovery_url: {{ .Values.vault.externalConfig.oidcDiscoveryUrl | quote }}
          oidc_client_id: {{ .Values.vault.externalConfig.oidcClientId | quote }}
          oidc_client_secret: ${ .Env.VAULT_OIDC_CLIENT_SECRET }
          default_role: {{ .Values.vault.externalConfig.oidcDefaultRole | quote }}
        roles:
        - name: {{ .Values.vault.externalConfig.oidcRoleName | quote }}
          user_claim: preferred_username
          groups_claim: groups
          bound_audiences:
          - {{ .Values.vault.externalConfig.oidcClientId | quote }}
          bound_claims:
            # toJson keeps valid (flow-style) YAML even when the list is empty.
            groups: {{ .Values.vault.externalConfig.oidcBoundGroups | toJson }}
          allowed_redirect_uris: {{ .Values.vault.externalConfig.oidcRedirectUris | toJson }}
          oidc_scopes:
          - openid
          - profile
          - email
          - groups
          policies:
          - {{ .Values.vault.externalConfig.oidcRoleName | quote }}
          ttl: 1h
      {{- end }}
    {{- end }}
    {{- if .Values.vault.externalConfig.secrets }}
    secrets:
      {{- toYaml .Values.vault.externalConfig.secrets | nindent 6 }}
    {{- end }}
    {{- if .Values.vault.externalConfig.startupSecrets }}
    startupSecrets:
      {{- toYaml .Values.vault.externalConfig.startupSecrets | nindent 6 }}
    {{- end }}
  {{- if .Values.vault.resources }}
  resources:
    {{- toYaml .Values.vault.resources | nindent 4 }}
  {{- end }}
  {{- if .Values.vault.securityContext }}
  securityContext:
    {{- toYaml .Values.vault.securityContext | nindent 4 }}
  {{- end }}
  vaultEnvsConfig:
  - name: POD_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  - name: VAULT_API_ADDR
    value: "https://$(POD_NAME).{{ .Release.Namespace }}.svc.cluster.local:8200"
  - name: VAULT_CLUSTER_ADDR
    value: "https://$(POD_NAME).{{ .Release.Namespace }}.svc.cluster.local:8201"
  # Skip chown/setcap in the Vault entrypoint:
  # - SKIP_CHOWN: /vault/config is an operator-managed projected volume that cannot be chowned
  # - SKIP_SETCAP: setcap requires SETFCAP capability; not needed since disable_mlock is true
  # Both are required when running as the non-root vault user (Vault 2.0.0+ default).
  - name: SKIP_CHOWN
    value: "true"
  - name: SKIP_SETCAP
    value: "true"
  {{- if .Values.vault.extraEnvsConfig }}
  {{- toYaml .Values.vault.extraEnvsConfig | nindent 2 }}
  {{- end }}
  {{- if .Values.vault.envsConfig }}
  envsConfig:
  {{- toYaml .Values.vault.envsConfig | nindent 2 }}
  {{- end }}
  serviceAccount: {{ .Values.vault.serviceAccount }}
  {{- if .Values.vault.caNamespaces }}
  caNamespaces:
    {{- toYaml .Values.vault.caNamespaces | nindent 4 }}
  {{- end }}
  {{- if .Values.vault.ingress.enabled }}
  ingress:
    annotations:
      {{- toYaml .Values.vault.ingress.annotations | nindent 6 }}
    spec:
      ingressClassName: {{ .Values.vault.ingress.ingressClassName }}
      rules:
      - host: {{ .Values.vault.ingress.host }}
        http:
          paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.vault.name }}
                port:
                  number: 8200
      {{- if .Values.vault.ingress.tls.enabled }}
      tls:
      - hosts:
        - {{ .Values.vault.ingress.host }}
        secretName: {{ .Values.vault.ingress.tls.secretName }}
      {{- end }}
  {{- end }}
  {{- if .Values.vault.serviceMonitor.enabled }}
  serviceMonitorEnabled: true
  {{- end }}
  statsdDisabled: {{ not .Values.vault.statsd.enabled }}
  {{- if .Values.vault.statsd.enabled }}
  statsdImage: {{ .Values.vault.statsd.image }}
  {{- end }}
{{- end }}
