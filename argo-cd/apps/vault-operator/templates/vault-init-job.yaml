{{- if and .Values.vault.enabled .Values.vault.initSecrets.enabled }}
---
# SA/Role/RoleBinding are regular app resources (not hooks) so ArgoCD always
# maintains them and never prunes them between syncs (prune: true would otherwise
# garbage-collect hook resources that lack a hook-delete-policy).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-init-secrets
  namespace: {{ .Release.Namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-init-secrets
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  resourceNames: ["vault-init-secrets"]
  verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-init-secrets
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-init-secrets
subjects:
- kind: ServiceAccount
  name: vault-init-secrets
  namespace: {{ .Release.Namespace }}

---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init-secrets-{{ .Release.Revision | default "1" }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-weight: "10"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app.kubernetes.io/name: vault-init-secrets
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  backoffLimit: {{ .Values.vault.initSecrets.backoffLimit | default 3 }}
  ttlSecondsAfterFinished: {{ .Values.vault.initSecrets.ttlSecondsAfterFinished | default 86400 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault-init-secrets
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: vault-init-secrets
      restartPolicy: Never
      {{- if .Values.vault.initSecrets.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.vault.initSecrets.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.vault.initSecrets.tolerations }}
      tolerations:
        {{- toYaml .Values.vault.initSecrets.tolerations | nindent 8 }}
      {{- end }}
      containers:
      - name: init-secrets
        image: {{ .Values.vault.initSecrets.image | default "ghcr.io/this-is-tobi/homelab/utils:latest" }}
        command:
        - /bin/sh
        - -c
        - |
          set -e

          # Write secrets config from Helm values into a temp file
          cat <<'SECRETS_CONFIG_EOF' > /tmp/secrets-config.json
          [
          {{- range $idx, $secret := .Values.vault.initSecrets.secrets }}
          {{- if $idx }},{{ end }}
          {
            "path": {{ $secret.path | quote }},
            "data": {{ $secret.data | toJson }}
          }
          {{- end }}
          ]
          SECRETS_CONFIG_EOF

          # Run the Go binary
          ohmlab vault init \
            --vault-addr={{ .Values.vault.initSecrets.vaultAddr | default (printf "https://%s.%s.svc.cluster.local:8200" .Values.vault.name .Release.Namespace) | quote }} \
            {{- if .Values.vault.initSecrets.skipTLSVerify }}
            --skip-tls-verify \
            {{- else }}
            --ca-cert=/vault-ca/ca.crt \
            {{- end }}
            --auth-method={{ .Values.vault.initSecrets.authMethod | default "kubernetes" }} \
            --auth-mount={{ .Values.vault.initSecrets.authMount | default "kubernetes" }} \
            --role={{ .Values.vault.initSecrets.vaultRole | default "vault-init-secrets" | quote }} \
            {{- if .Values.vault.initSecrets.forceRotate }}
            --force-rotate \
            {{- end }}
            --config=/tmp/secrets-config.json
        resources:
          {{- toYaml .Values.vault.initSecrets.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        {{- if not .Values.vault.initSecrets.skipTLSVerify }}
        - name: vault-ca
          mountPath: /vault-ca
          readOnly: true
        {{- end }}
      volumes:
      - name: tmp
        emptyDir: {}
      {{- if not .Values.vault.initSecrets.skipTLSVerify }}
      - name: vault-ca
        secret:
          secretName: vault-tls
          items:
          - key: ca.crt
            path: ca.crt
      {{- end }}
{{- end }}
