crowdsec:
  container_runtime: containerd

  # -- LAPI: central decision engine
  lapi:
    replicas: 1
    env:
      - name: ENROLL_KEY
        valueFrom:
          secretKeyRef:
            name: crowdsec-console
            key: ENROLL_KEY
            optional: true
      - name: ENROLL_INSTANCE_NAME
        valueFrom:
          secretKeyRef:
            name: crowdsec-console
            key: ENROLL_INSTANCE_NAME
            optional: true
      - name: ENROLL_TAGS
        valueFrom:
          secretKeyRef:
            name: crowdsec-console
            key: ENROLL_TAGS
            optional: true
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: crowdsec-pg-cluster-app
            key: password
    persistentVolume:
      data:
        enabled: true
        accessModes:
          - ReadWriteOnce
        size: 1Gi
      config:
        enabled: true
        accessModes:
          - ReadWriteOnce
        size: 1Gi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    securityContext:
      allowPrivilegeEscalation: false
      privileged: false
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  # -- Agent: DaemonSet that parses container & host logs
  agent:
    acquisition:
      - namespace: ingress-nginx
        podName: ingress-nginx-controller-*
        program: nginx
    env:
      - name: COLLECTIONS
        value: >-
          crowdsecurity/linux
          crowdsecurity/nginx
          crowdsecurity/base-http-scenarios
          crowdsecurity/http-cve
          crowdsecurity/whitelist-good-actors
      - name: PARSERS
        value: "crowdsecurity/cri-logs"
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    securityContext:
      allowPrivilegeEscalation: false
      privileged: false
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

  # -- AppSec WAF: inspects HTTP requests forwarded by ingress-nginx
  appsec:
    enabled: false
    acquisitions:
      - source: appsec
        listen_addr: "0.0.0.0:7422"
        path: /
        appsec_config: crowdsecurity/virtual-patching
        labels:
          type: appsec
    env:
      - name: COLLECTIONS
        value: "crowdsecurity/appsec-virtual-patching"
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 128Mi

  # -- Shared configuration
  config:
    config.yaml.local: |
      db_config:
        type: postgresql
        user: crowdsec
        password: ${DB_PASSWORD}
        db_name: crowdsec
        host: crowdsec-pg-cluster-rw
        port: 5432
        sslmode: require
      api:
        server:
          auto_registration:
            enabled: true
            token: "${REGISTRATION_TOKEN}"
            allowed_ranges:
              - "127.0.0.1/32"
              - "10.42.0.0/16"
              - "10.43.0.0/16"
    postoverflows:
      s01-whitelist:
        whitelist-local.yaml: |
          name: local/k8s-whitelist
          description: "Whitelist local and cluster networks"
          whitelist:
            reason: "local network"
            cidr:
              - "192.168.1.0/24"
              - "10.42.0.0/16"
              - "10.43.0.0/16"

# -- CNPG PostgreSQL cluster for LAPI persistence
cnpg:
  fullnameOverride: "crowdsec-pg-cluster"
  imageName: "ghcr.io/cloudnative-pg/postgresql:17.7"
  mode: "primary"
  dbName: "crowdsec"
  credentials:
    username: "crowdsec"
    password: ""
    postgresPassword: ""
  instances: 2
  enableSuperuserAccess: false
  pvcSize:
    data: "3Gi"
    wal: "1Gi"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "250m"
      memory: "512Mi"
  affinity:
    topologyKey: "kubernetes.io/hostname"
  backup:
    enabled: true
    legacyMode: false
    endpointURL: ""
    destinationPath: "s3://"
    cron: "0 0 0 * * *"
    retentionPolicy: "30d"
    compression: "gzip"
    s3Credentials:
      create: true
      secretName: "crowdsec-pg-cluster-backup"
      accessKeyId:
        key: "accessKeyId"
        value: ""
      secretAccessKey:
        key: "secretAccessKey"
        value: ""
      region:
        key: "region"
        value: ""

# -- VSO (Vault Secrets Operator) integration
# Secrets are stored in Vault and synced to K8s via VaultStaticSecret.
# Set mount/path per-instance in argo-cd/instances/<name>/values/core/crowdsec.yaml
vso:
  vaultAuth:
    default:
      method: "kubernetes"
      mount: "kubernetes"
      kubernetes:
        role: "crowdsec"
        serviceAccount: "default"
  vaultConnection:
    default:
      address: "https://vault.vault-operator-system.svc.cluster.local:8200"
      skipTLSVerify: true
  vaultStaticSecrets:
    crowdsecConsole:
      mount: ""
      path: ""
      type: "kv-v2"
      vaultAuthRef: "crowdsec-vso-default"
      refreshAfter: "1h"
      hmacSecretData: true
      destination:
        name: "crowdsec-console"
        create: true
        type: "Opaque"
        transformation:
          excludes:
          - ".*"
          templates:
            ENROLL_KEY:
              text: '{{ get .Secrets "console" | dig "enrollKey" "" }}'
            ENROLL_INSTANCE_NAME:
              text: '{{ get .Secrets "console" | dig "instanceName" "" }}'
            ENROLL_TAGS:
              text: '{{ get .Secrets "console" | dig "tags" "" }}'
    crowdsecDbAdmin:
      mount: ""
      path: ""
      type: "kv-v2"
      vaultAuthRef: "crowdsec-vso-default"
      refreshAfter: "1h"
      hmacSecretData: true
      destination:
        name: "crowdsec-pg-cluster-admin"
        create: true
        type: "kubernetes.io/basic-auth"
        transformation:
          excludes:
          - ".*"
          templates:
            username:
              text: '{{ get .Secrets "postgres" | dig "admin" "username" "" }}'
            password:
              text: '{{ get .Secrets "postgres" | dig "admin" "password" "" }}'
    crowdsecDbApp:
      mount: ""
      path: ""
      type: "kv-v2"
      vaultAuthRef: "crowdsec-vso-default"
      refreshAfter: "1h"
      hmacSecretData: true
      destination:
        name: "crowdsec-pg-cluster-app"
        create: true
        type: "kubernetes.io/basic-auth"
        transformation:
          excludes:
          - ".*"
          templates:
            username:
              text: '{{ get .Secrets "postgres" | dig "app" "username" "" }}'
            password:
              text: '{{ get .Secrets "postgres" | dig "app" "password" "" }}'
    crowdsecPgBackup:
      mount: ""
      path: ""
      type: "kv-v2"
      vaultAuthRef: "crowdsec-vso-default"
      refreshAfter: "1h"
      hmacSecretData: true
      destination:
        name: "crowdsec-pg-cluster-backup"
        create: true
        type: "Opaque"
        transformation:
          excludes:
          - ".*"
          templates:
            S3_ENDPOINT:
              text: '{{ get .Secrets "postgres" | dig "s3" "endpoint" "" }}'
            S3_BUCKET_NAME:
              text: '{{ get .Secrets "postgres" | dig "s3" "bucketName" "" }}'
            S3_BUCKET_PREFIX:
              text: '{{ get .Secrets "postgres" | dig "s3" "bucketPrefix" "" }}'
            S3_ACCESS_KEY:
              text: '{{ get .Secrets "postgres" | dig "s3" "accessKey" "" }}'
            S3_SECRET_KEY:
              text: '{{ get .Secrets "postgres" | dig "s3" "secretKey" "" }}'
            S3_REGION:
              text: '{{ get .Secrets "postgres" | dig "s3" "region" "" }}'
