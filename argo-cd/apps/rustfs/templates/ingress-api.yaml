{{- if .Values.apiIngress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "rustfs.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rustfs.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns-prod
    {{- with .Values.apiIngress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.apiIngress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.apiIngress.tls.enabled }}
  tls:
    - hosts:
        {{- range .Values.apiIngress.hosts }}
        - {{ .host | quote }}
        {{- end }}
      secretName: {{ include "rustfs.fullname" . }}-api-tls
  {{- end }}
  rules:
    {{- range .Values.apiIngress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- with .pathType }}
            pathType: {{ . }}
            {{- end }}
            backend:
              service:
                name: {{ include "rustfs.fullname" $ }}-svc
                port:
                  name: api
          {{- end }}
    {{- end }}
{{- end }}
