gateway:
  enabled: false
  gatewayName: ""
  gatewayNamespace: ""
  # Extra gateways to also attach routes to (e.g. during the APISIX→Traefik
  # migration): [{name, namespace?}] — sectionName is reused from the route.
  extraParentRefs: []
  routes: []

rustfs:
  mode:
    standalone:
      enabled: true
    distributed:
      enabled: false

  secret:
    existingSecret: rustfs-admin

  config:
    rustfs:
      address: ":9000"
      console_address: ":9001"
      console_enable: "true"
      log_level: info
      region: eu-west-1

  ingress:
    enabled: false

  gatewayApi:
    enabled: false

  storageclass:
    name: longhorn
    dataStorageSize: 500Gi
    logStorageSize: 1Gi

  resources:
    limits:
      cpu: "1"
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi

  containerSecurityContext:
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true

  extraEnv: []

vso:
  extraObjects:
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: vso
  vaultAuth:
    default:
      method: kubernetes
      mount: kubernetes
      kubernetes:
        role: rustfs
        serviceAccount: vso
  vaultConnection:
    default:
      address: "https://vault.vault-operator-system.svc.cluster.local:8200"
      skipTLSVerify: false
      caCertSecretRef: vault-ca
  vaultStaticSecrets:
    rustfsAdmin:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: rustfs-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: rustfs-admin
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            RUSTFS_ROOT_USER:
              text: '{{ get .Secrets "admin" | dig "accessKey" "" }}'
            RUSTFS_ROOT_PASSWORD:
              text: '{{ get .Secrets "admin" | dig "secretKey" "" }}'
    rustfsOidc:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: rustfs-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: rustfs-oidc
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            RUSTFS_IDENTITY_OPENID_CLIENT_SECRET:
              text: '{{ get .Secrets "clients" | dig "rustfs" "clientSecret" "" }}'
