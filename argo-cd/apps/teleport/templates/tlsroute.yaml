{{- if .Values.gateway.enabled }}
{{- $gatewayName := .Values.gateway.gatewayName | default "homelab-gateway" }}
{{- $gatewayNamespace := .Values.gateway.gatewayNamespace | default "kube-system" }}
{{- range .Values.gateway.tlsRoutes }}
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: {{ .name }}
spec:
  {{- $listener := .listener }}
  parentRefs:
    # See httproute templates: extraParentRefs supports dual-gateway attach
    # during ingress-controller migrations.
    - name: {{ $gatewayName }}
      namespace: {{ $gatewayNamespace }}
      sectionName: {{ $listener }}
    {{- range $.Values.gateway.extraParentRefs }}
    - name: {{ .name }}
      namespace: {{ .namespace | default $gatewayNamespace }}
      sectionName: {{ $listener }}
    {{- end }}
  hostnames:
    {{- range .hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - backendRefs:
        - name: {{ .backendService }}
          port: {{ .backendPort }}
{{- end }}
{{- end }}
