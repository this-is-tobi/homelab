gateway:
  enabled: false
  gatewayName: ""
  gatewayNamespace: ""
  # Extra gateways to also attach routes to (e.g. during the APISIX→Traefik
  # migration): [{name, namespace?}] — sectionName is reused from the route.
  extraParentRefs: []
  tlsRoutes: []

server:
  enabled: true
  # Applied to both auth and proxy pods (and their init containers).
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  operator:
    enabled: true
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
  auth:
    enabled: true
  proxy:
    enabled: true
  proxyListenerMode: multiplex
  clusterName: ""
  acme: false
  highAvailability:
    certManager:
      enabled: true
      issuerKind: ClusterIssuer
      issuerName: letsencrypt-dns-prod
      addCommonName: true
    replicaCount: 1
    podDisruptionBudget:
      enabled: false
      minAvailable: 1
  # Exposed via Gateway API TLSRoute passthrough (gateway.tlsRoutes) —
  # teleport terminates its own TLS; no Ingress.
  ingress:
    enabled: false
  service:
    type: ClusterIP
  log:
    level: INFO

roles:
  superadmin:
    allow:
      rules:
      - resources:
        - "*"
        verbs:
        - "*"
      kubernetes_groups:
      - system:masters
      kubernetes_labels:
        "*": "*"
      kubernetes_resources:
      - kind: "*"
        namespace: "*"
        name: "*"
        verbs:
        - "*"
  admin:
    allow:
      kubernetes_groups:
      - system:masters
      kubernetes_labels:
        "*": "*"
      kubernetes_resources:
      - kind: "*"
        namespace: "*"
        name: "*"
        verbs:
        - "*"

users: {}
