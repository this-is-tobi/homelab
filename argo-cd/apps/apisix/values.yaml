apisix:
  enabled: true

  replicaCount: 2

  service:
    type: LoadBalancer
    http:
      enabled: true
      containerPort: 9080
      servicePort: 80
    tls:
      servicePort: 443

  apisix:
    ssl:
      enabled: true
      containerPort: 9443
      # Trust anchor for outbound TLS (etcd verify + any upstream verify).
      # The etcd client secret carries the etcd CA as ca.crt (cert-manager).
      existingCASecret: apisix-etcd-client
      certCAFilename: ca.crt
    # NOTE: chart path is `apisix.admin.*` (nested under the chart's own
    # `apisix:` key) — a previous top-level `admin:` block here was silently
    # ignored, leaving the publicly-documented default admin key active.
    admin:
      enabled: true
      type: ClusterIP
      # Admin API credentials come from Vault via VSO (see `vso:` below) —
      # the chart injects them as env vars from the `apisix-admin` secret.
      credentials:
        admin: ""
        viewer: ""
        secretName: apisix-admin

  ingress-controller:
    enabled: true
    config:
      apisix:
        adminAPIVersion: v3
    gatewayProxy:
      createDefault: true
      provider:
        controlPlane:
          auth:
            type: AdminKey
            adminKey:
              valueFrom:
                secretKeyRef:
                  name: apisix-admin
                  key: admin
      publishService: apisix/apisix-gateway

  dashboard:
    enabled: false

  # Bundled bitnami etcd subchart DISABLED — upstream marks it dev/test-only
  # (bitnamilegacy images are frozen). Replaced by the standalone cloudpirates
  # etcd dependency (top-level `etcd:` block below) via externalEtcd.
  # KEEP THIS A SINGLE `etcd:` KEY — a duplicate would silently win/lose
  # fields (YAML last-wins). auth.tls is read for externalEtcd connections
  # too, despite living under `etcd.` in the upstream chart: it mounts the
  # client cert at /etcd-ssl (issued by templates/etcd-certificates.yaml;
  # etcd enforces --client-cert-auth, so this is mandatory).
  etcd:
    enabled: false
    auth:
      tls:
        enabled: true
        existingSecret: apisix-etcd-client
        certFilename: tls.crt
        certKeyFilename: tls.key
        verify: true
        sni: apisix-etcd

  externalEtcd:
    host:
    - https://apisix-etcd:2379
    # No password auth — identity comes from the mutual-TLS client cert.
    user: ""
    password: ""

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Standalone etcd (cloudpirates chart) — APISIX config storage.
# Keeps the historical service name so apisix.etcd.host needs no change.
etcd:
  enabled: true
  fullnameOverride: apisix-etcd
  replicaCount: 3
  # Mutual TLS on both the client port (2379) and peer links (2380).
  # Secrets are issued by templates/etcd-certificates.yaml; health probes use
  # the plaintext metrics port (2381) and are unaffected.
  auth:
    enabled: true
    existingSecret: apisix-etcd-server
    peer:
      enabled: true
      existingSecret: apisix-etcd-peer
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

gateway:
  enabled: false
  name: homelab-gateway
  namespace: kube-system
  domain: ""
  clusterIssuer: letsencrypt-dns-prod
  dnsClusterIssuer: letsencrypt-dns-prod
  wildcardTlsSecret: gateway-wildcard-tls
  apexTlsSecret: gateway-wildcard-tls
  extraListeners: []
  extraDnsNames: []
  tlsPassthroughListeners: []

dashboard:
  enabled: false
  host: ""
  ingressClassName: apisix
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns-prod

# VSO — pulls the admin API credentials from Vault into the `apisix-admin`
# secret. Instance values must provide vaultStaticSecrets.apisixAdmin.{mount,path}.
vso:
  extraObjects:
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: vso
  vaultAuth:
    default:
      method: kubernetes
      mount: kubernetes
      kubernetes:
        role: apisix
        serviceAccount: vso
  vaultConnection:
    default:
      address: "https://vault.vault-operator-system.svc.cluster.local:8200"
      skipTLSVerify: false
      caCertSecretRef: vault-ca
  vaultStaticSecrets:
    apisixAdmin:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: apisix-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: apisix-admin
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            admin:
              text: '{{ get .Secrets "admin" | dig "adminKey" "" }}'
            viewer:
              text: '{{ get .Secrets "admin" | dig "viewerKey" "" }}'
