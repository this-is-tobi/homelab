apisix:
  enabled: true

  replicaCount: 2

  service:
    type: LoadBalancer
    http:
      enabled: true
      containerPort: 9080
      servicePort: 80
    tls:
      servicePort: 443

  apisix:
    ssl:
      enabled: true
      containerPort: 9443

  admin:
    enabled: true
    type: ClusterIP
    credentials:
      admin: ""
      viewer: ""

  ingress-controller:
    enabled: true
    config:
      apisix:
        adminAPIVersion: v3
    gatewayProxy:
      createDefault: true
      provider:
        controlPlane:
          auth:
            type: AdminKey
            adminKey:
              value: "edd1c9f034335f136f87ad84b625c8f1"
      publishService: apisix/apisix-gateway

  dashboard:
    enabled: false

  etcd:
    enabled: true
    replicaCount: 3
    preUpgradeJob:
      enabled: false
    auth:
      rbac:
        create: false
        allowNoneAuthentication: true
    persistence:
      enabled: true
      size: 5Gi
      storageClass: longhorn

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

gateway:
  enabled: false
  name: homelab-gateway
  namespace: kube-system
  domain: ""
  clusterIssuer: letsencrypt-dns-prod
  dnsClusterIssuer: letsencrypt-dns-prod
  wildcardTlsSecret: gateway-wildcard-tls
  apexTlsSecret: gateway-wildcard-tls
  extraListeners: []
  extraDnsNames: []
  tlsPassthroughListeners: []

dashboard:
  enabled: false
  host: ""
  ingressClassName: apisix
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns-prod
