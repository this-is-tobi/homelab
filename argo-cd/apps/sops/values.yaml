sops:
  replicaCount: 1
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  extraEnv:
  - name: SOPS_AGE_KEY_FILE
    value: /etc/sops-age-key-file/keys
  secretsAsFiles:
  - mountPath: /etc/sops-age-key-file/
    name: sops-age-key-file
    secretName: sops-age-key-file
  securityContext:
    enabled: true
    container:
      enabled: true
  metrics:
    # The chart's own ServiceMonitor (scheme https + bearer token) has no
    # matching Service and no TLS/RBAC-proxy wired to the container — see
    # templates/service.yaml and templates/servicemonitor.yaml for the
    # working replacement this app ships instead.
    enabled: false

vso:
  extraObjects:
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: vso
  vaultAuth:
    default:
      method: kubernetes
      mount: kubernetes
      kubernetes:
        role: sops
        serviceAccount: vso
  vaultConnection:
    default:
      address: "https://vault.vault-operator-system.svc.cluster.local:8200"
      skipTLSVerify: false
      caCertSecretRef: vault-ca
  vaultStaticSecrets:
    sopsAgeKeyFile:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: sops-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: sops-age-key-file
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            keys:
              text: '{{ get .Secrets "keys" | b64dec }}'
