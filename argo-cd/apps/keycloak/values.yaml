gateway:
  enabled: false
  gatewayName: ""
  gatewayNamespace: ""
  routes: []

keycloak:
  enabled: true
  replicaCount: 1
  keycloak:
    existingSecret: keycloak-admin
    secretKeys:
      adminPasswordKey: password
    hostnameAdmin: ""
    hostname: ""
    production: true
    proxyHeaders: xforwarded
  cache:
    stack: ispn
  database:
    host: ""
    port: ""
    name: ""
    username: ""
    password: ""
  ingress:
    enabled: true
    className: apisix
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-dns-prod
    hosts:
    - host: ""
      paths:
      - path: /
        pathType: Prefix
    tls:
    - secretName: ""
      hosts:
      - ""
  postgres:
    enabled: false
  mariadb:
    enabled: false
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 2Gi
      cpu: 1000m
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
              - keycloak
          topologyKey: kubernetes.io/hostname
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  persistence:
    enabled: true
  extraEnv:
  - name: KC_LOG_LEVEL
    value: INFO

cnpg:
  fullnameOverride: keycloak-pg-cluster
  imageName: ghcr.io/cloudnative-pg/postgresql:17.10
  extraSpec:
    enablePDB: false
  mode: primary
  dbName: keycloak
  credentials:
    username: keycloak
    password: ""
    postgresPassword: ""
  instances: 3
  enableSuperuserAccess: false
  pvcSize:
    data: 7Gi
    wal: 3Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  affinity:
    topologyKey: kubernetes.io/hostname
  backup:
    enabled: true
    legacyMode: false
    endpointURL: ""
    destinationPath: "s3://<bucket-name>/<bucket-prefix>"
    cron: 0 0 0 * * *
    retentionPolicy: 30d
    compression: gzip
    s3Credentials:
      create: true
      secretName: keycloak-pg-cluster-backup
      accessKeyId:
        key: accessKeyId
        value: ""
      secretAccessKey:
        key: secretAccessKey
        value: ""
      region:
        key: region
        value: ""

vso:
  extraObjects:
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: vso
  vaultAuth:
    default:
      method: kubernetes
      mount: kubernetes
      kubernetes:
        role: keycloak
        serviceAccount: vso
  vaultConnection:
    default:
      address: "https://vault.vault-operator-system.svc.cluster.local:8200"
      skipTLSVerify: false
      caCertSecretRef: vault-ca
  vaultStaticSecrets:
    keycloakAdmin:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: keycloak-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: keycloak-admin
        create: true
        type: kubernetes.io/basic-auth
        transformation:
          excludes:
          - ".*"
          templates:
            username:
              text: '{{ get .Secrets "admin" | dig "username" "" }}'
            password:
              text: '{{ get .Secrets "admin" | dig "password" "" }}'
    keycloakConfig:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: keycloak-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: keycloak-config
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            ROOT_DOMAIN:
              text: '{{ get .Secrets "rootDomain" }}'
            KEYCLOAK_DOMAIN:
              text: '{{ get .Secrets "domain" }}'
            KEYCLOAK_REALM:
              text: '{{ get .Secrets "realm" }}'
            ADMIN_USER_USERNAME:
              text: '{{ get .Secrets "adminUser" | dig "username" "" }}'
            ADMIN_USER_PASSWORD:
              text: '{{ get .Secrets "adminUser" | dig "password" "" }}'
    keycloakDbInfos:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: keycloak-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: keycloak-db-infos
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            DB_URL:
              text: 'postgresql://{{ get .Secrets "postgres" | dig "app" "username" "" }}:{{ get .Secrets "postgres" | dig "app" "password" "" }}@{{ get .Secrets "postgres" | dig "host" "" }}:{{ get .Secrets "postgres" | dig "port" "" }}/{{ get .Secrets "postgres" | dig "database" "" }}'
            DB_HOST:
              text: '{{ get .Secrets "postgres" | dig "host" "" }}'
            DB_PORT:
              text: '{{ get .Secrets "postgres" | dig "port" "" }}'
    keycloakDbAdmin:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: keycloak-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: keycloak-pg-cluster-admin
        create: true
        type: kubernetes.io/basic-auth
        transformation:
          excludes:
          - ".*"
          templates:
            username:
              text: '{{ get .Secrets "postgres" | dig "admin" "username" "" }}'
            password:
              text: '{{ get .Secrets "postgres" | dig "admin" "password" "" }}'
    keycloakDbApp:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: keycloak-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: keycloak-pg-cluster-app
        create: true
        type: kubernetes.io/basic-auth
        transformation:
          excludes:
          - ".*"
          templates:
            username:
              text: '{{ get .Secrets "postgres" | dig "app" "username" "" }}'
            password:
              text: '{{ get .Secrets "postgres" | dig "app" "password" "" }}'
    keycloakPgBackup:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: keycloak-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: keycloak-pg-cluster-backup
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            S3_ENDPOINT:
              text: '{{ get .Secrets "postgres" | dig "s3" "endpoint" "" }}'
            S3_BUCKET_NAME:
              text: '{{ get .Secrets "postgres" | dig "s3" "bucketName" "" }}'
            S3_BUCKET_PREFIX:
              text: '{{ get .Secrets "postgres" | dig "s3" "bucketPrefix" "" }}'
            S3_ACCESS_KEY:
              text: '{{ get .Secrets "postgres" | dig "s3" "accessKey" "" }}'
            S3_SECRET_KEY:
              text: '{{ get .Secrets "postgres" | dig "s3" "secretKey" "" }}'
            S3_REGION:
              text: '{{ get .Secrets "postgres" | dig "s3" "region" "" }}'
    clientGitea:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: keycloak-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: keycloak-clients-gitea
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            CLIENT_ID:
              text: '{{ get .Secrets "clients" | dig "gitea" "clientId" "" }}'
            CLIENT_SECRET:
              text: '{{ get .Secrets "clients" | dig "gitea" "clientSecret" "" }}'
    clientGrafanaCore:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: keycloak-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: keycloak-clients-grafana-core
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            CLIENT_ID:
              text: '{{ get .Secrets "clients" | dig "grafana-core" "clientId" "" }}'
            CLIENT_SECRET:
              text: '{{ get .Secrets "clients" | dig "grafana-core" "clientSecret" "" }}'
    clientArgoCd:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: keycloak-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: keycloak-clients-argocd
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
