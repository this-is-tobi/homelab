            CLIENT_ID:
              text: '{{ get .Secrets "clients" | dig "argo-cd" "clientId" "" }}'
            CLIENT_SECRET:
              text: '{{ get .Secrets "clients" | dig "argo-cd" "clientSecret" "" }}'
    clientArgoCdCore:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: keycloak-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: keycloak-clients-argocd-core
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            CLIENT_ID:
              text: '{{ get .Secrets "clients" | dig "argo-cd-core" "clientId" "" }}'
            CLIENT_SECRET:
              text: '{{ get .Secrets "clients" | dig "argo-cd-core" "clientSecret" "" }}'
    clientVaultCore:
      mount: ""
      path: ""
      type: kv-v2
