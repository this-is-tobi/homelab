keycloakConfigCli:
  enabled: true
  fullnameOverride: keycloak-config-cli
  backoffLimit: 3
  image:
    tag: latest-26
  env:
    KEYCLOAK_URL: "http://keycloak:8080"
    KEYCLOAK_USER: admin
    IMPORT_FILES_LOCATIONS: "/config/*.json"
    IMPORT_FORCE: "false"
    IMPORT_VAR_SUBSTITUTION_ENABLED: "true"
    IMPORT_VAR_SUBSTITUTION_UNDEFINED_IS_ERROR: "true"
    LOGGING_LEVEL_ROOT: INFO
  existingSecret: keycloak-admin
  existingSecretKey: password
  extraEnv:
  - name: ROOT_DOMAIN
    valueFrom:
      secretKeyRef:
        name: keycloak-config
        key: ROOT_DOMAIN
  - name: KEYCLOAK_DOMAIN
    valueFrom:
      secretKeyRef:
        name: keycloak-config
        key: KEYCLOAK_DOMAIN
  - name: KEYCLOAK_REALM
    valueFrom:
      secretKeyRef:
        name: keycloak-config
        key: KEYCLOAK_REALM
  - name: GITEA_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: keycloak-clients-gitea
        key: CLIENT_SECRET
  - name: GRAFANA_CORE_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: keycloak-clients-grafana-core
        key: CLIENT_SECRET
  - name: ARGOCD_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: keycloak-clients-argocd
        key: CLIENT_SECRET
  - name: ARGOCD_CORE_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: keycloak-clients-argocd-core
        key: CLIENT_SECRET
  - name: VAULT_CORE_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: keycloak-clients-vault-core
        key: CLIENT_SECRET
  - name: LONGHORN_CORE_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: keycloak-clients-longhorn-core
        key: CLIENT_SECRET
  - name: RUSTFS_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: keycloak-clients-rustfs
        key: CLIENT_SECRET
  - name: ADMIN_USER_USERNAME
    valueFrom:
      secretKeyRef:
        name: keycloak-config
        key: ADMIN_USER_USERNAME
  - name: ADMIN_USER_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-config
        key: ADMIN_USER_PASSWORD
  # - name: ARGOWORKFLOWS_CLIENT_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: keycloak-clients-argoworkflows
  #       key: CLIENT_SECRET
  # - name: CODER_CLIENT_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: keycloak-clients-coder
  #       key: CLIENT_SECRET
  # - name: OUTLINE_CLIENT_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: keycloak-clients-outline
  #       key: CLIENT_SECRET
  # - name: MLFLOW_CLIENT_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: keycloak-clients-mlflow
  #       key: CLIENT_SECRET
  # - name: SONARQUBE_CLIENT_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: keycloak-clients-sonarqube
  #       key: CLIENT_SECRET
  # - name: HARBOR_CLIENT_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: keycloak-clients-harbor
  #       key: CLIENT_SECRET
  # - name: VAULTWARDEN_CLIENT_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: keycloak-clients-vaultwarden
  #       key: CLIENT_SECRET
  config:
    homelab:
      inline:
        realm: "$(env:KEYCLOAK_REALM)"
        enabled: true
        displayName: Homelab
        displayNameHtml: <b>Homelab</b> Identity
        registrationAllowed: false
        registrationEmailAsUsername: true
        editUsernameAllowed: false
        resetPasswordAllowed: true
        rememberMe: true
        verifyEmail: false
        loginWithEmailAllowed: true
        duplicateEmailsAllowed: false
        ssoSessionIdleTimeout: 1800
        ssoSessionMaxLifespan: 36000
        offlineSessionIdleTimeout: 2592000
        accessTokenLifespan: 300
        bruteForceProtected: true
        permanentLockout: false
        maxFailureWaitSeconds: 900
        minimumQuickLoginWaitSeconds: 60
        waitIncrementSeconds: 60
        quickLoginCheckMilliSeconds: 1000
        maxDeltaTimeSeconds: 43200
        failureFactor: 5
        roles:
          realm:
          - name: admin
            description: Administrator role with all permissions
            composite: true
            composites:
              realm:
              - realm-admin
              - create-realm
              - manage-realm
              - manage-users
              - manage-clients
              - manage-events
              - manage-authorization
              - impersonation
              - view-profile
              - manage-account
              - manage-account-links
              - offline_access
          - name: realm-admin
            description: Realm administrator
          - name: create-realm
            description: Create realm
          - name: manage-realm
            description: Manage realm
          - name: manage-users
            description: Manage users
          - name: manage-clients
            description: Manage clients
          - name: manage-events
            description: Manage events
          - name: manage-authorization
            description: Manage authorization
          - name: impersonation
            description: Impersonate users
          - name: view-profile
            description: View profile
          - name: manage-account
            description: Manage account
          - name: manage-account-links
            description: Manage account links
          - name: offline_access
            description: Offline access
          client:
            grafana-core:
            - name: grafanaadmin
              description: Grafana administrator role
            - name: admin
              description: Grafana admin role
            - name: editor
              description: Grafana editor role
        groups:
        - name: admin
          path: /admin
          realmRoles:
          - admin
          clientRoles:
            grafana-core:
            - grafanaadmin
        clients:
        - clientId: gitea
          name: Gitea
          description: Git hosting platform
          enabled: true
          clientAuthenticatorType: client-secret
          secret: "$(env:GITEA_CLIENT_SECRET)"
          redirectUris:
          - "https://git.$(env:ROOT_DOMAIN)/*"
          - "https://git.$(env:ROOT_DOMAIN)/user/oauth2/keycloak/callback"
          webOrigins:
          - "https://git.$(env:ROOT_DOMAIN)"
          protocol: openid-connect
          publicClient: false
          standardFlowEnabled: true
          implicitFlowEnabled: false
          directAccessGrantsEnabled: true
          serviceAccountsEnabled: false
          defaultClientScopes:
          - web-origins
          - acr
          - profile
          - roles
          - email
          - groups
          optionalClientScopes:
          - address
          - phone
          - offline_access
          - microprofile-jwt
        - clientId: grafana-core
          name: Grafana Core
          description: Monitoring dashboards (core)
          enabled: true
          clientAuthenticatorType: client-secret
          secret: "$(env:GRAFANA_CORE_CLIENT_SECRET)"
          redirectUris:
          - "https://monitoring.$(env:ROOT_DOMAIN)/*"
          - "https://monitoring.$(env:ROOT_DOMAIN)/login/generic_oauth"
          webOrigins:
          - "https://monitoring.$(env:ROOT_DOMAIN)"
          protocol: openid-connect
          publicClient: false
          standardFlowEnabled: true
          implicitFlowEnabled: false
          directAccessGrantsEnabled: true
          serviceAccountsEnabled: false
          defaultClientScopes:
          - web-origins
          - acr
          - profile
          - roles
          - email
          - groups
          optionalClientScopes:
          - address
          - phone
          - offline_access
          - microprofile-jwt
          protocolMappers:
          - name: Client Role Mapper
            protocol: openid-connect
            protocolMapper: oidc-usermodel-client-role-mapper
            consentRequired: false
            config:
              user.attribute: role
              access.token.claim: "true"
              claim.name: roles
              jsonType.label: String
              multivalued: "true"
              userinfo.token.claim: "true"
              id.token.claim: "true"
              client_id: grafana-core
        - clientId: argo-cd
          name: Argo CD
          description: GitOps continuous delivery
          enabled: true
          clientAuthenticatorType: client-secret
          secret: "$(env:ARGOCD_CLIENT_SECRET)"
          redirectUris:
          - "https://gitops.$(env:ROOT_DOMAIN)/*"
          - "https://gitops.$(env:ROOT_DOMAIN)/auth/callback"
          webOrigins:
          - "https://gitops.$(env:ROOT_DOMAIN)"
          protocol: openid-connect
          publicClient: false
          standardFlowEnabled: true
          implicitFlowEnabled: false
          directAccessGrantsEnabled: true
          serviceAccountsEnabled: false
          defaultClientScopes:
          - web-origins
          - acr
          - profile
          - roles
          - email
          - groups
          optionalClientScopes:
          - address
          - phone
          - offline_access
          - microprofile-jwt
        - clientId: argo-cd-core
          name: Argo CD (core)
          description: Core GitOps ArgoCD instance (argocd-system)
          enabled: true
          clientAuthenticatorType: client-secret
          secret: "$(env:ARGOCD_CORE_CLIENT_SECRET)"
          redirectUris:
          - "https://gitops.core.$(env:ROOT_DOMAIN)/*"
          - "https://gitops.core.$(env:ROOT_DOMAIN)/auth/callback"
          webOrigins:
          - "https://gitops.core.$(env:ROOT_DOMAIN)"
          protocol: openid-connect
          publicClient: false
          standardFlowEnabled: true
          implicitFlowEnabled: false
          directAccessGrantsEnabled: true
          serviceAccountsEnabled: false
          defaultClientScopes:
          - web-origins
          - acr
          - profile
          - roles
          - email
          - groups
          optionalClientScopes:
          - address
          - phone
          - offline_access
          - microprofile-jwt
        - clientId: vault-core
          name: Vault Core
          description: HashiCorp Vault UI OIDC login (core)
          enabled: true
          clientAuthenticatorType: client-secret
          secret: "$(env:VAULT_CORE_CLIENT_SECRET)"
          redirectUris:
          - "https://vault.core.$(env:ROOT_DOMAIN)/*"
          - "https://vault.core.$(env:ROOT_DOMAIN)/ui/vault/auth/oidc/oidc/callback"
          - "https://vault.core.$(env:ROOT_DOMAIN)/oidc/callback"
          webOrigins:
          - "https://vault.core.$(env:ROOT_DOMAIN)"
          protocol: openid-connect
          publicClient: false
          standardFlowEnabled: true
          implicitFlowEnabled: false
          directAccessGrantsEnabled: true
          serviceAccountsEnabled: false
          defaultClientScopes:
          - web-origins
          - acr
          - profile
          - roles
          - email
          - groups
          optionalClientScopes:
          - address
          - phone
          - offline_access
          - microprofile-jwt
        - clientId: longhorn-core
          name: Longhorn Core
          description: Distributed block storage UI (core)
          enabled: true
          clientAuthenticatorType: client-secret
          secret: "$(env:LONGHORN_CORE_CLIENT_SECRET)"
          redirectUris:
          - "https://longhorn.core.$(env:ROOT_DOMAIN)/*"
          webOrigins:
          - "https://longhorn.core.$(env:ROOT_DOMAIN)"
          protocol: openid-connect
          publicClient: false
          standardFlowEnabled: true
          implicitFlowEnabled: false
          directAccessGrantsEnabled: true
          serviceAccountsEnabled: false
          defaultClientScopes:
          - web-origins
          - acr
          - profile
          - roles
          - email
          - groups
          optionalClientScopes:
          - address
          - phone
          - offline_access
          - microprofile-jwt
        - clientId: rustfs
          name: RustFS
          description: S3-compatible object storage
          enabled: true
          clientAuthenticatorType: client-secret
          secret: "$(env:RUSTFS_CLIENT_SECRET)"
          redirectUris:
          - "https://console.s3.$(env:ROOT_DOMAIN)/rustfs/admin/v3/oidc/callback/default"
          webOrigins:
          - "https://console.s3.$(env:ROOT_DOMAIN)"
          protocol: openid-connect
          publicClient: false
          standardFlowEnabled: true
          implicitFlowEnabled: false
          directAccessGrantsEnabled: false
          serviceAccountsEnabled: false
          attributes:
            token.endpoint.auth.method: client_secret_post
          defaultClientScopes:
          - web-origins
          - acr
          - profile
          - roles
          - email
          - groups
          optionalClientScopes:
          - address
          - phone
          - offline_access
          - microprofile-jwt
