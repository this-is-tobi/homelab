        clientScopes:
        - name: groups
          description: User groups
          protocol: openid-connect
          attributes:
            include.in.token.scope: "true"
            display.on.consent.screen: "true"
          protocolMappers:
          - name: groups
            protocol: openid-connect
            protocolMapper: oidc-group-membership-mapper
            consentRequired: false
            config:
              full.path: "true"
              id.token.claim: "true"
              access.token.claim: "true"
              claim.name: groups
              userinfo.token.claim: "true"
        # roles:
        #   realm:
        #   - name: "admin"
        #     description: "Administrator role"
        #   - name: "user"
        #     description: "Standard user role"
        users:
        - username: "$(env:ADMIN_USER_USERNAME)@$(env:ROOT_DOMAIN)"
          email: "$(env:ADMIN_USER_USERNAME)@$(env:ROOT_DOMAIN)"
          firstName: Admin
          lastName: User
          enabled: true
          emailVerified: true
          credentials:
          - type: password
            value: "$(env:ADMIN_USER_PASSWORD)"
            temporary: false
          groups:
          - /admin
