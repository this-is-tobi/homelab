# Cilium-implemented Gateway API Gateway (templates/gateway.yaml) — this is
# Cilium acting as its OWN GatewayClass/ingress controller, a different
# thing from `gateway` below (this app's own HTTPRoutes attaching to the
# already-live traefik Gateway). Renamed to avoid the two colliding.
# OFF permanently (not just phase 1): Traefik owns the Gateway API on this
# cluster (see .local/ingress-controller-analysis.md). Cilium Gateway would
# also hard-require kubeProxyReplacement=true and Cilium >=1.20 for
# BackendTLSPolicy — see .local/cilium-migration-plan.md F5/F6/F7.
ciliumGateway:
  enabled: false
  name: ""
  domain: ""
  clusterIssuer: letsencrypt-dns-prod
  dnsClusterIssuer: letsencrypt-dns-prod
  wildcardTlsSecret: gateway-wildcard-tls
  apexTlsSecret: gateway-wildcard-tls
  extraListeners: []
  tlsPassthroughListeners: []

# HTTPRoutes this app attaches to the traefik-owned Gateway (templates/
# httproute.yaml, same convention as homepage/longhorn/vault-operator/etc).
gateway:
  enabled: false
  gatewayName: ""
  gatewayNamespace: ""
  extraParentRefs: []
  routes: []

# VSO integration — delivers the Hubble UI oauth2-proxy's Keycloak client
# creds from Vault. First VSO usage in kube-system: role/policy scoped to
# just this one secret path (argo-cd/apps/vault-operator/values.yaml
# `cilium` role / `hubble` policy), not a general kube-system grant.
vso:
  extraObjects:
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: vso
  vaultAuth:
    default:
      method: kubernetes
      mount: kubernetes
      kubernetes:
        role: cilium
        serviceAccount: vso
  vaultConnection:
    default:
      address: "https://vault.vault-operator-system.svc.cluster.local:8200"
      skipTLSVerify: false
      caCertSecretRef: vault-ca
  vaultStaticSecrets:
    # Keys match what the oauth2-proxy chart's `existingSecret` support
    # expects verbatim (same pattern as longhorn's longhornSso).
    hubbleSso:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: cilium-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: hubble-oauth2-proxy-creds
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            client-id:
              text: '{{ get .Secrets "keycloak" | dig "clientId" "" }}'
            client-secret:
              text: '{{ get .Secrets "keycloak" | dig "clientSecret" "" }}'
            cookie-secret:
              text: '{{ get .Secrets "keycloak" | dig "cookieSecret" "" }}'

# oauth2-proxy in front of Hubble UI — Hubble has no native OIDC support.
sso:
  fullnameOverride: hubble-oauth2-proxy
  config:
    existingSecret: hubble-oauth2-proxy-creds
    configFile: |-
      provider = "keycloak-oidc"
      provider_display_name = "Keycloak"
      email_domains = [ "*" ]
      upstreams = [ "file:///dev/null" ]
      redirect_url = ""
      oidc_issuer_url = ""
      reverse_proxy = true
      cookie_secure = true
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Rolling flannel→cilium migration support (official Cilium migration guide,
# adapted to k3s — full runbook: .local/cilium-migration-plan.md F8).
# Renders templates/migration-nodeconfig.yaml: a CiliumNodeConfig that flips
# CNI ownership per node, gated on a node label. Enable ONLY for the
# migration window (the homelab instance overlay does this), remove at the
# final flip.
migration:
  enabled: false
  # Nodes carrying this label (value "true") get their CNI conf written by
  # cilium and become Cilium-managed after a reboot. Label nodes one at a
  # time — see scripts/cilium-migrate-node.sh.
  nodeLabel: io.cilium.migration/cilium-default
  # CONTAINER-side path: the agent mounts cni.confPath (host) at
  # /host/etc/cni/net.d (cni.hostConfDirMountPath) regardless of the host
  # location — do NOT put the k3s host path here.
  cniConfPath: /host/etc/cni/net.d/05-cilium.conflist

cilium:
  # ==========================================================================
  # CILIUM — PHASE 1: SSH-safe configuration (no BPF on physical interfaces)
  # ==========================================================================
  # Post-mortem of the May 2026 lockout + 2026-07-19 deep-dive:
  # .local/cilium-migration-plan.md (plan of record — read it first).
  # The May config combined kubeProxyReplacement + devices=eth0 +
  # bpf.masquerade. In that mode Cilium MUST attach TC programs to eth0 for
  # NodePort/masquerade — `bpf.hostLegacyRouting: true` does NOT prevent that
  # (it only routes host-originated egress through the kernel stack). During
  # agent restarts those eth0 programs go stale and drop inbound SSH — fatal
  # on RPis with no out-of-band access.
  #
  # Phase 1 therefore removes every eth0 attachment point:
  #   - kubeProxyReplacement: false  → K3s keeps kube-proxy for Services.
  #     K3s flags: --flannel-backend=none --disable-network-policy
  #     (do NOT pass --disable-kube-proxy).
  #   - tunnel/vxlan routing         → same datapath model as flannel, no
  #     direct route manipulation on the uplink.
  #   - bpf.masquerade: false        → iptables masquerade.
  #   - no `devices`, no socketLB, no bandwidthManager, no hostFirewall,
  #     no nodeinit.
  # BPF then only attaches to Cilium-owned virtual devices (lxc*, cilium_host,
  # cilium_vxlan): an agent crash degrades pod networking at worst — SSH,
  # kubelet and etcd traffic never crosses a Cilium BPF program.
  #
  # ACCEPTANCE GATE after every rollout, on EVERY node:
  #   tc filter show dev eth0 ingress   → must be empty
  #   tc filter show dev eth0 egress    → must be empty
  #   ip link show dev eth0             → no "xdp" section
  #
  # PHASE 2 (optional, later): flip kubeProxyReplacement + native routing +
  # bpf.masquerade node-by-node (CiliumNodeConfig supports per-node KPR)
  # behind the cilium-watchdog dead-man switch (ansible k3s/prereq role) and
  # a canary worker. Expect eth0 TC programs — that is the accepted
  # trade-off of KPR.
  # ==========================================================================

  # --- CNI paths ---
  # K3s-managed containerd paths, live-verified 2026-07-19 on the running
  # fleet (k3s v1.35.3, containerd 2.2.2-k3s1 — see plan doc F3):
  #   [plugins.'io.containerd.cri.v1.runtime'.cni]
  #     bin_dirs = ["/var/lib/rancher/k3s/data/cni"]
  #     conf_dir = "/var/lib/rancher/k3s/agent/etc/cni/net.d"
  # The previous values (/opt/cni/bin, /etc/cni/net.d) pointed at dirs k3s
  # containerd NEVER reads — the May 2026 residue still sitting there is the
  # proof. Writing there again would leave every node with no CNI at all.
  cni:
    binPath: /var/lib/rancher/k3s/data/cni
    confPath: /var/lib/rancher/k3s/agent/etc/cni/net.d
    # svclb (klipper-lb) exposes traefik via hostPort 80/443 on every node.
    # With kubeProxyReplacement=false Cilium does NOT handle hostPort — the
    # portmap CNI plugin must be chained (plan doc F4) or ALL ingress dies.
    # portmap ships in /var/lib/rancher/k3s/data/cni (verified).
    chainingMode: portmap
    exclusive: true

  # --- Kube-proxy coexistence (PHASE 1) ---
  # kube-proxy stays in charge of Services; Cilium only does CNI + policy.
  kubeProxyReplacement: false
  # Direct API access via the HAProxy VIP — avoids depending on kube-proxy
  # for the agent's own control-plane connectivity.
  k8sServiceHost: 192.168.1.99
  k8sServicePort: 6443

  # --- Routing: vxlan overlay (same model as flannel) ---
  routingMode: tunnel
  tunnelProtocol: vxlan
  # 8473: flannel owns 8472 during the rolling migration window; keeping
  # 8473 afterwards costs nothing and avoids any 8472 ghosts.
  tunnelPort: 8473

  # --- IPAM ---
  # MUST be distinct from flannel's 10.42.0.0/16: the rolling migration runs
  # both CNIs side by side and bridges them via host routing (plan doc F8).
  # The cluster keeps 10.45.0.0/16 permanently after the cutover. Before the
  # final flip, update the 10.42.0.0/16 literals elsewhere in the repo
  # (crowdsec allowed_ranges/whitelists, gateway crowdsec whitelists —
  # `grep -rn '10\.42\.' ansible/ argo-cd/`).
  ipam:
    operator:
      clusterPoolIPv4PodCIDRList:
      - 10.45.0.0/16

  # --- Policy enforcement ---
  policyEnforcementMode: default

  # --- Host firewall ---
  hostFirewall:
    enabled: false

  # --- BPF settings ---
  bpf:
    # iptables masquerade — BPF masquerade would attach to the uplink.
    masquerade: false
    # Host-generated traffic (SSH, node-exporter, kubelet, etc.) uses the
    # regular kernel network stack instead of the BPF datapath.
    hostLegacyRouting: true

  enableIPv4Masquerade: true
  enableIPv6Masquerade: false
  ipv6:
    enabled: false

  # --- WireGuard encryption ---
  # Candidate for phase 2: node-to-node encryption without sidecars
  # (`encryption.enabled: true, type: wireguard`) — no eth0 TC involved.
  encryption:
    enabled: false

  # --- Gateway API / L7 ---
  # Traefik owns the Gateway API implementation on this cluster — Cilium's
  # gateway/envoy/l7 stack stays off PERMANENTLY (would require KPR=true,
  # Cilium >=1.20 for BackendTLSPolicy, and would behead the in-cluster
  # CrowdSec chain — plan doc F5/F6/F7).
  gatewayAPI:
    enabled: false
  envoy:
    enabled: false
  l7Proxy: false

  # --- Socket LB ---
  # Off — only required for kube-proxy replacement (phase 2). cgroup BPF
  # hooks are another stale-state source during rollouts.
  socketLB:
    enabled: false

  # --- Node init ---
  # GKE/kops helper DaemonSet — unnecessary on K3s and touches host state.
  nodeinit:
    enabled: false

  # --- Bandwidth manager ---
  # NEVER enable on this cluster: attaches TC BPF to eth0 (see header).
  bandwidthManager:
    enabled: false
    bbr: false

  # --- Operator ---
  operator:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
    unmanagedPodWatcher:
      restart: true
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true

  # --- Agent ---
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  # --- Hubble (observability) ---
  hubble:
    enabled: true
    relay:
      enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 300m
          memory: 256Mi
    ui:
      enabled: false
    metrics:
      enabled:
      - dns
      - drop
      - tcp
      - flow
      - icmp
      serviceMonitor:
        enabled: true
    tls:
      auto:
        enabled: true
        method: cronJob
        schedule: "0 0 1 */3 *"

  # --- Security ---
  securityContext:
    capabilities:
      ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - BPF
      - PERFMON
      cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

  # --- CRD management ---
  installCRDs: true

  # --- Prometheus metrics ---
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      trustCRDsExist: true
