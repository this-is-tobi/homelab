cilium:
  # ==========================================================================
  # CILIUM — Primary CNI (flannel fully replaced)
  # ==========================================================================
  # K3s is configured with:
  #   --flannel-backend=none --disable-network-policy --disable-kube-proxy
  #
  # Cilium provides: CNI, kube-proxy replacement, NetworkPolicy, Hubble.
  # Envoy/Gateway API disabled until kernel upgrade (CONFIG_ARM64_VA_BITS=52).
  # ==========================================================================

  # --- CNI paths ---
  # containerd uses default Linux paths (/etc/cni/net.d, /opt/cni/bin)
  # NOT the K3s agent paths — verified via `crictl info`.
  cni:
    binPath: /opt/cni/bin
    confPath: /etc/cni/net.d
    exclusive: true

  # --- Kube-proxy replacement ---
  # Cilium replaces kube-proxy entirely (K3s started with --disable-kube-proxy)
  kubeProxyReplacement: true
  k8sServiceHost: 192.168.1.99
  k8sServicePort: 6443

  # --- Device selection ---
  # Explicitly target eth0 — avoids auto-detection edge cases on RPi.
  devices: eth0

  # --- Routing ---
  # Native routing — Cilium installs direct node routes for pod CIDRs.
  # No VXLAN/Geneve overlay — direct L2 path between RPi nodes on same subnet.
  routingMode: native
  autoDirectNodeRoutes: true
  ipv4NativeRoutingCIDR: 10.42.0.0/16

  # --- IPAM ---
  # Use the existing K3s pod CIDR — Cilium takes over IP allocation.
  ipam:
    operator:
      clusterPoolIPv4PodCIDRList:
      - 10.42.0.0/16

  # --- Policy enforcement ---
  policyEnforcementMode: default

  # --- Host firewall ---
  hostFirewall:
    enabled: false

  # --- BPF settings ---
  bpf:
    masquerade: true
    # Host-generated traffic (SSH, node-exporter, kubelet, etc.) uses the
    # regular kernel network stack instead of the BPF datapath.  This prevents
    # Cilium from ever blocking out-of-band management access to the nodes.
    hostLegacyRouting: true
    # Kernel 6.12 supports tproxy for L7 without envoy fallback
    tproxy: true

  enableIPv4Masquerade: true
  enableIPv6Masquerade: false
  ipv6:
    enabled: false

  # --- WireGuard encryption ---
  encryption:
    enabled: false

  # --- Gateway API ---
  # Requires envoy + Debian arm64 kernel (CONFIG_ARM64_VA_BITS=52)
  # Kernel upgraded via: ansible-playbook install.yml --tags kernel-upgrade
  gatewayAPI:
    enabled: true

  # --- Envoy (standalone DaemonSet) ---
  # Requires Debian arm64 kernel (CONFIG_ARM64_VA_BITS=52) for tcmalloc
  # Kernel upgraded via: ansible-playbook install.yml --tags kernel-upgrade
  envoy:
    enabled: true

  # --- L7 proxy ---
  # Enabled — envoy is available after kernel upgrade
  l7Proxy: true

  # --- Operator ---
  operator:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
    unmanagedPodWatcher:
      restart: true
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true

  # --- Agent ---
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  # --- Hubble (observability) ---
  hubble:
    enabled: true
    relay:
      enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 300m
          memory: 256Mi
    ui:
      enabled: false
    metrics:
      enabled:
      - dns
      - drop
      - tcp
      - flow
      - icmp
      - httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction
      serviceMonitor:
        enabled: true
    tls:
      auto:
        enabled: true
        method: cronJob
        schedule: "0 0 1 */3 *"

  # --- Security ---
  securityContext:
    capabilities:
      ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - BPF
      - PERFMON
      cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

  # --- CRD management ---
  installCRDs: true

  # --- Prometheus metrics ---
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      trustCRDsExist: true

  # --- Node init ---
  nodeinit:
    enabled: true

  # --- Socket LB ---
  # Accelerates service routing by intercepting at socket level (cgroup BPF).
  # hostNamespaceOnly: only intercept in host netns — avoids stale reverse
  # SK map entries and pod-level side effects (see Cilium GH#42649).
  socketLB:
    enabled: true
    hostNamespaceOnly: true

  # --- Bandwidth manager ---
  # DISABLED — bandwidthManager attaches TC BPF programs to the node's
  # physical interface (eth0).  During DaemonSet rollouts the old agent exits
  # but those TC programs persist as stale BPF that drops all TCP traffic
  # (SSH, etcd, K3s API) until the new agent re-attaches.  On a 9-node RPi
  # cluster this consistently causes SSH lockouts and etcd quorum loss.
  # Re-enable only after confirming rollout-safe behavior in a future Cilium
  # version.
  bandwidthManager:
    enabled: false
    bbr: false
