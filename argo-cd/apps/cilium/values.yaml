cilium:
  # ==========================================================================
  # CILIUM — Primary CNI (flannel fully replaced)
  # ==========================================================================
  # K3s is configured with:
  #   --flannel-backend=none --disable-network-policy --disable-kube-proxy
  #
  # Cilium provides: CNI, kube-proxy replacement, NetworkPolicy, Hubble.
  # Envoy/Gateway API disabled until kernel upgrade (CONFIG_ARM64_VA_BITS=52).
  # ==========================================================================

  # --- K3s CNI paths ---
  cni:
    binPath: /var/lib/rancher/k3s/data/current/bin
    confPath: /var/lib/rancher/k3s/agent/etc/cni/net.d
    exclusive: true

  # --- Kube-proxy replacement ---
  # Cilium replaces kube-proxy entirely (K3s started with --disable-kube-proxy)
  kubeProxyReplacement: true
  k8sServiceHost: 192.168.1.99
  k8sServicePort: 6443

  # --- Routing ---
  # Native routing — Cilium installs direct node routes for pod CIDRs.
  # No VXLAN/Geneve overlay — direct L2 path between RPi nodes on same subnet.
  routingMode: native
  autoDirectNodeRoutes: true
  ipv4NativeRoutingCIDR: 10.42.0.0/16

  # --- IPAM ---
  # Use the existing K3s pod CIDR — Cilium takes over IP allocation.
  ipam:
    operator:
      clusterPoolIPv4PodCIDRList:
        - 10.42.0.0/16

  # --- Policy enforcement ---
  policyEnforcementMode: "default"

  # --- Host firewall ---
  hostFirewall:
    enabled: false

  # --- BPF settings ---
  bpf:
    masquerade: true
    hostLegacyRouting: false
    # Kernel 6.12 supports tproxy for L7 without envoy fallback
    tproxy: true

  enableIPv4Masquerade: true
  enableIPv6Masquerade: false
  ipv6:
    enabled: false

  # --- WireGuard encryption ---
  encryption:
    enabled: false

  # --- Gateway API ---
  # BLOCKED — requires envoy which needs CONFIG_ARM64_VA_BITS=52
  # Enable after running: ansible-playbook install.yml --tags kernel-upgrade
  gatewayAPI:
    enabled: false

  # --- Envoy (standalone DaemonSet) ---
  # BLOCKED — tcmalloc crashes on RPi kernel (CONFIG_ARM64_VA_BITS=39)
  # Enable after kernel upgrade to Debian arm64 kernel
  envoy:
    enabled: false

  # --- L7 proxy ---
  # Requires envoy — enable after kernel upgrade
  l7Proxy: false

  # --- Operator ---
  operator:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
    unmanagedPodWatcher:
      restart: true
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true

  # --- Agent ---
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  # --- Hubble (observability) ---
  hubble:
    enabled: true
    relay:
      enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 300m
          memory: 256Mi
    ui:
      enabled: false
    metrics:
      enabled:
        - dns
        - drop
        - tcp
        - flow
        - icmp
        - httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction
      serviceMonitor:
        enabled: true
    tls:
      auto:
        enabled: true
        method: cronJob
        schedule: "0 0 1 */3 *"

  # --- Security ---
  securityContext:
    capabilities:
      ciliumAgent:
        - CHOWN
        - KILL
        - NET_ADMIN
        - NET_RAW
        - IPC_LOCK
        - SYS_ADMIN
        - SYS_RESOURCE
        - DAC_OVERRIDE
        - FOWNER
        - SETGID
        - SETUID
        - BPF
        - PERFMON
      cleanCiliumState:
        - NET_ADMIN
        - SYS_ADMIN
        - SYS_RESOURCE

  # --- CRD management ---
  installCRDs: true

  # --- Prometheus metrics ---
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      trustCRDsExist: true

  # --- Node init ---
  nodeinit:
    enabled: true

  # --- Socket LB ---
  # Accelerates service routing by intercepting at socket level
  socketLB:
    enabled: true

  # --- Bandwidth manager ---
  # Requires kubeProxyReplacement: true (enabled above)
  bandwidthManager:
    enabled: true
    bbr: false
