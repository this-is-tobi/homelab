cilium:
  # --- K3s integration ---
  # K3s writes its CNI config to /var/lib/rancher/k3s/agent/etc/cni/net.d
  cni:
    binPath: /var/lib/rancher/k3s/data/current/bin
    confPath: /var/lib/rancher/k3s/agent/etc/cni/net.d
    # Phase 1: false — coexist with flannel, existing pods keep their IPs
    # Phase 3: switch to true after K3s args updated to --flannel-backend=none
    exclusive: false

  # --- Kube-proxy replacement ---
  # Phase 1: DISABLED — kube-proxy (nftables) keeps managing service IPs.
  #   Safety: Cilium BPF hooks only affect pod veth interfaces, NOT eth0.
  #   SSH (port 22) and API (port 6443) are unreachable by Cilium.
  #   Even a full Cilium crash cannot block node access.
  # Phase 3: enable after kernel upgraded to 48-bit VA (Debian arm64)
  kubeProxyReplacement: false

  # --- Routing ---
  # Native routing: pod-to-pod traffic via host routing table (no VXLAN overlay)
  routingMode: native
  ipv4NativeRoutingCIDR: 10.42.0.0/16
  autoDirectNodeRoutes: true
  ipam:
    operator:
      clusterPoolIPv4PodCIDRList:
        - 10.42.0.0/16

  # --- WireGuard encryption ---
  # Phase 1: DISABLED — WireGuard requires kubeProxyReplacement: true
  # Phase 3: enable after kube-proxy replacement is active
  encryption:
    enabled: false

  # --- Gateway API ---
  # Phase 1: DISABLED — requires envoy proxy
  # Phase 2: enable after kernel upgrade (CONFIG_ARM64_VA_BITS=52 fixes tcmalloc)
  gatewayAPI:
    enabled: false

  # --- Envoy (standalone DaemonSet) ---
  # Phase 1: DISABLED — tcmalloc crashes on RPi kernel (CONFIG_ARM64_VA_BITS=39)
  #   Error: "MmapAligned() failed - TCMalloc assumes a 48-bit virtual address space"
  #   Fix: upgrade to Debian arm64 kernel (CONFIG_ARM64_VA_BITS=52)
  # Phase 2: enable after kernel upgrade
  envoy:
    enabled: false

  # --- L7 proxy ---
  # Phase 1: DISABLED — requires envoy
  # Phase 2: enable after kernel upgrade
  l7Proxy: false

  # --- Operator ---
  operator:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
    unmanagedPodWatcher:
      restart: true
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true

  # --- Agent ---
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  # --- Hubble (observability) ---
  hubble:
    enabled: true
    relay:
      enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 300m
          memory: 256Mi
    ui:
      enabled: false
    metrics:
      enabled:
        - dns
        - drop
        - tcp
        - flow
        - icmp
        - httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction
      serviceMonitor:
        enabled: true
    tls:
      auto:
        enabled: true
        method: cronJob
        schedule: "0 0 1 */3 *"

  # --- Security ---
  securityContext:
    capabilities:
      ciliumAgent:
        - CHOWN
        - KILL
        - NET_ADMIN
        - NET_RAW
        - IPC_LOCK
        - SYS_ADMIN
        - SYS_RESOURCE
        - DAC_OVERRIDE
        - FOWNER
        - SETGID
        - SETUID
        - BPF
        - PERFMON
      cleanCiliumState:
        - NET_ADMIN
        - SYS_ADMIN
        - SYS_RESOURCE

  # --- CRD management ---
  installCRDs: true

  # --- Prometheus metrics ---
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      trustCRDsExist: true

  # --- Misc ---
  bpf:
    # Phase 1: false — bpf masquerade requires kubeProxyReplacement: true
    # Phase 3: enable after kube-proxy replacement is active
    masquerade: false
    hostLegacyRouting: false
  enableIPv4Masquerade: true
  enableIPv6Masquerade: false
  ipv6:
    enabled: false

  # --- Node init for Pi4 (ensure modules loaded) ---
  nodeinit:
    enabled: true

  # NOTE: socketLB and bandwidthManager require kubeProxyReplacement: true
  # They will be re-enabled in Phase 3 alongside kube-proxy replacement.
