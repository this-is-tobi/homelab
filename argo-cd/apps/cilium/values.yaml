# Cilium-implemented Gateway API Gateway (templates/gateway.yaml).
# OFF in phase 1: APISIX owns the Gateway API on this cluster and
# cilium.gatewayAPI is disabled below.
gateway:
  enabled: false
  name: ""
  domain: ""
  clusterIssuer: letsencrypt-dns-prod
  dnsClusterIssuer: letsencrypt-dns-prod
  wildcardTlsSecret: gateway-wildcard-tls
  apexTlsSecret: gateway-wildcard-tls
  extraListeners: []
  tlsPassthroughListeners: []

cilium:
  # ==========================================================================
  # CILIUM — PHASE 1: SSH-safe configuration (no BPF on physical interfaces)
  # ==========================================================================
  # Post-mortem of the May 2026 lockout (docs/cilium-migration-investigation):
  # the previous config combined kubeProxyReplacement + devices=eth0 +
  # bpf.masquerade. In that mode Cilium MUST attach TC programs to eth0 for
  # NodePort/masquerade — `bpf.hostLegacyRouting: true` does NOT prevent that
  # (it only routes host-originated egress through the kernel stack). During
  # agent restarts those eth0 programs go stale and drop inbound SSH — fatal
  # on RPis with no out-of-band access.
  #
  # Phase 1 therefore removes every eth0 attachment point:
  #   - kubeProxyReplacement: false  → K3s keeps kube-proxy for Services.
  #     K3s flags: --flannel-backend=none --disable-network-policy
  #     (do NOT pass --disable-kube-proxy).
  #   - tunnel/vxlan routing         → same datapath model as flannel, no
  #     direct route manipulation on the uplink.
  #   - bpf.masquerade: false        → iptables masquerade.
  #   - no `devices`, no socketLB, no bandwidthManager, no hostFirewall,
  #     no nodeinit.
  # BPF then only attaches to Cilium-owned virtual devices (lxc*, cilium_host,
  # cilium_vxlan): an agent crash degrades pod networking at worst — SSH,
  # kubelet and etcd traffic never crosses a Cilium BPF program.
  #
  # ACCEPTANCE GATE after every rollout, on EVERY node:
  #   tc filter show dev eth0 ingress   → must be empty
  #   tc filter show dev eth0 egress    → must be empty
  #   ip link show dev eth0             → no "xdp" section
  #
  # PHASE 2 (optional, later): flip kubeProxyReplacement + native routing +
  # bpf.masquerade node-by-node behind the cilium-watchdog dead-man switch
  # (ansible k3s/prereq role) and a canary worker. Expect eth0 TC programs —
  # that is the accepted trade-off of KPR.
  # ==========================================================================

  # --- CNI paths ---
  # containerd uses default Linux paths (/etc/cni/net.d, /opt/cni/bin)
  # NOT the K3s agent paths — verified via `crictl info`.
  cni:
    binPath: /opt/cni/bin
    confPath: /etc/cni/net.d
    exclusive: true

  # --- Kube-proxy coexistence (PHASE 1) ---
  # kube-proxy stays in charge of Services; Cilium only does CNI + policy.
  kubeProxyReplacement: false
  # Direct API access via the HAProxy VIP — avoids depending on kube-proxy
  # for the agent's own control-plane connectivity.
  k8sServiceHost: 192.168.1.99
  k8sServicePort: 6443

  # --- Routing: vxlan overlay (same model as flannel) ---
  routingMode: tunnel
  tunnelProtocol: vxlan

  # --- IPAM ---
  ipam:
    operator:
      clusterPoolIPv4PodCIDRList:
      - 10.42.0.0/16

  # --- Policy enforcement ---
  policyEnforcementMode: default

  # --- Host firewall ---
  hostFirewall:
    enabled: false

  # --- BPF settings ---
  bpf:
    # iptables masquerade — BPF masquerade would attach to the uplink.
    masquerade: false
    # Host-generated traffic (SSH, node-exporter, kubelet, etc.) uses the
    # regular kernel network stack instead of the BPF datapath.
    hostLegacyRouting: true

  enableIPv4Masquerade: true
  enableIPv6Masquerade: false
  ipv6:
    enabled: false

  # --- WireGuard encryption ---
  # Candidate for phase 2: node-to-node encryption without sidecars
  # (`encryption.enabled: true, type: wireguard`) — no eth0 TC involved.
  encryption:
    enabled: false

  # --- Gateway API / L7 ---
  # APISIX owns the Gateway API implementation on this cluster. Cilium's
  # gateway/envoy/l7 stack stays off in phase 1 (fewer moving parts).
  gatewayAPI:
    enabled: false
  envoy:
    enabled: false
  l7Proxy: false

  # --- Socket LB ---
  # Off — only required for kube-proxy replacement (phase 2). cgroup BPF
  # hooks are another stale-state source during rollouts.
  socketLB:
    enabled: false

  # --- Node init ---
  # GKE/kops helper DaemonSet — unnecessary on K3s and touches host state.
  nodeinit:
    enabled: false

  # --- Bandwidth manager ---
  # NEVER enable on this cluster: attaches TC BPF to eth0 (see header).
  bandwidthManager:
    enabled: false
    bbr: false

  # --- Operator ---
  operator:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
    unmanagedPodWatcher:
      restart: true
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true

  # --- Agent ---
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  # --- Hubble (observability) ---
  hubble:
    enabled: true
    relay:
      enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 300m
          memory: 256Mi
    ui:
      enabled: false
    metrics:
      enabled:
      - dns
      - drop
      - tcp
      - flow
      - icmp
      serviceMonitor:
        enabled: true
    tls:
      auto:
        enabled: true
        method: cronJob
        schedule: "0 0 1 */3 *"

  # --- Security ---
  securityContext:
    capabilities:
      ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - BPF
      - PERFMON
      cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

  # --- CRD management ---
  installCRDs: true

  # --- Prometheus metrics ---
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      trustCRDsExist: true
