cilium:
  # --- K3s integration ---
  # K3s writes its CNI config to /var/lib/rancher/k3s/agent/etc/cni/net.d
  cni:
    binPath: /var/lib/rancher/k3s/data/current/bin
    confPath: /var/lib/rancher/k3s/agent/etc/cni/net.d
    # Phase 1: false for coexistence with flannel during migration
    # Phase 2: switch to true after K3s args updated
    exclusive: false

  # --- Kube-proxy replacement ---
  kubeProxyReplacement: true
  k8sServiceHost: 192.168.1.99
  k8sServicePort: 6443

  # --- Routing ---
  # Use native routing (no VXLAN overlay) for better performance on flat L2 network
  routingMode: native
  ipv4NativeRoutingCIDR: 10.42.0.0/16
  autoDirectNodeRoutes: true
  ipam:
    operator:
      clusterPoolIPv4PodCIDRList:
        - 10.42.0.0/16

  # --- WireGuard transparent encryption (node-to-node) ---
  encryption:
    enabled: true
    type: wireguard
    wireguard:
      persistentKeepalive: 25s

  # --- Gateway API ---
  gatewayAPI:
    enabled: true
    hostNetwork:
      # Phase 1: false to avoid port conflict with svclb-ingress-nginx (80/443)
      # Phase 2: switch to true after servicelb is disabled
      enabled: false
    # Required for privileged port binding (80/443)
    enableAlpn: true

  # --- Envoy (standalone DaemonSet for better isolation) ---
  envoy:
    enabled: true
    securityContext:
      capabilities:
        keepCapNetBindService: true
        envoy:
          - NET_BIND_SERVICE
          - NET_ADMIN
          - BPF
          - PERFMON
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 1000m
        memory: 512Mi

  # --- L7 proxy ---
  l7Proxy: true

  # --- Operator ---
  operator:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
    unmanagedPodWatcher:
      restart: true
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true

  # --- Agent ---
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  # --- Hubble (observability) ---
  hubble:
    enabled: true
    relay:
      enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 300m
          memory: 256Mi
    ui:
      enabled: false
    metrics:
      enabled:
        - dns
        - drop
        - tcp
        - flow
        - icmp
        - httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction
      serviceMonitor:
        enabled: true
    tls:
      auto:
        enabled: true
        method: cronJob
        schedule: "0 0 1 */3 *"

  # --- Security ---
  securityContext:
    capabilities:
      ciliumAgent:
        - CHOWN
        - KILL
        - NET_ADMIN
        - NET_RAW
        - IPC_LOCK
        - SYS_ADMIN
        - SYS_RESOURCE
        - DAC_OVERRIDE
        - FOWNER
        - SETGID
        - SETUID
        - BPF
        - PERFMON
      cleanCiliumState:
        - NET_ADMIN
        - SYS_ADMIN
        - SYS_RESOURCE

  # --- CRD management ---
  installCRDs: true

  # --- Prometheus metrics ---
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      trustCRDsExist: true

  # --- Misc ---
  bpf:
    masquerade: true
    hostLegacyRouting: false
  enableIPv4Masquerade: true
  enableIPv6Masquerade: false
  ipv6:
    enabled: false

  # --- Node init for Pi4 (ensure modules loaded) ---
  nodeinit:
    enabled: true

  # --- Socket LB for improved east-west performance ---
  socketLB:
    enabled: true
    hostNamespaceOnly: false

  # --- Bandwidth manager (EDT-based) ---
  bandwidthManager:
    enabled: true
    bbr: false
