{{- if .Values.ciliumGateway.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: cilium
spec:
  controllerName: io.cilium/gateway-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.ciliumGateway.name | default "homelab-gateway" }}
  namespace: {{ .Release.Namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ciliumGateway.clusterIssuer | default "letsencrypt-dns-prod" }}
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https-wildcard
      protocol: HTTPS
      port: 443
      hostname: "*.{{ .Values.ciliumGateway.domain }}"
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.ciliumGateway.wildcardTlsSecret | default "gateway-wildcard-tls" }}
      allowedRoutes:
        namespaces:
          from: All
    - name: https-apex
      protocol: HTTPS
      port: 443
      hostname: "{{ .Values.ciliumGateway.domain }}"
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.ciliumGateway.apexTlsSecret | default "gateway-apex-tls" }}
      allowedRoutes:
        namespaces:
          from: All
{{- range .Values.ciliumGateway.extraListeners }}
    - {{ toYaml . | nindent 6 }}
{{- end }}
{{- if .Values.ciliumGateway.tlsPassthroughListeners }}
{{- range .Values.ciliumGateway.tlsPassthroughListeners }}
    - name: {{ .name }}
      protocol: TLS
      port: 443
      hostname: {{ .hostname | quote }}
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: All
{{- end }}
{{- end }}
---
# Wildcard certificate for *.ohmlab.fr
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gateway-wildcard-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Values.ciliumGateway.wildcardTlsSecret | default "gateway-wildcard-tls" }}
  issuerRef:
    name: {{ .Values.ciliumGateway.dnsClusterIssuer | default "letsencrypt-dns-prod" }}
    kind: ClusterIssuer
  dnsNames:
    - "*.{{ .Values.ciliumGateway.domain }}"
    - "{{ .Values.ciliumGateway.domain }}"
---
# HTTP → HTTPS redirect (catches all HTTP traffic on port 80)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Values.ciliumGateway.name | default "homelab-gateway" }}
      namespace: {{ .Release.Namespace }}
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
{{- end }}
