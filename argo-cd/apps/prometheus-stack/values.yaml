gateway:
  enabled: false
  gatewayName: ""
  gatewayNamespace: ""
  # Extra gateways to also attach routes to (e.g. during the APISIX→Traefik
  # migration): [{name, namespace?}] — sectionName is reused from the route.
  extraParentRefs: []
  routes: []

kube-prometheus-stack:
  crds:
    upgradeJob:
      enabled: true
      forceConflicts: true
      # The chart defaults the busybox init image to :latest, which the
      # Enforce'd disallow-latest-tag policy rejects (it failed the whole
      # app sync). Pin it.
      image:
        busybox:
          tag: "1.37.0"
  prometheusOperator:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # Applies to the config-reloader (init + sidecar) in prometheus/alertmanager pods.
    prometheusConfigReloader:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
  kube-state-metrics:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  prometheus-node-exporter:
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 128Mi
  # k3s bundles the scheduler, controller-manager and (embedded) etcd inside
  # the single k3s server process and doesn't expose them as separate
  # Services the way kubeadm/RKE2 clusters do — kube-proxy metrics are also
  # not reachable the chart's default way here. The chart's default
  # ServiceMonitors for these select Services with zero endpoints, so they
  # never scrape anything and their bundled Grafana dashboards are
  # permanently blank. Disabling avoids phantom "no data" dashboards.
  kubeControllerManager:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false
  kubeScheduler:
    enabled: false
  alertmanager:
    # Route alerts to Mattermost (Slack-compatible incoming webhook). The
    # webhook URL comes from Vault via the alertmanagerMattermost VSS and is
    # read per-notification, so it can be rotated without a restart.
    config:
      global:
        resolve_timeout: 5m
        slack_api_url_file: /etc/alertmanager/secrets/alertmanager-mattermost/webhookUrl
      route:
        group_by: ["namespace", "alertname"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: mattermost
        routes:
        # Watchdog fires permanently by design (dead-man's switch) — drop it.
        - receiver: "null"
          matchers:
          - alertname = "Watchdog"
      receivers:
      - name: "null"
      - name: mattermost
        slack_configs:
        - channel: "alerts"
          send_resolved: true
    alertmanagerSpec:
      secrets:
      - alertmanager-mattermost
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
  prometheus:
    prometheusSpec:
      # 2Gi proved too small for this scrape load (9 nodes + kube-state +
      # full operator stack): the head hit the limit after ~6h and the pod
      # OOM-looped, paying a multi-minute WAL replay per restart. Keep the
      # limit comfortably above steady-state head size.
      resources:
        requests:
          cpu: 500m
          memory: 1536Mi
        limits:
          cpu: 2000m
          memory: 3Gi
      scrapeConfigSelector:
        matchLabels: {}
      ruleSelector:
        matchLabels: {}
      probeSelector:
        matchLabels: {}
      serviceMonitorSelector:
        matchLabels: {}
      podMonitorSelector:
        matchLabels: {}
      retention: 30d
      # Disk guard: whichever of retention/retentionSize is hit first wins.
      # Sized for the default 100Gi PVC — override alongside storage.
      retentionSize: 90GB
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: [ReadWriteMany]
            resources:
              requests:
                storage: 100Gi
  grafana:
    adminPassword: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # No persistence (below): Grafana keeps no state on local disk once the
    # database is external Postgres, so there's nothing left to chown.
    # Readiness tuned looser than the k8s default (1s timeout) — on this
    # hardware a brief latency spike shouldn't flap the pod out of rotation.
    readinessProbe:
      httpGet:
        path: /api/health
        port: grafana
      timeoutSeconds: 5
      periodSeconds: 10
      failureThreshold: 6
    sidecar:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      # Organise our dashboards into Grafana folders via a per-ConfigMap
      # `grafana_folder` annotation (set in templates/dashboards.yaml).
      # foldersFromFilesStructure makes the provisioner mirror the sidecar's
      # per-folder subdirectories into real Grafana folders. Dashboards without
      # the annotation (the stack's own bundled ones) stay in General.
      dashboards:
        folderAnnotation: grafana_folder
        provider:
          foldersFromFilesStructure: true
    # Exposed via Gateway API HTTPRoute (gateway.routes) — no Ingress.
    ingress:
      enabled: false
    defaultDashboardsTimezone: Europe/Paris
    grafana.ini:
      server:
        root_url: ""
      auth.generic_oauth:
        enabled: true
        name: Keycloak
        allow_sign_up: true
        # client_id: ""
        # client_secret: ""
        scopes: openid email profile roles groups
        email_attribute_path: email
        login_attribute_path: username
        name_attribute_path: full_name
        # auth_url: ""
        # token_url: ""
        # api_url: ""
        allow_assign_grafana_admin: true
        groups_attribute_path: groups
        role_attribute_path: contains(groups[*], '/admin') && 'GrafanaAdmin' || contains(resource_access.grafana-core.roles[*], 'grafanaadmin') && 'GrafanaAdmin' || contains(resource_access.grafana-core.roles[*], 'admin') && 'Admin' || contains(resource_access.grafana-core.roles[*], 'editor') && 'Editor' || 'Viewer'
      # CNPG cluster below (cnpg.*), password via envValueFrom
      # GF_DATABASE_PASSWORD (Grafana's native GF_<SECTION>_<KEY> env
      # override — no ${} interpolation needed in this file).
      database:
        type: postgres
        host: prometheus-stack-pg-cluster-rw:5432
        name: grafana
        user: grafana
        ssl_mode: require

# CNPG PostgreSQL cluster for Grafana (replaces the default embedded SQLite,
# which serialized every request behind a single-writer lock and — combined
# with the old RWX/Longhorn-NFS-backed PVC — caused multi-minute request
# latency and permanent readiness failures under any real load). 2 instances
# for automatic failover; same pattern as every other stateful app here.
cnpg:
  fullnameOverride: prometheus-stack-pg-cluster
  imageName: "ghcr.io/cloudnative-pg/postgresql:17.10"
  extraSpec:
    # PDB protects against voluntary disruption (drain/descheduler) now
    # that masters are excluded from scheduling too — accepted tradeoff:
    # a plain `kubectl drain` on a node hosting one of these instances
    # now needs --disable-eviction/--force until CNPG relocates it
    # (2026-07-21, .local/post-migration-hardening.md).
    enablePDB: true
  mode: primary
  dbName: grafana
  credentials:
    username: grafana
    # existingSecrets (not empty passwords / "operator" mode, which every
    # other cnpg cluster in this repo uses): with empty passwords, CNPG's
    # own Cluster controller races VSO to create prometheus-stack-pg-
    # cluster-app/-admin, and VSO refuses to overwrite a secret it didn't
    # create (confirmed live: CNPG won, VSO spammed SecretSyncError
    # forever). existingSecrets tells CNPG to wait for and use the VSO-
    # created secret instead of racing to generate its own — no chart-
    # mode `lookup` either, which is documented as unreliable under
    # ArgoCD's non-live template rendering.
    existingSecrets:
      enabled: true
      app:
        secretName: prometheus-stack-pg-cluster-app
      postgres:
        secretName: prometheus-stack-pg-cluster-admin
  instances: 2
  enableSuperuserAccess: false
  pvcSize:
    data: 3Gi
    wal: 1Gi
  # Cap WAL retained by replication slots: a lagging/dead replica costs a
  # re-clone, never the primary's disk (2026-07-20 keycloak outage, F18).
  parameters:
    max_slot_wal_keep_size: 512MB
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi
  affinity:
    topologyKey: kubernetes.io/hostname
    # Masters run etcd — keep this data-bearing workload off them
    # entirely (2026-07-21, .local/post-migration-hardening.md).
    nodeSelector:
      node-type: worker
  # Disabled: the S3 credentials at this Vault path are still empty
  # placeholders (same as every other app's backup config in this repo).
  # For an already-bootstrapped cluster that's harmless, but the
  # barman-cloud plugin's pre-reconcile hook validates the ObjectStore
  # BEFORE allowing initial bootstrap — with empty credentials it blocks
  # the cluster from ever coming up at all (confirmed live: 6+ minutes,
  # zero pods, "Pre-reconcile hook stopped the reconciliation loop"/
  # barman-cloud.cloudnative-pg.io). Re-enable once real S3 credentials
  # are added to Vault.
  backup:
    enabled: false
    legacyMode: false
    endpointURL: ""
    destinationPath: "s3://"
    cron: "0 0 0 * * *"
    retentionPolicy: 30d
    compression: gzip
    s3Credentials:
      create: true
      secretName: prometheus-stack-pg-cluster-backup
      accessKeyId:
        key: accessKeyId
        value: ""
      secretAccessKey:
        key: secretAccessKey
        value: ""
      region:
        key: region
        value: ""
  # PodMonitor for the cnpg_* metrics (chart default is disabled) — the
  # cloudnative-pg Grafana dashboard was showing no data for every cluster
  # in the repo until this was turned on.
  monitoring:
    enabled: true

vso:
  extraObjects:
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: vso
  vaultAuth:
    default:
      method: kubernetes
      mount: kubernetes
      kubernetes:
        role: prometheus-stack
        serviceAccount: vso
  vaultConnection:
    default:
      address: "https://vault.vault-operator-system.svc.cluster.local:8200"
      skipTLSVerify: false
      caCertSecretRef: vault-ca
  vaultStaticSecrets:
    monitoringAdmin:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: prometheus-stack-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: monitoring-admin
        create: true
        type: kubernetes.io/basic-auth
        transformation:
          excludes:
          - ".*"
          templates:
            username:
              text: '{{ get .Secrets "admin" | dig "username" "" }}'
            password:
              text: '{{ get .Secrets "admin" | dig "password" "" }}'
    monitoringSso:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: prometheus-stack-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: monitoring-sso
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            OIDC_CLIENT_ID:
              text: '{{ get .Secrets "keycloak" | dig "clientId" "" }}'
            OIDC_CLIENT_SECRET:
              text: '{{ get .Secrets "keycloak" | dig "clientSecret" "" }}'
    alertmanagerMattermost:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: prometheus-stack-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: alertmanager-mattermost
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            # Flat key (the pre-existing `alertmanager` key at this path is a
            # plain string, so it cannot host nested fields). Missing key
            # renders empty until the webhook URL is added to Vault.
            webhookUrl:
              text: '{{ get .Secrets "alertmanagerMattermostWebhookUrl" | default "" }}'
    grafanaDbAdmin:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: prometheus-stack-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: prometheus-stack-pg-cluster-admin
        create: true
        type: kubernetes.io/basic-auth
        transformation:
          excludes:
          - ".*"
          templates:
            username:
              text: '{{ get .Secrets "postgres" | dig "admin" "username" "" }}'
            password:
              text: '{{ get .Secrets "postgres" | dig "admin" "password" "" }}'
    grafanaDbApp:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: prometheus-stack-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: prometheus-stack-pg-cluster-app
        create: true
        type: kubernetes.io/basic-auth
        transformation:
          excludes:
          - ".*"
          templates:
            username:
              text: '{{ get .Secrets "postgres" | dig "app" "username" "" }}'
            password:
              text: '{{ get .Secrets "postgres" | dig "app" "password" "" }}'
    grafanaPgBackup:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: prometheus-stack-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: prometheus-stack-pg-cluster-backup
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            S3_ENDPOINT:
              text: '{{ get .Secrets "postgres" | dig "s3" "endpoint" "" }}'
            S3_BUCKET_NAME:
              text: '{{ get .Secrets "postgres" | dig "s3" "bucketName" "" }}'
            S3_BUCKET_PREFIX:
              text: '{{ get .Secrets "postgres" | dig "s3" "bucketPrefix" "" }}'
            S3_ACCESS_KEY:
              text: '{{ get .Secrets "postgres" | dig "s3" "accessKey" "" }}'
            S3_SECRET_KEY:
              text: '{{ get .Secrets "postgres" | dig "s3" "secretKey" "" }}'
            S3_REGION:
              text: '{{ get .Secrets "postgres" | dig "s3" "region" "" }}'
