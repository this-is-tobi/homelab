gateway:
  enabled: false
  gatewayName: ""
  gatewayNamespace: ""
  # Extra gateways to also attach routes to (e.g. during the APISIX→Traefik
  # migration): [{name, namespace?}] — sectionName is reused from the route.
  extraParentRefs: []
  routes: []

kube-prometheus-stack:
  crds:
    upgradeJob:
      enabled: true
      forceConflicts: true
      # The chart defaults the busybox init image to :latest, which the
      # Enforce'd disallow-latest-tag policy rejects (it failed the whole
      # app sync). Pin it.
      image:
        busybox:
          tag: "1.37.0"
  prometheusOperator:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # Applies to the config-reloader (init + sidecar) in prometheus/alertmanager pods.
    prometheusConfigReloader:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
  kube-state-metrics:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  prometheus-node-exporter:
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 128Mi
  alertmanager:
    # Route alerts to Mattermost (Slack-compatible incoming webhook). The
    # webhook URL comes from Vault via the alertmanagerMattermost VSS and is
    # read per-notification, so it can be rotated without a restart.
    config:
      global:
        resolve_timeout: 5m
        slack_api_url_file: /etc/alertmanager/secrets/alertmanager-mattermost/webhookUrl
      route:
        group_by: ["namespace", "alertname"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: mattermost
        routes:
        # Watchdog fires permanently by design (dead-man's switch) — drop it.
        - receiver: "null"
          matchers:
          - alertname = "Watchdog"
      receivers:
      - name: "null"
      - name: mattermost
        slack_configs:
        - channel: "alerts"
          send_resolved: true
    alertmanagerSpec:
      secrets:
      - alertmanager-mattermost
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
  prometheus:
    prometheusSpec:
      # 2Gi proved too small for this scrape load (9 nodes + kube-state +
      # full operator stack): the head hit the limit after ~6h and the pod
      # OOM-looped, paying a multi-minute WAL replay per restart. Keep the
      # limit comfortably above steady-state head size.
      resources:
        requests:
          cpu: 500m
          memory: 1536Mi
        limits:
          cpu: 2000m
          memory: 3Gi
      scrapeConfigSelector:
        matchLabels: {}
      ruleSelector:
        matchLabels: {}
      probeSelector:
        matchLabels: {}
      serviceMonitorSelector:
        matchLabels: {}
      podMonitorSelector:
        matchLabels: {}
      retention: 30d
      # Disk guard: whichever of retention/retentionSize is hit first wins.
      # Sized for the default 100Gi PVC — override alongside storage.
      retentionSize: 90GB
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: [ReadWriteMany]
            resources:
              requests:
                storage: 100Gi
  grafana:
    adminPassword: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    initChownData:
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
    sidecar:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
    # Exposed via Gateway API HTTPRoute (gateway.routes) — no Ingress.
    ingress:
      enabled: false
    defaultDashboardsTimezone: Europe/Paris
    grafana.ini:
      server:
        root_url: ""
      auth.generic_oauth:
        enabled: true
        name: Keycloak
        allow_sign_up: true
        # client_id: ""
        # client_secret: ""
        scopes: openid email profile roles groups
        email_attribute_path: email
        login_attribute_path: username
        name_attribute_path: full_name
        # auth_url: ""
        # token_url: ""
        # api_url: ""
        allow_assign_grafana_admin: true
        groups_attribute_path: groups
        role_attribute_path: contains(groups[*], '/admin') && 'GrafanaAdmin' || contains(resource_access.grafana-core.roles[*], 'grafanaadmin') && 'GrafanaAdmin' || contains(resource_access.grafana-core.roles[*], 'admin') && 'Admin' || contains(resource_access.grafana-core.roles[*], 'editor') && 'Editor' || 'Viewer'
    persistence:
      enabled: true
      type: sts
      accessModes:
      - ReadWriteMany
      size: 3Gi
      finalizers:
      - kubernetes.io/pvc-protection

vso:
  extraObjects:
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: vso
  vaultAuth:
    default:
      method: kubernetes
      mount: kubernetes
      kubernetes:
        role: prometheus-stack
        serviceAccount: vso
  vaultConnection:
    default:
      address: "https://vault.vault-operator-system.svc.cluster.local:8200"
      skipTLSVerify: false
      caCertSecretRef: vault-ca
  vaultStaticSecrets:
    monitoringAdmin:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: prometheus-stack-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: monitoring-admin
        create: true
        type: kubernetes.io/basic-auth
        transformation:
          excludes:
          - ".*"
          templates:
            username:
              text: '{{ get .Secrets "admin" | dig "username" "" }}'
            password:
              text: '{{ get .Secrets "admin" | dig "password" "" }}'
    monitoringSso:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: prometheus-stack-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: monitoring-sso
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            OIDC_CLIENT_ID:
              text: '{{ get .Secrets "keycloak" | dig "clientId" "" }}'
            OIDC_CLIENT_SECRET:
              text: '{{ get .Secrets "keycloak" | dig "clientSecret" "" }}'
    alertmanagerMattermost:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: prometheus-stack-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: alertmanager-mattermost
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            # Flat key (the pre-existing `alertmanager` key at this path is a
            # plain string, so it cannot host nested fields). Missing key
            # renders empty until the webhook URL is added to Vault.
            webhookUrl:
              text: '{{ get .Secrets "alertmanagerMattermostWebhookUrl" | default "" }}'
