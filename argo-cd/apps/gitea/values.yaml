gateway:
  enabled: false
  gatewayName: ""
  gatewayNamespace: ""
  # Extra gateways to also attach routes to (e.g. during the APISIX→Traefik
  # migration): [{name, namespace?}] — sectionName is reused from the route.
  extraParentRefs: []
  routes: []

gitea:
  replicaCount: 3
  # The image is rootless (uid/gid 1000) but the chart leaves the security
  # context empty by default — declare it explicitly so the kyverno
  # require-non-root policy (which checks fields, not images) admits the pods.
  podSecurityContext:
    fsGroup: 1000
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
  # Exposed via Gateway API HTTPRoute (gateway.routes) — no Ingress.
  ingress:
    enabled: false
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  initContainers:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 512Mi
  serviceAccount:
    create: true
    automountServiceAccountToken: true
  persistence:
    enabled: true
    size: 25Gi
    accessModes:
    - ReadWriteMany
  gitea:
    admin:
      username: ""
      password: ""
      email: ""
    oauth:
    - name: Keycloak
      provider: openidConnect
      existingSecret: gitea-sso
      autoDiscoverUrl: ""
      scopes: openid profile email roles groups
      adminGroup: /admin
      groupClaimName: groups
      # groupTeamMap: ""
      # groupTeamMapRemoval: true
    # Valkey URIs carry the auth password, so they arrive via GITEA__* env
    # vars from the gitea-valkey-auth secret (additionalConfigFromEnvs below)
    # instead of the plain-text app.ini.
    additionalConfigFromEnvs:
    - name: GITEA__CACHE__HOST
      valueFrom:
        secretKeyRef:
          name: gitea-valkey-auth
          key: cache-host
    - name: GITEA__SESSION__PROVIDER_CONFIG
      valueFrom:
        secretKeyRef:
          name: gitea-valkey-auth
          key: session-config
    - name: GITEA__QUEUE__CONN_STR
      valueFrom:
        secretKeyRef:
          name: gitea-valkey-auth
          key: queue-conn
    config:
      cache:
        ADAPTER: redis
      session:
        PROVIDER: redis
      queue:
        TYPE: redis
      database:
        DB_TYPE: postgres
        HOST: ""
        NAME: ""
        USER: ""
        PASSWD: ""
        # CNPG serves TLS by default — encrypt the connection (gitea default is disable).
        SSL_MODE: require
      cron.GIT_GC_REPOS:
        ENABLED: false
      server:
        DOMAIN: ""
        ROOT_URL: ""
        SSH_LISTEN_PORT: 2222
      openid:
        ENABLE_OPENID_SIGNIN: true
        ENABLE_OPENID_SIGNUP: true
        WHITELISTED_URIS: ""
      service:
        SHOW_REGISTRATION_BUTTON: false
        DISABLE_REGISTRATION: true
        ALLOW_ONLY_EXTERNAL_REGISTRATION: true
      oauth2_client:
        OPENID_CONNECT_SCOPES: openid profile email roles groups
        REGISTER_EMAIL_CONFIRM: false
        ENABLE_AUTO_REGISTRATION: true
        ACCOUNT_LINKING: auto
        USERNAME: email
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  postgresql-ha:
    enabled: false
    primary:
      persistence:
        size: 25Gi
  valkey-cluster:
    enabled: false
  valkey:
    enabled: false

valkey:
  fullnameOverride: gitea-valkey
  architecture: standalone
  replicaCount: 1
  # Password auth — delivered from Vault via VSO (gitea-valkey-auth secret,
  # key `password`); gitea receives it embedded in the rediss:// URIs.
  auth:
    enabled: true
    existingSecret: gitea-valkey-auth
    existingSecretPasswordKey: password
  # Server TLS on port 6380 (chart switches service+container port when
  # enabled). Cert issued by templates/valkey-certificates.yaml; authClients
  # stays off because gitea's redis URI cannot carry a client cert.
  tls:
    enabled: true
    existingSecret: gitea-valkey-tls
    authClients: false
  service:
    port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

cnpg:
  fullnameOverride: gitea-pg-cluster
  imageName: "ghcr.io/cloudnative-pg/postgresql:17.10"
  extraSpec:
    enablePDB: false
  mode: primary
  dbName: gitea
  credentials:
    username: gitea
    password: ""
    postgresPassword: ""
  instances: 3
  enableSuperuserAccess: false
  pvcSize:
    data: 7Gi
    wal: 3Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  affinity:
    topologyKey: kubernetes.io/hostname
  backup:
    enabled: true
    legacyMode: false
    endpointURL: ""
    destinationPath: "s3://"
    cron: "0 0 0 * * *"
    retentionPolicy: 30d
    compression: gzip
    s3Credentials:
      create: true
      secretName: gitea-pg-cluster-backup
      accessKeyId:
        key: accessKeyId
        value: ""
      secretAccessKey:
        key: secretAccessKey
        value: ""
      region:
        key: region
        value: ""
  # PodMonitor for the cnpg_* metrics (chart default is disabled) — the
  # cloudnative-pg Grafana dashboard was showing no data for every cluster
  # in the repo until this was turned on.
  monitoring:
    enabled: true

vso:
  extraObjects:
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: vso
  vaultAuth:
    default:
      method: kubernetes
      mount: kubernetes
      kubernetes:
        role: gitea
        serviceAccount: vso
  vaultConnection:
    default:
      address: "https://vault.vault-operator-system.svc.cluster.local:8200"
      skipTLSVerify: false
      caCertSecretRef: vault-ca
  vaultStaticSecrets:
    # Valkey password + full connection URIs (password embedded, so they are
    # delivered as a secret and injected via GITEA__* env vars rather than
    # living in the plain-text app.ini config).
    giteaValkeyAuth:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: gitea-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: gitea-valkey-auth
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            password:
              text: '{{ get .Secrets "valkey" | dig "password" "" }}'
            cache-host:
              text: 'rediss://:{{ get .Secrets "valkey" | dig "password" "" }}@gitea-valkey:6380/0?pool_size=100&idle_timeout=180s&skipverify=true&'
            session-config:
              text: 'rediss://:{{ get .Secrets "valkey" | dig "password" "" }}@gitea-valkey:6380/0?pool_size=100&idle_timeout=180s&skipverify=true&'
            queue-conn:
              text: 'rediss://:{{ get .Secrets "valkey" | dig "password" "" }}@gitea-valkey:6380/0?pool_size=100&idle_timeout=180s&skipverify=true&'
    giteaAdmin:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: gitea-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: gitea-admin
        create: true
        type: kubernetes.io/basic-auth
        transformation:
          excludes:
          - ".*"
          templates:
            username:
              text: '{{ get .Secrets "admin" | dig "username" "" }}'
            password:
              text: '{{ get .Secrets "admin" | dig "password" "" }}'
    giteaDbInfos:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: gitea-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: gitea-db-infos
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            DB_URL:
              text: 'postgresql://{{ get .Secrets "postgres" | dig "app" "username" "" }}:{{ get .Secrets "postgres" | dig "app" "password" "" }}@{{ get .Secrets "postgres" | dig "host" "" }}:{{ get .Secrets "postgres" | dig "port" "" }}/{{ get .Secrets "postgres" | dig "database" "" }}'
            DB_HOST:
              text: '{{ get .Secrets "postgres" | dig "host" "" }}'
            DB_PORT:
              text: '{{ get .Secrets "postgres" | dig "port" "" }}'
    giteaDbAdmin:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: gitea-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: gitea-pg-cluster-admin
        create: true
        type: kubernetes.io/basic-auth
        transformation:
          excludes:
          - ".*"
          templates:
            username:
              text: '{{ get .Secrets "postgres" | dig "admin" "username" "" }}'
            password:
              text: '{{ get .Secrets "postgres" | dig "admin" "password" "" }}'
    giteaDbApp:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: gitea-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: gitea-pg-cluster-app
        create: true
        type: kubernetes.io/basic-auth
        transformation:
          excludes:
          - ".*"
          templates:
            username:
              text: '{{ get .Secrets "postgres" | dig "app" "username" "" }}'
            password:
              text: '{{ get .Secrets "postgres" | dig "app" "password" "" }}'
    giteaPgBackup:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: gitea-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: gitea-pg-cluster-backup
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            S3_ENDPOINT:
              text: '{{ get .Secrets "postgres" | dig "s3" "endpoint" "" }}'
            S3_BUCKET_NAME:
              text: '{{ get .Secrets "postgres" | dig "s3" "bucketName" "" }}'
            S3_BUCKET_PREFIX:
              text: '{{ get .Secrets "postgres" | dig "s3" "bucketPrefix" "" }}'
            S3_ACCESS_KEY:
              text: '{{ get .Secrets "postgres" | dig "s3" "accessKey" "" }}'
            S3_SECRET_KEY:
              text: '{{ get .Secrets "postgres" | dig "s3" "secretKey" "" }}'
            S3_REGION:
              text: '{{ get .Secrets "postgres" | dig "s3" "region" "" }}'
    giteaSso:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: gitea-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: gitea-sso
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            OIDC_CLIENT_ID:
              text: '{{ get .Secrets "keycloak" | dig "clientId" "" }}'
            OIDC_CLIENT_SECRET:
              text: '{{ get .Secrets "keycloak" | dig "clientSecret" "" }}'
            key:
              text: '{{ get .Secrets "keycloak" | dig "clientId" "" }}'
            secret:
              text: '{{ get .Secrets "keycloak" | dig "clientSecret" "" }}'
