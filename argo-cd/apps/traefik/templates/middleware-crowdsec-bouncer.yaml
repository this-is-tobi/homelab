# NOT currently wired to anything — this object alone does nothing.
#
# TWO failed live attempts to wire this up (both reverted the same day,
# 2026-07-19) before the actual root cause was found:
#
# Attempt 1 (e7ed9d9, reverted 02d4da1): a single Middleware object here in
# the traefik namespace, referenced from ports.*.http.middlewares as
# `crowdsec-bouncer@kubernetescrd`. Every router in every OTHER namespace
# failed with "middleware crowdsec-bouncer@kubernetescrd does not exist" —
# full ingress outage.
#
# Attempt 2 (e37e525, reverted aa116a7): assumed attempt 1's cause was
# Traefik resolving the bare name relative to each router's own namespace
# (true for ROUTER-level middleware refs), so mirrored this object into
# every namespace with a route via a Kyverno generate policy. Every copy
# was confirmed present and well-formed before the rollout. Still: 100% of
# routers failed with the exact same "does not exist" error — a second
# full outage, reverted within ~3 minutes.
#
# Root cause (found 2026-07-19, via docs.traefik.io/traefik/reference/
# install-configuration/entrypoints/ and reproduced live in a disposable
# kind cluster before touching this cluster again): ENTRYPOINT-level
# middleware references are NOT resolved like router-level ones. Traefik's
# own docs: "Middlewares must be referenced by their fully qualified name,
# including the provider namespace suffix (<middleware-name>@<provider-
# name>)" — and for kubernetesCRD specifically the format is
# `<middleware-namespace>-<middleware-name>@kubernetescrd` (doc example:
# `default-auth@kubernetescrd`), a single static reference to ONE object,
# not a per-router-namespace lookup. `crowdsec-bouncer@kubernetescrd` was
# parsed as namespace=`crowdsec`, name=`bouncer` — an object that never
# existed anywhere, in either attempt, regardless of mirroring. The kind
# repro confirmed the fix: a single object here (traefik namespace) plus
# the entrypoint reference `traefik-crowdsec-bouncer@kubernetescrd` applies
# correctly to routers in every other namespace, IngressRoute and Gateway-
# API HTTPRoute alike, with zero mirroring required. The Kyverno sync
# policy and its RBAC (previously argo-cd/apps/kyverno/templates/
# crowdsec-bouncer-{sync,rbac}.yaml) were solving a problem entrypoint-
# level middleware doesn't have — removed.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: crowdsec-bouncer
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: traefik
spec:
  plugin:
    bouncer:
      enabled: {{ .Values.crowdsecBouncer.enabled }}
      crowdsecMode: {{ .Values.crowdsecBouncer.mode }}
      crowdsecLapiScheme: http
      crowdsecLapiHost: {{ .Values.crowdsecBouncer.lapiHost }}
      crowdsecLapiKey: {{ .Values.crowdsecBouncer.lapiKey | quote }}
      updateIntervalSeconds: 60
      updateMaxFailure: {{ .Values.crowdsecBouncer.updateMaxFailure }}
      {{- with .Values.crowdsecBouncer.clientTrustedIPs }}
      clientTrustedIPs:
        {{- toYaml . | nindent 8 }}
      {{- end }}
