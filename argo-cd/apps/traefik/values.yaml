# Traefik v3 — hardened defaults for the ohmlab catalog.
#
# klipper-lb binds the LoadBalancer Service ports as host ports on every
# node; the gateway HAProxy forwards public traffic to them. Keep the
# exposedPorts in sync with the HAProxy port vars (ansible gateway.yml).
traefik:
  deployment:
    replicas: 2

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  topologySpreadConstraints:
  - labelSelector:
      matchLabels:
        app.kubernetes.io/name: traefik
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway

  # No phone-home: no version check, no anonymous usage data.
  global:
    checkNewVersion: false
    sendAnonymousUsage: false

  ingressClass:
    enabled: true
    isDefaultClass: false
    name: traefik

  providers:
    kubernetesCRD:
      enabled: true
    kubernetesIngress:
      enabled: true
    kubernetesGateway:
      enabled: true
      # Experimental channel = TLSRoute/TCPRoute support (teleport passthrough).
      # Requires the Gateway API *experimental* CRDs (installed by run.sh).
      experimentalChannel: true

  # The chart's own Gateway/GatewayClass are replaced by templates/gateway.yaml
  # (multi-listener wildcard setup with TLS-passthrough support).
  gateway:
    enabled: false
  gatewayClass:
    enabled: false

  ports:
    web:
      # Gateway API listeners must reference this CONTAINER port (8000), not
      # the Service port — Traefik matches listeners against entryPoints.
      port: 8000
      expose:
        default: true
      exposedPort: 80
    websecure:
      port: 8443
      expose:
        default: true
      exposedPort: 443

  service:
    enabled: true
    type: LoadBalancer
    spec:
      # Preserve source addresses on the node-local hop (klipper-lb).
      externalTrafficPolicy: Local

  log:
    level: INFO
  # JSON access logs — parsed by the crowdsecurity/traefik collection
  # (crowdsec agent acquisition on namespace=traefik, program=traefik).
  accessLog:
    enabled: true
    format: json

  metrics:
    prometheus:
      # Don't gate rendering on the CRD being present (fresh-bootstrap
      # ordering: prometheus-stack syncs at wave 50, after traefik).
      disableAPICheck: true
      service:
        enabled: true
      serviceMonitor:
        enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 384Mi

  # Chart defaults already run as non-root (65532) with dropped capabilities,
  # readOnlyRootFilesystem and RuntimeDefault seccomp — compliant with the
  # kyverno pod-security-baseline / require-non-root policies.

# Gateway API resources rendered by templates/gateway.yaml.
gateway:
  enabled: false
  name: homelab-gateway-traefik
  namespace: kube-system
  domain: ""
  # Must match the traefik entryPoint container ports above.
  httpPort: 8000
  httpsPort: 8443
  # Wildcard TLS secret used by the HTTPS listeners; manageCertificate
  # controls whether this app renders the cert-manager Certificate for it.
  wildcardTlsSecret: gateway-wildcard-tls
  apexTlsSecret: gateway-wildcard-tls
  manageCertificate: false
  dnsClusterIssuer: letsencrypt-dns-prod
  extraDnsNames: []
  # [{name, hostname, tlsSecret?}] — extra HTTPS Terminate listeners.
  extraWildcardListeners: []
  # [{name, hostname}] — TLS Passthrough listeners (e.g. teleport).
  tlsPassthroughListeners: []
