# Traefik v3 — hardened defaults for the ohmlab catalog.
#
# klipper-lb binds the LoadBalancer Service ports as host ports on every
# node; the gateway HAProxy forwards public traffic to them. Keep the
# exposedPorts in sync with the HAProxy port vars (ansible gateway.yml).
traefik:
  deployment:
    replicas: 2
    # CrowdSec bouncer LAPI key, delivered by VSO (see vso: at the bottom)
    # and read by the crowdsec-bouncer Middleware via crowdsecLapiKeyFile —
    # the Middleware CRD has no secretKeyRef support, a mounted file is the
    # only way to keep the key out of the CRD. A missing Secret blocks new
    # pods at ContainerCreating (old pods keep serving) instead of building
    # routers with a broken middleware.
    additionalVolumes:
    - name: crowdsec-bouncer-key
      secret:
        secretName: traefik-crowdsec-bouncer-key

  additionalVolumeMounts:
  - name: crowdsec-bouncer-key
    mountPath: /etc/traefik/crowdsec-bouncer
    readOnly: true

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  topologySpreadConstraints:
  - labelSelector:
      matchLabels:
        app.kubernetes.io/name: traefik
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway

  # No phone-home: no version check, no anonymous usage data.
  global:
    checkNewVersion: false
    sendAnonymousUsage: false

  ingressClass:
    enabled: true
    isDefaultClass: false
    name: traefik

  providers:
    kubernetesCRD:
      enabled: true
    kubernetesIngress:
      enabled: true
    kubernetesGateway:
      enabled: true
      # Experimental channel = TLSRoute/TCPRoute support (teleport passthrough).
      # Requires the Gateway API *experimental* CRDs (installed by run.sh).
      experimentalChannel: true

  # The chart's own Gateway/GatewayClass are replaced by templates/gateway.yaml
  # (multi-listener wildcard setup with TLS-passthrough support).
  gateway:
    enabled: false
  gatewayClass:
    enabled: false

  ports:
    web:
      # Gateway API listeners must reference this CONTAINER port (8000), not
      # the Service port — Traefik matches listeners against entryPoints.
      port: 8000
      expose:
        default: true
      exposedPort: 80
      http:
        middlewares:
        # Entrypoint refs need the namespace-PREFIXED form — see the header
        # of templates/middleware-crowdsec-bouncer.yaml before touching.
        - traefik-crowdsec-bouncer@kubernetescrd
    websecure:
      port: 8443
      expose:
        default: true
      exposedPort: 443
      http:
        middlewares:
        - traefik-crowdsec-bouncer@kubernetescrd

  # CrowdSec bouncer plugin registration — see crowdsecBouncer (below) for
  # the actual enable/disable switch and LAPI wiring.
  experimental:
    plugins:
      bouncer:
        moduleName: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
        version: v1.6.0

  service:
    enabled: true
    type: LoadBalancer
    spec:
      # Preserve source addresses on the node-local hop (klipper-lb).
      externalTrafficPolicy: Local

  log:
    level: INFO
  # JSON access logs — parsed by the crowdsecurity/traefik collection
  # (crowdsec agent acquisition on namespace=traefik, program=traefik).
  accessLog:
    enabled: true
    format: json

  metrics:
    prometheus:
      # Don't gate rendering on the CRD being present (fresh-bootstrap
      # ordering: prometheus-stack syncs at wave 50, after traefik).
      disableAPICheck: true
      service:
        enabled: true
      serviceMonitor:
        enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 384Mi

  # Chart defaults already run as non-root (65532) with dropped capabilities,
  # readOnlyRootFilesystem and RuntimeDefault seccomp — compliant with the
  # kyverno pod-security-baseline / require-non-root policies.

# Gateway API resources rendered by templates/gateway.yaml.
gateway:
  enabled: false
  name: homelab-gateway-traefik
  namespace: kube-system
  domain: ""
  # Must match the traefik entryPoint container ports above.
  httpPort: 8000
  httpsPort: 8443
  # Wildcard TLS secret used by the HTTPS listeners; manageCertificate
  # controls whether this app renders the cert-manager Certificate for it.
  wildcardTlsSecret: gateway-wildcard-tls
  apexTlsSecret: gateway-wildcard-tls
  manageCertificate: false
  dnsClusterIssuer: letsencrypt-dns-prod
  extraDnsNames: []
  # [{name, hostname, tlsSecret?}] — extra HTTPS Terminate listeners.
  extraWildcardListeners: []
  # [{name, hostname}] — TLS Passthrough listeners (e.g. teleport).
  tlsPassthroughListeners: []

# CrowdSec bouncer plugin (templates/middleware-crowdsec-bouncer.yaml) —
# active IP blocking at the edge, on top of the crowdsec app's detect+alert.
#
# The LAPI key never appears in git or in the Middleware CRD: it lives in
# Vault (crowdsecBouncer.lapiKey on this app's Vault path, seeded by the
# vault-operator instance config), VSO below delivers it as a Secret in
# this namespace, the deployment mounts that Secret as a file, and the
# middleware references it via crowdsecLapiKeyFile. The crowdsec app's
# LAPI pre-registers the same key (BOUNCER_KEY_traefik env, mirrored on
# its Vault path via <ref:>) — no cscli or kubectl one-time steps.
#
# IMPORTANT (learned from outage #3, commit 86ce841): the plugin's New()
# validates the LAPI key at router build time REGARDLESS of enabled: false
# — `enabled` only gates ServeHTTP. Never wire the entrypoint reference
# unless the key file is present and non-empty in the pods.
crowdsecBouncer:
  enabled: true
  mode: stream
  lapiHost: crowdsec-service.crowdsec.svc.cluster.local:8080
  # Path of the key file inside the traefik container — must match the
  # additionalVolumeMounts entry above.
  lapiKeyFile: /etc/traefik/crowdsec-bouncer/api-key
  # LAPI runs as a single replica (crowdsec app, lapi.replicas: 1) and this
  # middleware sits on every request through the cluster's sole ingress —
  # LAPI being briefly down (rollout, restart) must degrade to "no
  # enforcement", never to "all ingress traffic blocked". -1 = never block
  # on LAPI-unreachable (overrides the plugin's own fail-closed default).
  updateMaxFailure: -1
  # Bypass the bouncer entirely for LAN traffic — mirrors the existing
  # crowdsec postoverflows local-network whitelist, so a false positive
  # can't lock the admin out of their own homelab.
  clientTrustedIPs:
  - 192.168.1.0/24

# -- VSO (Vault Secrets Operator) integration
# Delivers the crowdsec bouncer LAPI key from Vault as a Secret in this
# namespace (mounted into the traefik pods, see additionalVolumes above).
# Set mount/path per-instance in argo-cd/instances/<name>/values/core/traefik.yaml
vso:
  extraObjects:
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: vso
  vaultAuth:
    default:
      method: kubernetes
      mount: kubernetes
      kubernetes:
        role: traefik
        serviceAccount: vso
  vaultConnection:
    default:
      address: "https://vault.vault-operator-system.svc.cluster.local:8200"
      skipTLSVerify: false
      caCertSecretRef: vault-ca
  vaultStaticSecrets:
    traefikCrowdsecBouncerKey:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: traefik-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: traefik-crowdsec-bouncer-key
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            api-key:
              text: '{{ get .Secrets "crowdsecBouncer" | dig "lapiKey" "" }}'
