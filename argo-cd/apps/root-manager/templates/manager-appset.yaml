{{- /*
Root `manager` ApplicationSet.

Discovers every folder under `argo-cd/instances/*` (one folder per instance)
and emits ONE Application per instance pointing at the `instance-manager` chart
(under `argo-cd/apps/instance-manager`). That chart in turn renders the
per-scope child AppSets (core + tenant) for the matched instance.

Two-level pattern:
  root-manager (Application — parent of this AppSet)
    └─> manager (this AppSet)
          └─> instance-<name>  (Application, helm-renders instance-manager chart)
                ├─> core-<name>   (ApplicationSet)
                │     └─> <name>-<app>  (Application)  -- core tier
                └─> tenant-<name> (ApplicationSet)
                      └─> <name>-<app>  (Application)  -- tenant tier
*/ -}}
{{- $repoSources := required ".Values.repoURL.sources is required" .Values.repoURL.sources -}}
{{- $repoValues := .Values.repoURL.values | default $repoSources -}}
{{- $rev := .Values.targetRevision | default "main" -}}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: manager
  namespace: {{ .Values.argocdNamespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Values.releaseName }}
    app.kubernetes.io/part-of: ohmlab
spec:
  goTemplate: true
  goTemplateOptions:
  - missingkey=error
  generators:
  - git:
      repoURL: {{ $repoSources | quote }}
      revision: {{ $rev | quote }}
      directories:
      # All instance folders.
      - path: argo-cd/instances/*
      # Convention: folders prefixed with `_` are treated as TEMPLATES and not
      # rendered. Useful for shipping a documented `_example/` next to real
      # instances without producing idle ArgoCD objects for it.
      - path: argo-cd/instances/_*
        exclude: true
  template:
    metadata:
      name: 'instance-{{ `{{ .path.basename }}` }}'
      labels:
        app.kubernetes.io/managed-by: {{ .Values.releaseName }}
        app.kubernetes.io/part-of: ohmlab
        ohmlab.fr/instance-name: '{{ `{{ .path.basename }}` }}'
      # NO resources-finalizer — deleting an instance-manager Application
      # must not cascade into deleting the instance AppSets (see
      # instance-manager/templates/appset-core.yaml for the incident note).
    spec:
      project: {{ .Values.project | default "admin-core" | quote }}
      revisionHistoryLimit: 3
      sources:
      - repoURL: {{ $repoSources | quote }}
        targetRevision: {{ $rev | quote }}
        path: argo-cd/apps/instance-manager
        helm:
          releaseName: 'instance-{{ `{{ .path.basename }}` }}'
          parameters:
          - name: instance.name
            value: '{{ `{{ .path.basename }}` }}'
          valueFiles:
          - '$values/argo-cd/instances/{{ `{{ .path.basename }}` }}/instance.yaml'
      - repoURL: {{ $repoValues | quote }}
        ref: values
        targetRevision: {{ $rev | quote }}
      destination:
        server: https://kubernetes.default.svc
        namespace: {{ .Values.argocdNamespace }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - ServerSideApply=true
  syncPolicy:
    preserveResourcesOnDeletion: false
