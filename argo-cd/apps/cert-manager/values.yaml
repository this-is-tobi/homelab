cert-manager:
  crds:
    enabled: true
    keep: true
  prometheus:
    enabled: true
    servicemonitor:
      enabled: true

scaleway-certmanager-webhook:
  secret:
    accessKey: ""
    secretKey: ""

defaultWildcard:
  enabled: true
  dnsZone: ""
  ingressNamespace: ingress-nginx
  secretName: default-wildcard-tls
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-dns-prod

clusterIssuers: []
