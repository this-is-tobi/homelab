coder:
  coder:
    service:
      type: ClusterIP
    ingress:
      enable: true
      className: nginx
      host: ""
      wildcardHost: "*."
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-dns-prod
      tls:
        enable: true
        secretName: ""
        wildcardSecretName: ""
    envUseClusterAccessURL: false
    env:
    # When enabling: append ?sslmode=require to the DSN — CNPG serves TLS by default.
    - name: CODER_PG_CONNECTION_URL
      value: ""
    - name: CODER_ACCESS_URL
      value: ""
    - name: CODER_OIDC_ISSUER_URL
      value: ""
    - name: CODER_OIDC_CLIENT_ID
      value: ""
    - name: CODER_OIDC_CLIENT_SECRET
      value: ""
    - name: CODER_OIDC_SIGN_IN_TEXT
      value: Login with Keycloak
    - name: CODER_OIDC_SCOPES
      value: "openid,profile,email,groups,roles"
    - name: CODER_OIDC_GROUP_FIELD
      value: groups
    - name: CODER_OIDC_ADMIN_GROUP
      value: admin
    - name: CODER_OIDC_GROUP_AUTO_CREATE
      value: "true"

cnpg:
  fullnameOverride: coder-pg-cluster
  imageName: ghcr.io/cloudnative-pg/postgresql:17.10
  mode: primary
  dbName: coder
  credentials:
    username: coder
    password: ""
    postgresPassword: ""
  instances: 3
  enableSuperuserAccess: false
  pvcSize:
    data: 3Gi
    wal: 3Gi
  # Cap WAL retained by replication slots: a lagging/dead replica costs a
  # re-clone, never the primary's disk (2026-07-20 keycloak outage, F18).
  parameters:
    max_slot_wal_keep_size: 1GB
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  affinity:
    topologyKey: kubernetes.io/hostname
  backup:
    enabled: false
    legacyMode: false
    endpointURL: ""
    destinationPath: "s3://"
    cron: 0 0 0 * * *
    retentionPolicy: 30d
    compression: gzip
    s3Credentials:
      create: true
      secretName: coder-pg-cluster-backup
      accessKeyId:
        key: accessKeyId
        value: ""
      secretAccessKey:
        key: secretAccessKey
        value: ""
      region:
        key: region
        value: ""
