gateway:
  enabled: false
  gatewayName: ""
  gatewayNamespace: ""
  # Extra gateways to also attach routes to (e.g. during the APISIX→Traefik
  # migration): [{name, namespace?}] — sectionName is reused from the route.
  extraParentRefs: []
  routes: []

vso:
  extraObjects:
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: vso
  vaultAuth:
    default:
      method: kubernetes
      mount: kubernetes
      kubernetes:
        role: longhorn
        serviceAccount: vso
  vaultConnection:
    default:
      address: "https://vault.vault-operator-system.svc.cluster.local:8200"
      skipTLSVerify: false
      caCertSecretRef: vault-ca
  vaultStaticSecrets:
    # Keys match what the oauth2-proxy chart's `existingSecret` support
    # expects verbatim (templates/_helpers.tpl "oauth2-proxy.secrets") —
    # Longhorn's UI has no native OIDC support, so oauth2-proxy sits in
    # front of it as a full reverse proxy (sso.config.configFile upstreams).
    longhornSso:
      mount: ""
      path: ""
      type: kv-v2
      vaultAuthRef: longhorn-system-vso-default
      refreshAfter: 1h
      hmacSecretData: true
      destination:
        name: longhorn-oauth2-proxy-creds
        create: true
        type: Opaque
        transformation:
          excludes:
          - ".*"
          templates:
            client-id:
              text: '{{ get .Secrets "keycloak" | dig "clientId" "" }}'
            client-secret:
              text: '{{ get .Secrets "keycloak" | dig "clientSecret" "" }}'
            cookie-secret:
              text: '{{ get .Secrets "keycloak" | dig "cookieSecret" "" }}'

longhorn:
  preUpgradeChecker:
    jobEnabled: false
  # No Ingress objects in this repo — exposed via Gateway API HTTPRoute
  # (gateway.routes), routed through the sso (oauth2-proxy) service below.
  ingress:
    enabled: false
  persistence:
    defaultClass: true
    defaultFsType: ext4
    defaultClassReplicaCount: 3
  defaultSettings:
    createDefaultDiskLabeledNodes: true
    defaultDataPath: /storage01
    nodeDrainPolicy: always-allow
    storageMinimalAvailablePercentage: 25
    storageOverProvisioningPercentage: 200
    storageReservedPercentageForDefaultDisk: 10
    backupTargetCredentialSecret: longhorn-s3
    # Rolling live-upgrade of volume engines to the default engine image
    # (only healthy attached volumes are touched, max 2 per node at a time).
    # 2026-07-21: 39 volumes still referenced v1.11.1/v1.11.2 engines after
    # the chart moved to v1.12.0.
    concurrentAutomaticEngineUpgradePerNodeLimit: 2
  metrics:
    serviceMonitor:
      enabled: true

# oauth2-proxy in front of the Longhorn UI, in full reverse-proxy mode (it
# is the sole HTTPRoute backend for the longhorn hostname — see
# gateway.routes in the per-instance values). Longhorn's UI has no native
# auth, so unlike every other SSO-connected app here there's no in-app OIDC
# config to set.
sso:
  fullnameOverride: longhorn-oauth2-proxy
  config:
    existingSecret: longhorn-oauth2-proxy-creds
    configFile: |-
      provider = "keycloak-oidc"
      provider_display_name = "Keycloak"
      email_domains = [ "*" ]
      upstreams = [ "file:///dev/null" ]
      redirect_url = ""
      oidc_issuer_url = ""
      reverse_proxy = true
      cookie_secure = true
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
